name: Deploy MaxPlay to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: game/package-lock.json

      - run: npm ci
        working-directory: game

      - run: npm run build
        working-directory: game
        env:
          CI: true

      - name: Assemble site
        run: |
          mkdir -p _site/max-adventure
          cp -r game-html/* _site/
          cp -r game/dist/* _site/max-adventure/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - id: deployment
        uses: actions/deploy-pages@v4
