<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-04 – Complète la phrase</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #2a1a3a, #1a2a3a); }
    
    .sentence-box {
      background: #ffffff15;
      border-radius: 20px;
      padding: 24px 20px;
      margin: 12px;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .sentence-text {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.5;
      color: #fff;
    }
    
    .sentence-text .blank {
      display: inline-block;
      background: #ffe06644;
      border: 3px solid #ffe066;
      border-radius: 12px;
      padding: 4px 16px;
      margin: 0 4px;
      min-width: 60px;
      color: #ffe066;
      font-weight: 900;
      animation: pulse 0.8s infinite alternate;
    }
    
    .sentence-text .blank.filled {
      background: #00c47a44;
      border-color: #00c47a;
      color: #00c47a;
      animation: popAnim 0.3s ease-out;
    }
    
    .sentence-text .blank.revealed {
      background: #00c47a44;
      border-color: #00c47a;
      color: #00c47a;
    }
    
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
    
    @keyframes popAnim {
      0% { transform: scale(0.7); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      margin-top: 8px;
    }
    
    .choice-btn {
      background: linear-gradient(145deg, #ffffff20, #ffffff10);
      border: 2px solid #ffffff30;
      border-radius: 16px;
      padding: 18px 12px;
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Nunito', sans-serif;
    }
    
    .choice-btn:active {
      transform: scale(0.95);
    }
    
    .choice-btn.ok {
      background: #00c47a;
      border-color: #00c47a;
    }
    
    .choice-btn.ko {
      background: #ff4757;
      border-color: #ff4757;
    }
    
    .question-counter {
      text-align: center;
      font-size: 1rem;
      opacity: 0.7;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .instruction {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 12px;
    }
    
    .emoji-hint {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">📝 Complète la phrase</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Question counter -->
    <div class="question-counter" id="qcounter">Question 1 / 5</div>
    
    <!-- Instruction -->
    <div class="instruction">Choisis le mot qui complète la phrase :</div>
    
    <!-- Emoji hint -->
    <div class="emoji-hint" id="emojiHint">🚌</div>
    
    <!-- Sentence with blank -->
    <div class="sentence-box">
      <div class="sentence-text" id="sentenceText">
        <!-- Généré par JS -->
      </div>
    </div>
    
    <!-- Choices -->
    <div class="choices-grid" id="choices">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script>
    // ─── MJ-04: Complète la phrase ───
    // Phrases à trous avec contexte (bus, métro, tramway)
    
    const PHRASES = [
      {
        text: "Max prend le bus ___ pour aller à l'école.",
        answer: "162",
        emoji: "🚌",
        options: ["162", "125", "M7", "380"]
      },
      {
        text: "Le bus ___ est vert comme les arbres.",
        answer: "380",
        emoji: "🌳",
        options: ["380", "162", "131", "V7"]
      },
      {
        text: "Pour aller chez mamie, on prend le ___.",
        answer: "V7",
        emoji: "👵",
        options: ["V7", "M7", "T7", "162"]
      },
      {
        text: "Le bus ___ passe par la porte d'Italie.",
        answer: "131",
        emoji: "🚏",
        options: ["131", "125", "162", "M7"]
      },
      {
        text: "Le métro ___ est orange.",
        answer: "M7",
        emoji: "🟠",
        options: ["M7", "M14", "T7", "V7"]
      },
      {
        text: "Le tramway ___ passe à Villejuif.",
        answer: "T7",
        emoji: "🚊",
        options: ["T7", "M7", "V7", "131"]
      },
      {
        text: "Le bus ___ est tout rouge !",
        answer: "162",
        emoji: "🔴",
        options: ["162", "380", "125", "M14"]
      },
      {
        text: "Pour la piscine, Max prend la ___.",
        answer: "Valouette",
        emoji: "🏊",
        options: ["Valouette", "V7", "M7", "T7"]
      },
      {
        text: "Le bus ___ va à Louis Aragon.",
        answer: "131",
        emoji: "🎭",
        options: ["131", "125", "380", "162"]
      },
      {
        text: "Le bus ___ va à Louis Aragon.",
        answer: "125",
        emoji: "🎭",
        options: ["125", "131", "162", "180"]
      },
      {
        text: "Le bus ___ va à Louis Aragon.",
        answer: "380",
        emoji: "🎭",
        options: ["380", "162", "131", "125"]
      },
      {
        text: "Le bus ___ va à Louis Aragon.",
        answer: "162",
        emoji: "🎭",
        options: ["162", "180", "131", "125"]
      },
      {
        text: "Le bus ___ va à Louis Aragon.",
        answer: "180",
        emoji: "🎭",
        options: ["180", "162", "380", "131"]
      },
      {
        text: "Le ___ est violet.",
        answer: "M14",
        emoji: "🟣",
        options: ["M14", "M7", "T7", "V7"]
      },
      {
        text: "Le bus ___ passe par la porte d'Italie.",
        answer: "125",
        emoji: "🚏",
        options: ["125", "131", "162", "380"]
      }
    ];
    
    let score = 0;
    let streak = 0;
    let questionCount = 0;
    const MAX_QUESTIONS = 5;
    let locked = false;
    let currentPhrase = null;
    let usedIndices = [];
    
    function init() {
      score = 0;
      streak = 0;
      questionCount = 0;
      usedIndices = [];
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      nextQuestion();
    }
    
    function getRandomPhrase() {
      let availableIndices = [];
      for (let i = 0; i < PHRASES.length; i++) {
        if (!usedIndices.includes(i)) {
          availableIndices.push(i);
        }
      }
      
      // Si toutes les phrases ont été utilisées, réinitialiser
      if (availableIndices.length === 0) {
        usedIndices = [];
        availableIndices = Array.from({length: PHRASES.length}, (_, i) => i);
      }
      
      const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
      usedIndices.push(randomIndex);
      return PHRASES[randomIndex];
    }
    
    function nextQuestion() {
      if (questionCount >= MAX_QUESTIONS) {
        showEndScreen();
        return;
      }
      
      locked = false;
      questionCount++;
      
      document.getElementById('qcounter').textContent = `Question ${questionCount} / ${MAX_QUESTIONS}`;
      
      // Choisir une phrase aléatoire
      currentPhrase = getRandomPhrase();
      
      // Mettre à jour l'emoji
      document.getElementById('emojiHint').textContent = currentPhrase.emoji;
      
      // Afficher la phrase avec trou
      const sentenceText = document.getElementById('sentenceText');
      const parts = currentPhrase.text.split('___');
      sentenceText.innerHTML = `${parts[0]}<span class="blank" id="blank">?</span>${parts[1] || ''}`;
      
      // Afficher les choix
      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';
      
      // Mélanger les options
      const shuffledOptions = shuffle([...currentPhrase.options]);
      
      shuffledOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = option;
        btn.onclick = () => answer(option === currentPhrase.answer, btn, option);
        choicesDiv.appendChild(btn);
      });
    }
    
    function answer(isCorrect, btn, chosenOption) {
      if (locked) return;
      locked = true;
      
      const blank = document.getElementById('blank');
      
      if (isCorrect) {
        btn.classList.add('ok');
        
        // Révéler la réponse dans la phrase
        if (blank) {
          blank.textContent = chosenOption;
          blank.classList.add('filled');
        }
        
        score += 10;
        streak++;
        if (streak >= 3) confetti();
        sndDing();
        showFB(true);
      } else {
        btn.classList.add('ko');
        
        // Montrer le bon bouton
        const buttons = Array.from(document.querySelectorAll('#choices .choice-btn'));
        const correctBtn = buttons.find(b => b.textContent === currentPhrase.answer);
        if (correctBtn) correctBtn.classList.add('ok');
        
        // Révéler la bonne réponse
        if (blank) {
          blank.textContent = currentPhrase.answer;
          blank.classList.add('revealed');
        }
        
        streak = 0;
        sndBuzz();
        showFB(false);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
      
      setTimeout(nextQuestion, 1800);
    }
    
    function showEndScreen() {
      sndVictory();
      confetti();
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;">
          <div style="font-size:5rem;margin-bottom:20px;">🏆</div>
          <h2 style="font-size:2rem;margin-bottom:20px;color:#ffe066;">Super !</h2>
          <p style="font-size:1.4rem;margin-bottom:30px;">Tu as fait <strong>${score}</strong> points !</p>
          <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="mj-04.html" style="background:#00c47a;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">🔄 Rejouer</a>
            <a href="index.html" style="background:#ffffff22;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">📋 Menu</a>
          </div>
        </div>
      `;
    }
    
    // Mélanger un tableau
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    // Démarrer
    init();
  </script>
</body>
</html>
