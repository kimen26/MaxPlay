<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MaxPlay – Jeu de Bus Villejuif</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Menu principal -->
    <div class="scr on" id="menuScr">
      <div class="mtitle">
        <h2>🚌 MaxPlay</h2>
        <p>Choisis ta mission, petit conducteur !</p>
      </div>
      
      <div class="mgrid">
        <!-- MJ-01: Quelle couleur ? -->
        <a href="mj-01.html" class="mcard">
          <div class="bar" style="background:#0064B1"></div>
          <div class="emoji">🎨</div>
          <div class="mlbl">Quelle couleur ?</div>
          <div class="msub">MJ-01</div>
        </a>
        
        <!-- MJ-02: Quel numéro ? -->
        <a href="mj-02.html" class="mcard">
          <div class="bar" style="background:#F58443"></div>
          <div class="emoji">🔢</div>
          <div class="mlbl">Quel numéro ?</div>
          <div class="msub">MJ-02</div>
        </a>
        
        <!-- MJ-03a: Compte les passagers -->
        <a href="mj-03a.html" class="mcard">
          <div class="bar" style="background:#008C59"></div>
          <div class="emoji">👥</div>
          <div class="mlbl">Compte les passagers</div>
          <div class="msub">MJ-03a</div>
        </a>
        
        <!-- MJ-03b: La bonne place -->
        <a href="mj-03b.html" class="mcard">
          <div class="bar" style="background:#B43C95"></div>
          <div class="emoji">🪑</div>
          <div class="mlbl">La bonne place</div>
          <div class="msub">MJ-03b</div>
        </a>
        
        <!-- MJ-04: Lis le mot -->
        <a href="mj-04.html" class="mcard">
          <div class="bar" style="background:#C9A2CD"></div>
          <div class="emoji">📖</div>
          <div class="mlbl">Lis le mot</div>
          <div class="msub">MJ-04</div>
        </a>
        
        <!-- MJ-05: Quel bus ? -->
        <a href="mj-05.html" class="mcard">
          <div class="bar" style="background:#75CE89"></div>
          <div class="emoji">🚏</div>
          <div class="mlbl">Quel bus ?</div>
          <div class="msub">MJ-05</div>
        </a>
        
        <!-- MJ-06: Au garage ! -->
        <a href="mj-06.html" class="mcard">
          <div class="bar" style="background:#8D653A"></div>
          <div class="emoji">🏠</div>
          <div class="mlbl">Au garage !</div>
          <div class="msub">MJ-06</div>
        </a>
        
        <!-- MJ-07: La journée de Max (Phaser) -->
        <a href="../game/index.html" class="mcard">
          <div class="bar" style="background:#00AFA3"></div>
          <div class="emoji">🗺️</div>
          <div class="mlbl">La journée de Max</div>
          <div class="msub">MJ-07 (Sandbox)</div>
        </a>
      </div>
      
      <!-- Test sounds -->
      <div style="margin-top:20px;text-align:center;">
        <p style="font-size:0.8rem;opacity:0.6;margin-bottom:8px;">Teste les sons :</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
          <button class="back" onclick="sndKlaxon()" style="width:auto;padding:8px 12px;font-size:0.8rem;border-radius:10px;">🚌 Klaxon</button>
          <button class="back" onclick="sndDing()" style="width:auto;padding:8px 12px;font-size:0.8rem;border-radius:10px;">⭐ Ding</button>
          <button class="back" onclick="sndProut()" style="width:auto;padding:8px 12px;font-size:0.8rem;border-radius:10px;">💨 Prout</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
</body>
</html>
