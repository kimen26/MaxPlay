<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MaxPlay – Maquettes Villejuif</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; font-family: sans-serif; color: #fff; padding: 20px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 1.4rem; color: #ffe066; }
  p.sub { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 24px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: #16213e;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #0f3460;
  }
  .card-title {
    padding: 8px 12px;
    background: #0f3460;
    font-size: 0.8rem;
    font-weight: bold;
    color: #ffe066;
    letter-spacing: 0.5px;
  }
  .card-desc {
    padding: 4px 12px 8px;
    background: #0f3460;
    font-size: 0.7rem;
    color: #aac;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .loading { padding: 20px; color: #555; font-size: 0.8rem; text-align: center; }
</style>
</head>

// ─── Chargement des images ─────────────────────────────────────
const imgCache = {};
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { imgCache[src] = img; resolve(img); };
    img.onerror = () => { imgCache[src] = null; resolve(null); };
    img.src = src;
  });
}

async function loadAll(keys) {
  const srcs = keys.map(k => TILES[k]).filter(Boolean);
  await Promise.all(srcs.map(loadImg));
}

// ─── Dessin d'une tile sur canvas ─────────────────────────────
const S = 48; // taille tile de base

// Sol : toujours 48×48 (forcer la taille)
function drawTile(ctx, key, col, row) {
  const src = TILES[key];
  if (!src) return;
  const img = imgCache[src];
  if (!img) return;
  ctx.drawImage(img, col * S, row * S, S, S);
}

// Objet : taille NATIVE (bâtiments modulaires 48×144, props 96×96, poteaux 48×192…)
// Ancré au coin supérieur-gauche de la cellule (col, row)
function drawObject(ctx, key, col, row) {
  const src = TILES[key];
  if (!src) return;
  const img = imgCache[src];
  if (!img) return;
  ctx.drawImage(img, col * S, row * S);
}

function fillRect(ctx, key, c0, r0, cw, rh) {
  for (let r = r0; r < r0 + rh; r++)
    for (let c = c0; c < c0 + cw; c++)
      drawTile(ctx, key, c, r);
}

// ─── Rendu d'une map multi-layer (ground / objects / decoration) ───
function drawLayeredMap(ctx, map) {
  const { ground, objects, decoration } = map;
  // Ground : 48×48 forcé
  for (let r = 0; r < ground.length; r++)
    for (let c = 0; c < ground[r].length; c++)
      if (ground[r][c]) drawTile(ctx, ground[r][c], c, r);
  // Objects + decoration : taille native (bâtiments, props)
  if (objects)
    for (let r = 0; r < objects.length; r++)
      for (let c = 0; c < objects[r].length; c++)
        if (objects[r][c]) drawObject(ctx, objects[r][c], c, r);
  if (decoration)
    for (let r = 0; r < decoration.length; r++)
      for (let c = 0; c < decoration[r].length; c++)
        if (decoration[r][c]) drawObject(ctx, decoration[r][c], c, r);
}

// ─── Rendu ────────────────────────────────────────────────────
async function renderAll() {
  const grid = document.getElementById('grid');

  for (const m of MOCKUPS) {
    const card = document.createElement('div');
    card.className = 'card';

    const titleEl = document.createElement('div');
    titleEl.className = 'card-title';
    titleEl.textContent = m.title;

    const descEl = document.createElement('div');
    descEl.className = 'card-desc';
    descEl.textContent = m.desc;

    const canvas = document.createElement('canvas');
    canvas.width = m.cols * 48;
    canvas.height = m.rows * 48;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';

    card.appendChild(titleEl);
    card.appendChild(descEl);
    card.appendChild(canvas);
    grid.appendChild(card);

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#3d7a3d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    try {
      await m.draw(ctx);
    } catch(e) {
      ctx.fillStyle = '#ff000055';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '11px sans-serif';
      ctx.fillText('Erreur: ' + e.message, 4, 20);
    }
  }
}

renderAll();
