<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-02 – Quel numéro ?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #2a1a3a, #1a2a3a); }
    .bus-option { padding: 8px !important; }
    .bus-option svg { width: 100%; max-width: 140px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🔢 Quel numéro ?</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Question -->
    <div class="qbox" id="qbox">
      <div id="busDisplay" style="margin-bottom:12px;"></div>
      <div class="qtxt" style="font-size:1.1rem;">
        Quel est le numéro de ce bus ?
      </div>
    </div>
    
    <!-- Choices -->
    <div class="choices" id="choices" style="grid-template-columns:1fr 1fr;padding:0 12px;gap:12px;">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
  <script>
    // ─── MJ-02: Quel numéro ? ───
    // Max voit un bus coloré (numéro caché) → doit choisir le bon numéro
    // SEULEMENT les lignes à couleur UNIQUE (pas d'ambiguïté)
    
    let score = 0;
    let streak = 0;
    let locked = false;
    let currentLine = null;
    
    // Uniquement les lignes avec couleur unique (pas d'ambiguïté pour MJ-02)
    const POOL = LIGNES.filter(l => {
      const sameColor = LIGNES.filter(x => x.color === l.color);
      return sameColor.length === 1 && l.num !== 'TVM';
    });
    
    function init() {
      score = 0;
      streak = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      nextQuestion();
    }
    
    function nextQuestion() {
      locked = false;
      
      // Choisir une ligne au hasard
      currentLine = POOL[Math.floor(Math.random() * POOL.length)];
      
      // Afficher le bus avec numéro caché
      document.getElementById('busDisplay').innerHTML = busSVGHiddenNum(
        currentLine.color, 
        currentLine.textColor, 
        currentLine.num, 
        200
      );
      
      // Générer 3 mauvaises réponses (numéros de couleurs proches)
      const wrongOptions = POOL
        .filter(l => l.num !== currentLine.num)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3);
      
      // Créer les options
      const options = [
        { line: currentLine, isCorrect: true },
        ...wrongOptions.map(l => ({ line: l, isCorrect: false }))
      ];
      
      // Afficher les choix
      const container = document.getElementById('choices');
      container.innerHTML = '';
      
      shuffle(options).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'ch';
        btn.style.fontSize = '1.4rem';
        btn.textContent = opt.line.num;
        btn.onclick = () => answer(opt.isCorrect, btn);
        container.appendChild(btn);
      });
    }
    
    function answer(isCorrect, btn) {
      if (locked) return;
      locked = true;
      
      if (isCorrect) {
        btn.classList.add('ok');
        score += 10;
        streak++;
        if (streak >= 3) confetti();
        sndDing();
        showFB(true);
        
        // Révéler le numéro
        revealBusNumber(document.getElementById('busDisplay'), currentLine.num);
        sndKlaxon();
      } else {
        btn.classList.add('ko');
        
        // Montrer la bonne réponse
        const buttons = Array.from(document.querySelectorAll('#choices .ch'));
        const correctBtn = buttons.find(b => b.textContent === currentLine.num);
        if (correctBtn) correctBtn.classList.add('ok');
        
        streak = 0;
        sndBuzz();
        showFB(false);
        
        // Révéler le numéro quand même
        revealBusNumber(document.getElementById('busDisplay'), currentLine.num);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
      
      setTimeout(nextQuestion, 1800);
    }
    
    // Démarrer
    init();
  </script>
</body>
</html>
