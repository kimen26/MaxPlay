<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-03 – Devine le numéro (TTS)</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #2a1a3a, #1a2a3a); }
    .bus-option { padding: 8px !important; }
    .bus-option svg { width: 100%; max-width: 140px; }
    .question-counter {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .instruction-text {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffe066;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .repeat-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.6rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .repeat-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
    }
    .repeat-btn:active {
      transform: scale(0.95);
    }
    .repeat-label {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 4px;
    }
    .bus-display-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 16px;
      margin: 12px 0;
    }
    .tts-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🔊 Devine le numéro <span class="tts-badge">TTS</span></span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Question -->
    <div class="qbox" id="qbox">
      <div class="question-counter" id="qcounter">Question 1 / 5</div>
      
      <!-- Instruction -->
      <div class="instruction-text">
        🔊 Écoute bien le numéro !
      </div>
      
      <!-- TTS Controls -->
      <button class="repeat-btn" id="repeatBtn" onclick="speakTarget()" title="Répéter">
        🔊
      </button>
      <div class="repeat-label">Clique pour répéter</div>
      
      <!-- Bus Display (white/neutral with subtle hint) -->
      <div class="bus-display-container">
        <div id="busDisplay" style="margin-bottom:12px;"></div>
      </div>
    </div>
    
    <!-- Choices -->
    <div class="choices" id="choices" style="grid-template-columns:1fr 1fr 1fr;padding:0 12px;gap:10px;">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts — data.js et bus-svg.js sont la source de vérité -->
  <script src="js/sounds.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/victory-sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
  <script>
    // LIGNES vient de data.js — pas de redéfinition locale

    let score = 0;
    let streak = 0;
    let questionCount = 0;
    const MAX_QUESTIONS = 5;
    let locked = false;
    let currentLine = null;
    
    // Web Speech API TTS (via js/tts.js)
    let ttsEnabled = true;
    function speak(text, priority = false) {
      if (!ttsEnabled) return;
      TTS.speak(text, { rate: 0.85, pitch: 1.1, priority });
    }
    
    function speakTarget() {
      if (currentLine) {
        const textToSpeak = getLineDisplayName(currentLine.num);
        speak(textToSpeak, true);
      }
    }
    
    // getLineDisplayName vient de data.js — PAS de redéfinition locale
    // busSVG et busSVGHiddenNum viennent de bus-svg.js — PAS de redéfinition locale

    function init() {
      score = 0;
      streak = 0;
      questionCount = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      document.getElementById('qcounter').textContent = `Question 1 / ${MAX_QUESTIONS}`;
      nextQuestion();
    }
    
    function nextQuestion() {
      if (questionCount >= MAX_QUESTIONS) {
        showEndScreen();
        return;
      }
      
      locked = false;
      questionCount++;
      document.getElementById('qcounter').textContent = `Question ${questionCount} / ${MAX_QUESTIONS}`;
      
      // Choisir une ligne au hasard parmi TOUTES les lignes
      currentLine = LIGNES[Math.floor(Math.random() * LIGNES.length)];
      
      // MJ-02b : aucun indice visuel — fenêtre BLANCHE + numéro CACHÉ
      // Max entend le numéro (TTS), doit reconnaître sans aide couleur ni chiffre
      document.getElementById('busDisplay').innerHTML = busSVGHiddenNum('#ffffff', '#111111', currentLine.num, 200);
      
      // Annoncer à voix haute le numéro à trouver
      setTimeout(() => {
        speakTarget();
      }, 300);
      
      // Générer 5 mauvaises réponses parmi TOUTES les lignes
      const otherLines = LIGNES.filter(l => l.num !== currentLine.num);
      const wrongOptions = shuffle([...otherLines]).slice(0, 5);
      
      // Créer les 6 options (1 correcte + 5 mauvaises)
      const options = [
        { line: currentLine, isCorrect: true },
        ...wrongOptions.map(l => ({ line: l, isCorrect: false }))
      ];
      
      // Afficher les 6 choix
      const container = document.getElementById('choices');
      container.innerHTML = '';
      
      shuffle(options).forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'ch';
        btn.style.fontSize = '1.4rem';
        btn.style.fontWeight = '900';
        btn.style.padding = '16px 8px';
        btn.textContent = opt.line.num;
        btn.onclick = () => answer(opt.isCorrect, btn);
        container.appendChild(btn);
      });
    }
    
    function answer(isCorrect, btn) {
      if (locked) return;
      locked = true;
      if (typeof Tracker !== 'undefined') Tracker.logAnswer(isCorrect);

      if (isCorrect) {
        btn.classList.add('ok');
        score += 10;
        streak++;
        sndDing();
        showFB(true);
        
        // Révéler : remplacer le bus blanc par le vrai bus coloré
        document.getElementById('busDisplay').innerHTML = busSVG(currentLine.color, currentLine.textColor, currentLine.num, 200);
        speak('Bravo ! C\'était le ' + getLineDisplayName(currentLine.num));
      } else {
        btn.classList.add('ko');
        
        // Montrer la bonne réponse
        const buttons = Array.from(document.querySelectorAll('#choices .ch'));
        const correctBtn = buttons.find(b => b.textContent === currentLine.num);
        if (correctBtn) correctBtn.classList.add('ok');
        
        streak = 0;
        playErrorSound(); sndBuzz();
        showFB(false);
        
        // Révéler le bus coloré quand même
        document.getElementById('busDisplay').innerHTML = busSVG(currentLine.color, currentLine.textColor, currentLine.num, 200);
        speak('C\'était le ' + getLineDisplayName(currentLine.num));
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
      
      setTimeout(nextQuestion, 2500);
    }
    
    function showEndScreen() {
      if (typeof Tracker !== 'undefined') Tracker.endSession(score, MAX_QUESTIONS * 10);
      playEndSound(score, MAX_QUESTIONS * 10);
      confetti();
      busParade();
      speak('Félicitations ! Tu as terminé le jeu !', true);
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;text-align:center;padding:20px;">
          <div style="font-size:5rem;margin-bottom:20px;">🏆</div>
          <h2 style="font-size:2rem;margin-bottom:20px;color:#ffe066;">Super !</h2>
          <p style="font-size:1.4rem;margin-bottom:30px;">Tu as fait <strong>${score}</strong> points !</p>
          <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="mj-03.html" style="background:#00c47a;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">🔄 Rejouer</a>
            <a href="index.html" style="background:#ffffff22;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">📋 Menu</a>
          </div>
        </div>
      `;
    }
    
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    init();
  </script>
<script src="js/tracker.js"></script>
<script src="js/comments.js"></script>
</body>
</html>
