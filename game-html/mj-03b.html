<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-03b – La bonne place</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #3a1a2a, #1a2a3a); }
    .bus-scheme {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 12px;
      background: #ffffff10;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .seat {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: #00c47a33;
      border: 2px solid #00c47a;
    }
    .seat.occupied {
      background: #ff445533;
      border-color: #ff4455;
    }
    .seat.available {
      background: #ffffff22;
      border-color: #ffffff44;
    }
    .problem-text {
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
      padding: 12px;
      background: #ffffff10;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .problem-text strong {
      color: #ffe066;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🪑 La bonne place</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Problem -->
    <div class="problem-text" id="problem">
      <!-- Généré par JS -->
    </div>
    
    <!-- Bus visualization -->
    <div class="bus-scheme" id="busScheme">
      <!-- Généré par JS -->
    </div>
    
    <!-- Choices -->
    <div class="choices" id="choices" style="grid-template-columns:repeat(4,1fr);padding:0 12px;">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script>
    // ─── MJ-03b: La bonne place ───
    // Problèmes de soustraction: places, passagers, attente
    // Max est très bon → difficulté progressive rapide
    
    let score = 0;
    let streak = 0;
    let locked = false;
    let correctAnswer = 0;
    let level = 1; // 1=facile, 2=moyen, 3=difficile
    
    function init() {
      score = 0;
      streak = 0;
      level = 1;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      nextQuestion();
    }
    
    function nextQuestion() {
      locked = false;
      
      // Augmenter le niveau si Max réussit beaucoup
      if (streak >= 5) level = 3;
      else if (streak >= 3) level = 2;
      
      // Générer le problème selon le niveau
      const problem = generateProblem(level);
      correctAnswer = problem.answer;
      
      // Afficher le texte
      document.getElementById('problem').innerHTML = problem.text;
      
      // Afficher le schéma du bus
      renderBus(problem.total, problem.occupied);
      
      // Générer les choix
      const choices = generateChoices(correctAnswer, level);
      
      const container = document.getElementById('choices');
      container.innerHTML = '';
      
      shuffle(choices).forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'ch';
        btn.style.fontSize = '1.3rem';
        btn.style.minHeight = '56px';
        btn.textContent = num;
        btn.onclick = () => answer(num === correctAnswer, btn);
        container.appendChild(btn);
      });
    }
    
    function generateProblem(lvl) {
      const types = ['places', 'monter', 'descendre'];
      const type = types[Math.floor(Math.random() * types.length)];
      
      if (type === 'places') {
        // Places totales, occupées → combien de libres ?
        const total = lvl === 1 ? 6 + Math.floor(Math.random() * 5) :
                      lvl === 2 ? 10 + Math.floor(Math.random() * 11) :
                                  20 + Math.floor(Math.random() * 16);
        const occupied = 1 + Math.floor(Math.random() * (total - 2));
        const available = total - occupied;
        
        return {
          text: `Le bus a <strong>${total}</strong> places.<br><strong>${occupied}</strong> sont occupées.<br>Combien de places libres ?`,
          total, occupied, answer: available
        };
      } else if (type === 'monter') {
        // Places, occupées, attente → combien peuvent monter ?
        const total = lvl === 1 ? 8 : lvl === 2 ? 12 : 20;
        const occupied = 2 + Math.floor(Math.random() * (total - 4));
        const waiting = 2 + Math.floor(Math.random() * 6);
        const available = total - occupied;
        const canBoard = Math.min(waiting, available);
        
        return {
          text: `Le bus a <strong>${total}</strong> places.<br><strong>${occupied}</strong> sont occupées.<br><strong>${waiting}</strong> personnes attendent.<br>Combien peuvent monter ?`,
          total, occupied, answer: canBoard
        };
      } else {
        // Passagers, descendent → combien restent ?
        const total = lvl === 1 ? 5 + Math.floor(Math.random() * 6) :
                      lvl === 2 ? 10 + Math.floor(Math.random() * 11) :
                                  15 + Math.floor(Math.random() * 16);
        const leaving = 1 + Math.floor(Math.random() * (total - 2));
        const remaining = total - leaving;
        
        return {
          text: `Il y a <strong>${total}</strong> passagers dans le bus.<br><strong>${leaving}</strong> descendent.<br>Combien restent ?`,
          total, occupied: 0, answer: remaining
        };
      }
    }
    
    function renderBus(total, occupied) {
      const container = document.getElementById('busScheme');
      container.innerHTML = '';
      
      // Limiter l'affichage pour ne pas surcharger
      const displayTotal = Math.min(total, 12);
      const displayOccupied = Math.min(occupied, displayTotal);
      
      for (let i = 0; i < displayTotal; i++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        if (i < displayOccupied) {
          seat.classList.add('occupied');
          seat.textContent = '🧍';
        } else {
          seat.classList.add('available');
          seat.textContent = '';
        }
        container.appendChild(seat);
      }
      
      if (total > 12) {
        const more = document.createElement('div');
        more.style.fontSize = '0.8rem';
        more.style.opacity = '0.6';
        more.textContent = `+${total - 12} places`;
        container.appendChild(more);
      }
    }
    
    function generateChoices(correct, lvl) {
      const range = lvl === 1 ? 3 : lvl === 2 ? 5 : 8;
      const wrongs = [];
      
      for (let i = Math.max(0, correct - range); i <= correct + range; i++) {
        if (i !== correct && i >= 0) wrongs.push(i);
      }
      
      return [correct, ...shuffle(wrongs).slice(0, 3)];
    }
    
    function answer(isCorrect, btn) {
      if (locked) return;
      locked = true;
      
      if (isCorrect) {
        btn.classList.add('ok');
        score += 10 + (level * 5); // Bonus niveau
        streak++;
        if (streak >= 3) confetti();
        sndDing();
        showFB(true);
      } else {
        btn.classList.add('ko');
        
        const buttons = Array.from(document.querySelectorAll('#choices .ch'));
        const correctBtn = buttons.find(b => +b.textContent === correctAnswer);
        if (correctBtn) correctBtn.classList.add('ok');
        
        streak = 0;
        level = Math.max(1, level - 1); // Redescendre un peu
        sndBuzz();
        showFB(false);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
      
      setTimeout(nextQuestion, 1400);
    }
    
    // Démarrer
    init();
  </script>
</body>
</html>
