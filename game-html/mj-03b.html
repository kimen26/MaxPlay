<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-03b – La bonne place</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #3a1a2a, #1a2a3a); }
    .bus-scene {
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
      border-radius: 16px;
      padding: 16px;
      margin: 0 12px 12px;
      position: relative;
      min-height: 180px;
    }
    .bus-visual {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      animation: busBounce 2s ease-in-out infinite;
    }
    .bus-visual svg {
      width: 100%;
      height: auto;
    }
    @keyframes busBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }
    .people-waiting {
      display: flex;
      justify-content: center;
      gap: 4px;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
    }
    .person {
      font-size: 1.8rem;
      animation: personBob 1s ease-in-out infinite;
    }
    .person:nth-child(2) { animation-delay: 0.1s; }
    .person:nth-child(3) { animation-delay: 0.2s; }
    .person:nth-child(4) { animation-delay: 0.3s; }
    .person:nth-child(5) { animation-delay: 0.4s; }
    @keyframes personBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .bus-seats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 12px;
      background: #ffffff10;
      border-radius: 12px;
      margin: 0 12px 12px;
    }
    .seat {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: #00c47a33;
      border: 2px solid #00c47a;
      transition: all 0.3s;
    }
    .seat.occupied {
      background: #ff445533;
      border-color: #ff4455;
    }
    .seat.available {
      background: #ffffff22;
      border-color: #ffffff44;
    }
    .seat.boarding {
      animation: boardAnim 0.5s ease-out;
    }
    @keyframes boardAnim {
      0% { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .problem-text {
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
      padding: 12px;
      background: #ffffff10;
      border-radius: 12px;
      margin: 0 12px 12px;
    }
    .problem-text strong {
      color: #ffe066;
      font-size: 1.2rem;
    }
    .question-counter {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🪑 La bonne place</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Problem -->
    <div class="problem-text" id="problem">
      <!-- Généré par JS -->
    </div>
    
    <!-- Bus visualization with people -->
    <div class="bus-scene" id="busScene">
      <div class="bus-visual" id="busVisual"></div>
      <div class="people-waiting" id="peopleWaiting">
        <!-- Généré par JS -->
      </div>
    </div>
    
    <!-- Seats visualization -->
    <div class="bus-seats" id="busSeats">
      <!-- Généré par JS -->
    </div>
    
    <!-- Choices -->
    <div class="choices" id="choices" style="grid-template-columns:repeat(4,1fr);padding:0 12px;">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
  <script>
    // ─── MJ-03b: La bonne place ───
    // Problèmes de soustraction: places, passagers, attente
    // Max est très bon → difficulté progressive rapide

    // Lignes quotidiennes de Max (pour décorer le bus)
    const POOL_MJ03B = LIGNES.filter(l => ['162','172','185','380','V7','131','125','132','180','47','186'].includes(l.num));

    let score = 0;
    let streak = 0;
    let questionCount = 0;
    const MAX_QUESTIONS = 5;
    let locked = false;
    let correctAnswer = 0;
    let level = 1; // 1=facile, 2=moyen, 3=difficile
    let currentProblem = null;
    
    function init() {
      score = 0;
      streak = 0;
      questionCount = 0;
      level = 1;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      // Choisir un bus aléatoire pour décorer la scène
      const decorLine = POOL_MJ03B[Math.floor(Math.random() * POOL_MJ03B.length)];
      document.getElementById('busVisual').innerHTML = busSVG(decorLine.color, decorLine.textColor, decorLine.num, 160);
      nextQuestion();
    }
    
    function nextQuestion() {
      if (questionCount >= MAX_QUESTIONS) {
        showEndScreen();
        return;
      }
      
      locked = false;
      questionCount++;
      
      // Augmenter le niveau si Max réussit beaucoup
      if (streak >= 5) level = 3;
      else if (streak >= 3) level = 2;
      
      // Générer le problème selon le niveau
      const problem = generateProblem(level);
      currentProblem = problem;
      correctAnswer = problem.answer;
      
      // Afficher le texte avec compteur
      document.getElementById('problem').innerHTML = 
        `<div class="question-counter">Question ${questionCount} / ${MAX_QUESTIONS}</div>` + 
        problem.text;
      
      // Afficher les personnes qui attendent
      renderPeopleWaiting(problem.waiting || 0);
      
      // Afficher le schéma du bus
      renderSeats(problem.total, problem.occupied);
      
      // Générer les choix
      const choices = generateChoices(correctAnswer, level);
      
      const container = document.getElementById('choices');
      container.innerHTML = '';
      
      shuffle(choices).forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'ch';
        btn.style.fontSize = '1.3rem';
        btn.style.minHeight = '56px';
        btn.textContent = num;
        btn.onclick = () => answer(num === correctAnswer, btn);
        container.appendChild(btn);
      });
    }
    
    function generateProblem(lvl) {
      const types = ['places', 'monter', 'descendre'];
      const type = types[Math.floor(Math.random() * types.length)];
      
      if (type === 'places') {
        // Places totales, occupées → combien de libres ?
        const total = lvl === 1 ? 6 + Math.floor(Math.random() * 5) :
                      lvl === 2 ? 10 + Math.floor(Math.random() * 11) :
                                  20 + Math.floor(Math.random() * 16);
        const occupied = 1 + Math.floor(Math.random() * (total - 2));
        const available = total - occupied;
        
        return {
          type: 'places',
          text: `Le bus a <strong>${total}</strong> places.<br><strong>${occupied}</strong> sont occupées.<br>Combien de places libres ?`,
          total, occupied, answer: available, waiting: 0
        };
      } else if (type === 'monter') {
        // Places, occupées, attente → combien peuvent monter ?
        const total = lvl === 1 ? 8 : lvl === 2 ? 12 : 20;
        const occupied = 2 + Math.floor(Math.random() * (total - 4));
        const waiting = 2 + Math.floor(Math.random() * 6);
        const available = total - occupied;
        const canBoard = Math.min(waiting, available);
        
        return {
          type: 'monter',
          text: `Le bus a <strong>${total}</strong> places.<br><strong>${occupied}</strong> sont occupées.<br><strong>${waiting}</strong> personnes attendent.<br>Combien peuvent monter ?`,
          total, occupied, answer: canBoard, waiting
        };
      } else {
        // Passagers, descendent → combien restent ?
        const total = lvl === 1 ? 5 + Math.floor(Math.random() * 6) :
                      lvl === 2 ? 10 + Math.floor(Math.random() * 11) :
                                  15 + Math.floor(Math.random() * 16);
        const leaving = 1 + Math.floor(Math.random() * (total - 2));
        const remaining = total - leaving;
        
        return {
          type: 'descendre',
          text: `Il y a <strong>${total}</strong> passagers dans le bus.<br><strong>${leaving}</strong> descendent.<br>Combien restent ?`,
          total, occupied: 0, answer: remaining, waiting: leaving
        };
      }
    }
    
    function renderPeopleWaiting(count) {
      const container = document.getElementById('peopleWaiting');
      container.innerHTML = '';
      
      if (count === 0) {
        container.style.display = 'none';
        return;
      }
      
      container.style.display = 'flex';
      const emojis = ['🧍', '🧍‍♀️', '🧍‍♂️', '👧', '👦', '👵', '👴'];
      
      for (let i = 0; i < Math.min(count, 6); i++) {
        const person = document.createElement('span');
        person.className = 'person';
        person.textContent = emojis[i % emojis.length];
        container.appendChild(person);
      }
      
      if (count > 6) {
        const more = document.createElement('span');
        more.className = 'person';
        more.textContent = `+${count - 6}`;
        more.style.fontSize = '1rem';
        more.style.fontWeight = 'bold';
        container.appendChild(more);
      }
    }
    
    function renderSeats(total, occupied) {
      const container = document.getElementById('busSeats');
      container.innerHTML = '';
      
      // Limiter l'affichage pour ne pas surcharger
      const displayTotal = Math.min(total, 12);
      const displayOccupied = Math.min(occupied, displayTotal);
      
      for (let i = 0; i < displayTotal; i++) {
        const seat = document.createElement('div');
        seat.className = 'seat';
        if (i < displayOccupied) {
          seat.classList.add('occupied');
          seat.textContent = '🧍';
        } else {
          seat.classList.add('available');
          seat.textContent = '';
        }
        container.appendChild(seat);
      }
      
      if (total > 12) {
        const more = document.createElement('div');
        more.style.fontSize = '0.8rem';
        more.style.opacity = '0.6';
        more.textContent = `+${total - 12} places`;
        container.appendChild(more);
      }
    }
    
    function animateBoarding() {
      // Animation des personnes qui montent
      const seats = document.querySelectorAll('.seat.available');
      let count = 0;
      seats.forEach(seat => {
        if (count < correctAnswer) {
          setTimeout(() => {
            seat.classList.remove('available');
            seat.classList.add('occupied', 'boarding');
            seat.textContent = '🧍';
            sndPorte();
          }, count * 200);
          count++;
        }
      });
    }
    
    function generateChoices(correct, lvl) {
      const range = lvl === 1 ? 3 : lvl === 2 ? 5 : 8;
      const wrongs = [];
      
      for (let i = Math.max(0, correct - range); i <= correct + range; i++) {
        if (i !== correct && i >= 0) wrongs.push(i);
      }
      
      return [correct, ...shuffle(wrongs).slice(0, 3)];
    }
    
    function answer(isCorrect, btn) {
      if (locked) return;
      locked = true;
      
      if (isCorrect) {
        btn.classList.add('ok');
        score += 10 + (level * 5); // Bonus niveau
        streak++;
        if (streak >= 3) confetti();
        sndDing();
        showFB(true);
        
        // Animation des passagers qui montent
        if (currentProblem && currentProblem.type === 'monter') {
          animateBoarding();
        }
      } else {
        btn.classList.add('ko');
        
        const buttons = Array.from(document.querySelectorAll('#choices .ch'));
        const correctBtn = buttons.find(b => +b.textContent === correctAnswer);
        if (correctBtn) correctBtn.classList.add('ok');
        
        streak = 0;
        level = Math.max(1, level - 1); // Redescendre un peu
        sndBuzz();
        showFB(false);
      }
      
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
      
      setTimeout(nextQuestion, 1800);
    }
    
    function showEndScreen() {
      sndVictory();
      confetti();
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;">
          <div style="font-size:5rem;margin-bottom:20px;">🏆</div>
          <h2 style="font-size:2rem;margin-bottom:20px;color:#ffe066;">Super !</h2>
          <p style="font-size:1.4rem;margin-bottom:30px;">Tu as fait <strong>${score}</strong> points !</p>
          <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="mj-03b.html" style="background:#00c47a;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">🔄 Rejouer</a>
            <a href="index.html" style="background:#ffffff22;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">📋 Menu</a>
          </div>
        </div>
      `;
    }
    
    // Démarrer
    init();
  </script>
</body>
</html>
