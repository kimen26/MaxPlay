<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-04 – Compte les passagers</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #1a3a2a, #1a2a3a); }
    .pax-group {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #ffffff10;
      border-radius: 12px;
      margin: 4px;
    }
    .pax {
      font-size: 2.2rem;
      animation: popIn 0.3s ease-out;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .groups-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">👥 Compte les passagers</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Question -->
    <div class="qbox" style="padding:20px 12px;">
      <div class="groups-container" id="groups">
        <!-- Groupes générés par JS -->
      </div>
      <div class="qtxt" style="font-size:1.2rem;margin-top:12px;">
        Combien de passagers en tout ?
      </div>
    </div>
    
    <!-- Choices -->
    <div class="choices" id="choices" style="grid-template-columns:repeat(4,1fr);padding:0 12px;">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/qcm-retry.js"></script>
  <script>
    // ─── MJ-03a: Compte les passagers ───
    // Des passagers arrivent par GROUPES → Max compte le total
    // Groupements visuels: 2+3+3 plutôt que 8 en ligne
    
    let score = 0;
    let streak = 0;
    let qcm = null;
    let correctAnswer = 0;
    
    const EMOJIS = ['🧍', '🧍‍♂️', '🧍‍♀️', '👨', '👩', '👴', '👵'];
    
    function init() {
      score = 0;
      streak = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      nextQuestion();
    }
    
    function nextQuestion() {
      qcm = QcmRetry.create();
      
      // Générer un total entre 3 et 10
      const total = 3 + Math.floor(Math.random() * 8);
      correctAnswer = total;
      
      // Décomposer en groupes (max 3 par groupe)
      const groups = decomposeIntoGroups(total);
      
      // Afficher les groupes
      const container = document.getElementById('groups');
      container.innerHTML = '';
      
      const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      
      groups.forEach((count, i) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'pax-group';
        groupDiv.style.animationDelay = `${i * 0.2}s`;
        
        for (let j = 0; j < count; j++) {
          const span = document.createElement('span');
          span.className = 'pax';
          span.textContent = emoji;
          span.style.animationDelay = `${i * 0.2 + j * 0.05}s`;
          groupDiv.appendChild(span);
        }
        
        container.appendChild(groupDiv);
      });
      
      // Générer les choix
      const wrongs = [];
      for (let v = 1; v <= 12; v++) {
        if (v !== correctAnswer) wrongs.push(v);
      }
      const options = [correctAnswer, ...shuffle(wrongs).slice(0, 3)];
      
      // Afficher les choix
      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';
      
      shuffle(options).forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'ch';
        btn.style.fontSize = '1.4rem';
        btn.style.minHeight = '60px';
        btn.textContent = num;
        if (num === correctAnswer) btn.dataset.correct = '1';
        btn.onclick = () => answer(num === correctAnswer, btn);
        choicesDiv.appendChild(btn);
      });
    }
    
    // Décompose un nombre en groupes de max 3
    function decomposeIntoGroups(n) {
      const groups = [];
      let remaining = n;
      
      while (remaining > 0) {
        // Groupe aléatoire entre 2 et 3 (ou 1 si reste 1)
        let groupSize;
        if (remaining === 1) {
          groupSize = 1;
        } else if (remaining === 2) {
          groupSize = 2;
        } else {
          groupSize = 2 + Math.floor(Math.random() * 2); // 2 ou 3
        }
        groups.push(groupSize);
        remaining -= groupSize;
      }
      
      return groups;
    }
    
    function answer(isCorrect, btn) {
      if (btn.disabled) return;
      const res = QcmRetry.handle(qcm, isCorrect);
      if (res.outcome === 'ignored') return;
      if ((res.outcome === 'correct' || res.outcome === 'reveal') && typeof Tracker !== 'undefined') Tracker.logAnswer(res.outcome === 'correct');

      if (res.outcome === 'correct') {
        btn.classList.add('ok');
        score += res.points;
        if (res.streakInc) streak++; else streak = 0;
        if (streak >= 3) confetti();
        sndDing(); showFB(true);
        updateBar();
        setTimeout(nextQuestion, 1200);
      } else if (res.outcome === 'reveal') {
        btn.classList.add('ko'); btn.disabled = true;
        streak = 0;
        QcmRetry.revealCorrect(document.getElementById('choices'));
        sndBuzz(); showFB(false);
        updateBar();
        setTimeout(nextQuestion, 1600);
      } else {
        btn.classList.add('ko'); btn.disabled = true;
        streak = 0;
        sndBuzz(); showFB(false);
        updateBar();
      }
    }

    function updateBar() {
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';
    }
    
    // Démarrer
    init();
  </script>
  <script src="js/tracker.js"></script>
  <script src="js/comments.js"></script>
</body>
</html>
