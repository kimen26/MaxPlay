<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-04 – Lis la phrase</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #gameScr { background: linear-gradient(160deg, #2a1a3a, #1a2a3a); }
    
    .sentence-box {
      background: #ffffff15;
      border-radius: 20px;
      padding: 24px 20px;
      margin: 12px;
      text-align: center;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .sentence-text {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.5;
      color: #fff;
    }
    
    .sentence-text .blank {
      display: inline-block;
      background: #ffe06644;
      border: 3px solid #ffe066;
      border-radius: 12px;
      padding: 4px 16px;
      margin: 0 4px;
      min-width: 60px;
      color: #ffe066;
      font-weight: 900;
      animation: pulse 0.8s infinite alternate;
    }
    
    .sentence-text .blank.filled {
      background: #00c47a44;
      border-color: #00c47a;
      color: #00c47a;
      animation: popAnim 0.3s ease-out;
    }
    
    .sentence-text .blank.revealed {
      background: #00c47a44;
      border-color: #00c47a;
      color: #00c47a;
    }
    
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
    
    @keyframes popAnim {
      0% { transform: scale(0.7); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      margin-top: 8px;
    }
    
    .choice-btn {
      background: linear-gradient(145deg, #ffffff20, #ffffff10);
      border: 2px solid #ffffff30;
      border-radius: 16px;
      padding: 18px 12px;
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Nunito', sans-serif;
    }
    
    .choice-btn:active {
      transform: scale(0.95);
    }
    
    .choice-btn.ok {
      background: #00c47a;
      border-color: #00c47a;
    }
    
    .choice-btn.ko {
      background: #ff4757;
      border-color: #ff4757;
    }
    
    .question-counter {
      text-align: center;
      font-size: 1rem;
      opacity: 0.7;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .instruction {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 12px;
    }
    
    .emoji-hint {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">📖 Lis la phrase</span>
    </div>
    
    <!-- Score -->
    <div class="scorebar">
      <span class="scoretxt">Score</span>
      <span class="scoreval" id="score">0</span>
      <span class="streak" id="streak"></span>
    </div>
    
    <!-- Question counter -->
    <div class="question-counter" id="qcounter">Question 1 / 5</div>
    
    <!-- Instruction -->
    <div class="instruction">Quel mot manque dans la phrase ?</div>

    <!-- TTS + Emoji -->
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:4px;">
      <div class="emoji-hint" id="emojiHint" style="margin:0;">🚌</div>
      <button class="tts-btn" id="ttsBtn" onclick="speakQuestion()" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:25px;padding:8px 18px;font-size:0.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
        <span>🔊</span><span>Écouter</span>
      </button>
    </div>

    <!-- Sentence with blank -->
    <div class="sentence-box">
      <div class="sentence-text" id="sentenceText">
        <!-- Généré par JS -->
      </div>
    </div>
    
    <!-- Choices -->
    <div class="choices-grid" id="choices">
      <!-- Généré par JS -->
    </div>
  </div>
  
  <!-- Feedback overlay -->
  <div id="fbOverlay"></div>
  
  <!-- Scripts -->
  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script>
    // ─── MJ-04: Lis la phrase ───
    // Max doit trouver le mot manqué [?] dans une phrase simple
    // Phase 1 : mots courts que Max sait lire (BUS, TRAM, PAPA, MAMAN, VELO...)

    const PHRASES = [
      { before: "Papa prend le", answer: "BUS", after: "pour aller au travail.", options: ["BUS", "TRAM", "VELO", "TRAIN"], emoji: "👨" },
      { before: "Max aime le", answer: "TRAM", after: "rouge à Villejuif.", options: ["TRAM", "BUS", "METRO", "VELO"], emoji: "🚊" },
      { before: "Maman est dans le", answer: "METRO", after: "avec Max.", options: ["METRO", "BUS", "TRAM", "TRAIN"], emoji: "👩" },
      { before: "Le bus est", answer: "ROUGE", after: "comme une tomate.", options: ["ROUGE", "BLEU", "VERT", "JAUNE"], emoji: "🔴" },
      { before: "Max monte dans le", answer: "BUS", after: "avec papa.", options: ["BUS", "TRAM", "VELO", "TRAIN"], emoji: "🧒" },
      { before: "Le", answer: "VELO", after: "de papa est dans le garage.", options: ["VELO", "BUS", "TRAM", "TRAIN"], emoji: "🚲" },
      { before: "Le bus est", answer: "VERT", after: "comme un arbre.", options: ["VERT", "ROUGE", "BLEU", "JAUNE"], emoji: "🌳" },
      { before: "Le", answer: "TRAIN", after: "va très vite !", options: ["TRAIN", "BUS", "VELO", "TRAM"], emoji: "🚄" },
      { before: "Le bus est", answer: "BLEU", after: "comme le ciel.", options: ["BLEU", "ROUGE", "VERT", "JAUNE"], emoji: "🔵" },
      { before: "Papa dit", answer: "BRAVO", after: "à Max.", options: ["BRAVO", "MERCI", "BONJOUR", "SALUT"], emoji: "👏" },
      { before: "Max dit", answer: "MERCI", after: "au chauffeur.", options: ["MERCI", "BRAVO", "BONJOUR", "SALUT"], emoji: "😊" },
      { before: "Le", answer: "LOUP", after: "est dans la forêt.", options: ["LOUP", "CHAT", "LION", "OURS"], emoji: "🐺" },
    ];

    let score = 0;
    let streak = 0;
    let questionCount = 0;
    const MAX_QUESTIONS = 5;
    let locked = false;
    let currentPhrase = null;
    let usedIndices = [];

    // TTS
    function speakQuestion(full) {
      if (!currentPhrase) return;
      const text = full
        ? `${currentPhrase.before} ${currentPhrase.answer} ${currentPhrase.after}`
        : `${currentPhrase.before} quelque chose ${currentPhrase.after}`;
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'fr-FR';
      utt.rate = 0.85;
      const voices = speechSynthesis.getVoices();
      const frVoice = voices.find(v => v.lang.startsWith('fr'));
      if (frVoice) utt.voice = frVoice;
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => {};
    }

    function init() {
      score = 0;
      streak = 0;
      questionCount = 0;
      usedIndices = [];
      document.getElementById('score').textContent = '0';
      document.getElementById('streak').textContent = '';
      nextQuestion();
    }

    function getRandomPhrase() {
      let available = PHRASES.map((_, i) => i).filter(i => !usedIndices.includes(i));
      if (available.length === 0) {
        usedIndices = [];
        available = PHRASES.map((_, i) => i);
      }
      const idx = available[Math.floor(Math.random() * available.length)];
      usedIndices.push(idx);
      return PHRASES[idx];
    }

    function nextQuestion() {
      if (questionCount >= MAX_QUESTIONS) {
        showEndScreen();
        return;
      }

      locked = false;
      questionCount++;
      document.getElementById('qcounter').textContent = `Question ${questionCount} / ${MAX_QUESTIONS}`;

      currentPhrase = getRandomPhrase();
      document.getElementById('emojiHint').textContent = currentPhrase.emoji;

      // Afficher la phrase avec case [?]
      const sentenceText = document.getElementById('sentenceText');
      sentenceText.innerHTML = `${currentPhrase.before} <span class="blank" id="blank">?</span> ${currentPhrase.after}`;

      // Afficher les 4 choix (grands boutons texte en majuscules)
      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';
      shuffle([...currentPhrase.options]).forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = option;
        btn.onclick = () => answer(option === currentPhrase.answer, btn, option);
        choicesDiv.appendChild(btn);
      });

      // TTS auto
      setTimeout(() => speakQuestion(false), 400);
    }

    function answer(isCorrect, btn, chosenOption) {
      if (locked) return;
      locked = true;

      const blank = document.getElementById('blank');

      if (isCorrect) {
        btn.classList.add('ok');
        if (blank) { blank.textContent = chosenOption; blank.classList.add('filled'); }
        score += 10;
        streak++;
        if (streak >= 3) confetti();
        sndDing();
        showFB(true);
        // TTS lit la phrase complète
        setTimeout(() => speakQuestion(true), 300);
      } else {
        btn.classList.add('ko');
        const buttons = Array.from(document.querySelectorAll('#choices .choice-btn'));
        const correctBtn = buttons.find(b => b.textContent === currentPhrase.answer);
        if (correctBtn) correctBtn.classList.add('ok');
        if (blank) { blank.textContent = currentPhrase.answer; blank.classList.add('revealed'); }
        streak = 0;
        sndBuzz();
        showFB(false);
        // TTS lit la bonne réponse
        setTimeout(() => speakQuestion(true), 300);
      }

      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak >= 2 ? `🔥×${streak}` : '';

      setTimeout(nextQuestion, 2200);
    }

    function showEndScreen() {
      sndVictory();
      confetti();
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;text-align:center;padding:20px;">
          <div style="font-size:5rem;margin-bottom:20px;">🏆</div>
          <h2 style="font-size:2rem;margin-bottom:20px;color:#ffe066;">Super !</h2>
          <p style="font-size:1.4rem;margin-bottom:30px;">Tu as fait <strong>${score}</strong> points !</p>
          <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
            <a href="mj-04.html" style="background:#00c47a;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">🔄 Rejouer</a>
            <a href="index.html" style="background:#ffffff22;color:#fff;padding:15px 30px;border-radius:30px;text-decoration:none;font-weight:900;font-size:1.1rem;">📋 Menu</a>
          </div>
        </div>
      `;
    }

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    init();
  </script>
</body>
</html>
