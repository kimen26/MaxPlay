<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MJ-08 – Au garage !</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .hdr {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .back {
      color: #fff;
      text-decoration: none;
      font-size: 1.5rem;
      margin-right: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .back:hover, .back:active { background: rgba(255,255,255,0.2); }

    .htitle {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      flex: 1;
    }

    /* ── Progress bar ── */
    .scorebar {
      padding: 8px 16px;
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00c47a, #ffe066, #ff6b6b);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .bus-count {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
      margin-top: 6px;
      font-weight: 700;
    }

    /* ── Game layout ── */
    .game-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Zone gauche : bus à glisser */
    #busZone {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Zone droite : garage */
    #garageCol {
      width: 120px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(0,0,0,0.35);
      border-left: 2px solid rgba(255,255,255,0.2);
      overflow: hidden;
    }

    /* ── Slots ── */
    .slot {
      flex: 1;
      min-height: 0;
      max-height: 90px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .slot:last-child { border-bottom: none; }

    .slot.hover-ok {
      box-shadow: inset 0 0 0 3px rgba(0, 255, 150, 0.7);
    }

    /* Badge numéro dans le slot */
    .slot-badge {
      font-size: 1rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.5);
      z-index: 1;
      pointer-events: none;
      background: rgba(0,0,0,0.35);
      padding: 3px 8px;
      border-radius: 8px;
    }

    /* Porte de garage — s'abaisse depuis le bas */
    .slot-door {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: #2a2a3a;
      border-top: 3px solid #444;
      z-index: 5;
      transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .slot-door::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 8px;
      right: 8px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    .slot.parked .slot-door {
      height: 100%;
    }

    /* ── Bus draggables ── */
    .bus-draggable {
      position: absolute;
      cursor: grab;
      touch-action: none;
      z-index: 10;
      transition: transform 0.15s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .bus-draggable:active,
    .bus-draggable.dragging {
      cursor: grabbing;
      z-index: 20;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.7));
      transform: scale(1.08);
    }

    .bus-draggable.parked {
      cursor: default;
      pointer-events: none;
      transition: left 0.3s ease, top 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    .bus-draggable.wrong {
      animation: shake 0.4s ease;
    }

    /* Info texte bas */
    .garage-info {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 120px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      font-weight: 700;
      pointer-events: none;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.8; transform: scale(1.03); }
    }

    .pulse { animation: pulseText 1s ease-in-out infinite; color: #ffe066; }

    /* ── Victory overlay ── */
    .victory-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s ease;
    }

    .victory-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .victory-content {
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .victory-overlay.show .victory-content { transform: scale(1); }

    .victory-emoji {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: bounce 1s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-16px); }
    }

    .victory-title {
      font-size: 2.2rem;
      color: #ffe066;
      margin-bottom: 10px;
    }

    .victory-text {
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 28px;
      opacity: 0.9;
    }

    .victory-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .victory-btn {
      padding: 14px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 900;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: all 0.2s;
    }

    .victory-btn.primary {
      background: linear-gradient(135deg, #00c47a, #00a86b);
      color: #fff;
    }

    .victory-btn.secondary {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .victory-btn:hover, .victory-btn:active { transform: translateY(-3px); }

    /* Confetti */
    .confetti {
      position: fixed;
      width: 12px;
      height: 12px;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🚌 Au garage !</span>
    </div>

    <!-- Progress -->
    <div class="scorebar">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="bus-count" id="busCount">Bus garés : 0 / 6</div>
    </div>

    <!-- Game -->
    <div class="game-area">
      <!-- Zone bus (gauche) -->
      <div id="busZone">
        <div class="garage-info" id="info">
          Glisse chaque bus dans sa case à droite !
        </div>
      </div>

      <!-- Colonne garage (droite) -->
      <div id="garageCol" id="garageCol"></div>
    </div>
  </div>

  <!-- Victory -->
  <div class="victory-overlay" id="victoryOverlay">
    <div class="victory-content">
      <div class="victory-emoji">🎉</div>
      <h2 class="victory-title">Génial !</h2>
      <p class="victory-text">Tu as garé tous les bus !<br>Tu es un super conducteur ! 🚌</p>
      <div class="victory-buttons">
        <button class="victory-btn primary" onclick="location.reload()">🔄 Rejouer</button>
        <a href="index.html" class="victory-btn secondary">📋 Menu</a>
      </div>
    </div>
  </div>

  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
  <script>
    // ─── MJ-06 : Au garage ! ───
    // Bus SVG IDFM → garage colonne droite, drag & drop

    // Toutes les lignes IDFM depuis data.js — tirage de 6 au hasard parmi les couleurs uniques
    // (pas de doublons de couleur pour éviter confusion dans le garage)
    const BUS_POOL = LIGNES.filter(l => {
      const sameColor = LIGNES.filter(x => x.color === l.color);
      return sameColor.length === 1; // exclure les paires de couleur identique (N15/N22, V6/380, 132/2234)
    });
    // Mélanger et prendre 6 lignes avec couleurs distinctes
    const BUS_LINES = selectDistinctColors(BUS_POOL, 6, 60);

    const BUS_WIDTH = 120;
    const SNAP_DIST = 100;

    let buses = [];
    let draggedBus = null;
    let dragOffset = { x: 0, y: 0 };
    let parkedCount = 0;
    let gameComplete = false;

    // ── Audio inline — AudioContext SINGLETON pour éviter les coupures ──
    let _ac = null;
    function getAC() {
      if (!_ac || _ac.state === 'closed') {
        _ac = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (_ac.state === 'suspended') _ac.resume();
      return _ac;
    }

    function sndVictory() {
      try {
        const ac = getAC(), t = ac.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          const o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination);
          o.type = i < 2 ? 'triangle' : 'sine';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.25 - i * 0.05, t + 0.1);
          g.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
          o.start(t); o.stop(t + 1.5);
        });
      } catch(e) {}
    }

    function sndKlaxon() {
      try {
        const ac = getAC(), t = ac.currentTime;
        [0, 0.25].forEach(delay => {
          const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
          o.connect(f); f.connect(g); g.connect(ac.destination);
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(350, t + delay);
          o.frequency.exponentialRampToValueAtTime(280, t + delay + 0.15);
          f.type = 'lowpass'; f.frequency.value = 1200;
          g.gain.setValueAtTime(0, t + delay);
          g.gain.linearRampToValueAtTime(0.35, t + delay + 0.02);
          g.gain.exponentialRampToValueAtTime(0.01, t + delay + 0.2);
          o.start(t + delay); o.stop(t + delay + 0.25);
        });
      } catch(e) {}
    }

    function sndMoteur() {
      try {
        const ac = getAC(), t = ac.currentTime;
        const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
        o.connect(f); f.connect(g); g.connect(ac.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(60, t);
        o.frequency.exponentialRampToValueAtTime(120, t + 0.8);
        f.type = 'lowpass';
        f.frequency.setValueAtTime(400, t);
        f.frequency.linearRampToValueAtTime(2000, t + 0.8);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.3, t + 0.1);
        g.gain.exponentialRampToValueAtTime(0.01, t + 1.0);
        o.start(t); o.stop(t + 1.0);
      } catch(e) {}
    }

    function sndTschh() {
      try {
        const ac = getAC(), t = ac.currentTime;
        const buf = ac.createBuffer(1, ac.sampleRate * 0.3, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const src = ac.createBufferSource(), f = ac.createBiquadFilter(), g = ac.createGain();
        src.buffer = buf; src.connect(f); f.connect(g); g.connect(ac.destination);
        f.type = 'bandpass'; f.frequency.value = 3000; f.Q.value = 1;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        src.start(t);
      } catch(e) {}
    }

    function sndPorte() {
      try {
        const ac = getAC(), t = ac.currentTime;
        const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.sin(i / d.length * Math.PI);
        const src = ac.createBufferSource(), f = ac.createBiquadFilter(), g = ac.createGain();
        src.buffer = buf; src.connect(f); f.connect(g); g.connect(ac.destination);
        f.type = 'lowpass';
        f.frequency.setValueAtTime(200, t);
        f.frequency.linearRampToValueAtTime(800, t + 0.3);
        g.gain.setValueAtTime(0.2, t);
        g.gain.linearRampToValueAtTime(0.01, t + 0.5);
        src.start(t);
      } catch(e) {}
    }

    function sndBuzz() {
      try {
        const ac = getAC(), t = ac.currentTime;
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'square'; o.frequency.value = 180;
        g.gain.setValueAtTime(0.25, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        o.start(t); o.stop(t + 0.3);
      } catch(e) {}
    }

    // ── Build garage slots ──

    function buildGarage() {
      const col = document.getElementById('garageCol');
      col.innerHTML = '';
      BUS_LINES.forEach(line => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.num = line.num;
        slot.style.background = hexToSlotBg(line.color);

        const badge = document.createElement('div');
        badge.className = 'slot-badge';
        badge.textContent = line.num;

        const door = document.createElement('div');
        door.className = 'slot-door';

        slot.appendChild(badge);
        slot.appendChild(door);
        col.appendChild(slot);
      });
    }

    function hexToSlotBg(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      // Fond couleur du bus, légèrement assombri pour lisibilité
      return `linear-gradient(180deg, rgba(${r},${g},${b},0.75) 0%, rgba(${r},${g},${b},0.55) 100%)`;
    }

    // ── Build draggable buses ──

    function buildBuses() {
      const zone = document.getElementById('busZone');
      // Remove old buses
      zone.querySelectorAll('.bus-draggable').forEach(el => el.remove());
      buses = [];

      const shuffled = [...BUS_LINES].sort(() => Math.random() - 0.5);
      const zoneW = zone.offsetWidth;
      const zoneH = zone.offsetHeight;

      const BUS_H = 52; // hauteur approximative du bus SVG
      const margin = 10;
      const maxX = zoneW - BUS_WIDTH - margin;
      const maxY = zoneH - BUS_H - margin;

      // Placement aléatoire sans chevauchement — max 80 tentatives par bus
      const placed = [];
      function overlaps(x, y) {
        return placed.some(p =>
          Math.abs(p.x - x) < BUS_WIDTH + margin &&
          Math.abs(p.y - y) < BUS_H + margin
        );
      }

      shuffled.forEach((line, i) => {
        const el = document.createElement('div');
        el.className = 'bus-draggable';
        el.dataset.num = line.num;
        el.innerHTML = busSVG(line.color, line.textColor, line.num, BUS_WIDTH);

        // Position aléatoire visible dans busZone, sans toucher les bords ni la zone garage
        let x, y, attempts = 0;
        do {
          x = margin + Math.random() * (maxX - margin);
          y = margin + Math.random() * (maxY - margin);
          attempts++;
        } while (overlaps(x, y) && attempts < 80);
        placed.push({ x, y });

        el.style.left = x + 'px';
        el.style.top  = y + 'px';

        zone.appendChild(el);
        el.addEventListener('mousedown', onDragStart);
        el.addEventListener('touchstart', onDragStart, { passive: false });

        buses.push({ el, num: line.num, x, y, initX: x, initY: y, parked: false });

        // Entrée depuis la gauche
        el.style.left = (-BUS_WIDTH - 20) + 'px';
        setTimeout(() => {
          el.style.transition = 'left 0.6s cubic-bezier(0.22,1,0.36,1)';
          el.style.left = x + 'px';
          setTimeout(() => {
            el.style.transition = '';
            sndKlaxon();
          }, 650);
        }, i * 180);
      });
    }

    // ── Drag & Drop ──

    function onDragStart(e) {
      if (gameComplete) return;
      const bus = buses.find(b => b.el === e.currentTarget);
      if (!bus || bus.parked) return;
      e.preventDefault();

      draggedBus = bus;
      const pt = getPoint(e);
      const rect = bus.el.getBoundingClientRect();
      dragOffset.x = pt.x - rect.left;
      dragOffset.y = pt.y - rect.top;

      bus.el.classList.add('dragging');
      sndPorte();

      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
      document.addEventListener('touchmove', onDragMove, { passive: false });
      document.addEventListener('touchend', onDragEnd);
    }

    function onDragMove(e) {
      if (!draggedBus) return;
      e.preventDefault();

      const pt = getPoint(e);
      const zone = document.getElementById('busZone');
      const zRect = zone.getBoundingClientRect();

      let x = pt.x - zRect.left - dragOffset.x;
      let y = pt.y - zRect.top  - dragOffset.y;

      // Constrain loosely (allow going slightly into garage col for snap)
      x = Math.max(-10, Math.min(x, zRect.width + 20));
      y = Math.max(-10, Math.min(y, zRect.height - 30));

      draggedBus.x = x;
      draggedBus.y = y;
      draggedBus.el.style.left = x + 'px';
      draggedBus.el.style.top  = y + 'px';

      // Highlight matching slot
      highlightSlot(draggedBus);
    }

    function onDragEnd(e) {
      if (!draggedBus) return;
      draggedBus.el.classList.remove('dragging');

      // Remove all highlights
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('hover-ok'));

      checkDrop(draggedBus);

      draggedBus = null;
      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup', onDragEnd);
      document.removeEventListener('touchmove', onDragMove);
      document.removeEventListener('touchend', onDragEnd);
    }

    function getPoint(e) {
      if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function highlightSlot(bus) {
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('hover-ok'));
      const slot = findNearestSlot(bus);
      if (slot && slot.num === bus.num && !slot.el.classList.contains('parked')) {
        slot.el.classList.add('hover-ok');
      }
    }

    function findNearestSlot(bus) {
      const busRect = bus.el.getBoundingClientRect();
      const busCenter = { x: busRect.left + busRect.width / 2, y: busRect.top + busRect.height / 2 };

      let best = null;
      let bestDist = Infinity;

      document.querySelectorAll('.slot').forEach(slotEl => {
        if (slotEl.classList.contains('parked')) return;
        const sRect = slotEl.getBoundingClientRect();
        const sCenter = { x: sRect.left + sRect.width / 2, y: sRect.top + sRect.height / 2 };
        const dist = Math.hypot(busCenter.x - sCenter.x, busCenter.y - sCenter.y);
        if (dist < bestDist) {
          bestDist = dist;
          best = { el: slotEl, num: slotEl.dataset.num, dist };
        }
      });

      return best && best.dist < SNAP_DIST ? best : null;
    }

    function checkDrop(bus) {
      const nearest = findNearestSlot(bus);

      if (!nearest) {
        wrongPark(bus);
        return;
      }

      if (nearest.num === bus.num) {
        parkBus(bus, nearest.el);
      } else {
        wrongPark(bus);
      }
    }

    function parkBus(bus, slotEl) {
      bus.parked = true;
      slotEl.classList.add('parked');

      // Snap bus into slot center
      const zone = document.getElementById('busZone');
      const zRect = zone.getBoundingClientRect();
      const sRect = slotEl.getBoundingClientRect();

      const finalX = sRect.left - zRect.left + (sRect.width - BUS_WIDTH) / 2;
      const finalY = sRect.top  - zRect.top  + (sRect.height - 50) / 2;

      bus.el.style.transition = 'left 0.25s ease, top 0.25s ease';
      bus.el.style.left = finalX + 'px';
      bus.el.style.top  = finalY + 'px';
      bus.el.classList.add('parked');

      setTimeout(() => { bus.el.style.transition = ''; }, 300);

      sndTschh();
      parkedCount++;
      updateProgress();

      if (parkedCount === BUS_LINES.length) {
        gameComplete = true;
        setTimeout(() => {
          sndVictory();
          createConfetti();
          busParade(BUS_LINES);
          document.getElementById('victoryOverlay').classList.add('show');
        }, 900);
      }
    }

    function wrongPark(bus) {
      sndBuzz();
      bus.el.classList.add('wrong');
      // Return to initial position
      setTimeout(() => {
        bus.el.style.transition = 'left 0.35s ease, top 0.35s ease';
        bus.el.style.left = bus.initX + 'px';
        bus.el.style.top  = bus.initY + 'px';
        bus.x = bus.initX;
        bus.y = bus.initY;
        setTimeout(() => {
          bus.el.style.transition = '';
          bus.el.classList.remove('wrong');
        }, 380);
      }, 50);
    }

    // ── Progress ──

    function updateProgress() {
      const total = BUS_LINES.length;
      const pct = (parkedCount / total) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('busCount').textContent = `Bus garés : ${parkedCount} / ${total}`;

      const info = document.getElementById('info');
      if (parkedCount === total) {
        info.innerHTML = '<span class="pulse">🎉 Bravo ! Tous les bus sont garés !</span>';
      } else {
        info.textContent = `Glisse chaque bus dans sa case ! (${parkedCount}/${total})`;
      }
    }

    // ── Confetti ──

    function createConfetti() {
      const colors = ['#E2001A','#00A092','#6EBE4A','#82C8E6','#ffe066','#fff'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-20px';
          c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          document.body.appendChild(c);
          c.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
            { transform: `translate(${(Math.random()-0.5)*200}px,${window.innerHeight+50}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
          ], { duration: 2000 + Math.random() * 2000, easing: 'ease-in' }).onfinish = () => c.remove();
        }, i * 50);
      }
    }

    // ── Init ──

    function init() {
      buildGarage();
      buildBuses();
      updateProgress();
      sndMoteur();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
