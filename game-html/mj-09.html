<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MJ-09 – Trie les bus !</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    #app { display:flex; flex-direction:column; height:100dvh; max-width:1000px; margin:0 auto; }

    /* Header */
    .hdr {
      display:flex; align-items:center; padding:8px 14px; flex-shrink:0;
      background:rgba(255,255,255,0.08); border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .back { color:#fff; text-decoration:none; font-size:1.4rem; margin-right:10px; padding:4px 8px; border-radius:8px; }
    .back:active { background:rgba(255,255,255,0.2); }
    .htitle { color:#fff; font-size:1.1rem; font-weight:900; flex:1; }

    /* Progress */
    .scorebar { padding:6px 14px; background:rgba(0,0,0,0.2); flex-shrink:0; }
    .progress-bar { width:100%; height:10px; background:rgba(255,255,255,0.15); border-radius:5px; overflow:hidden; }
    .progress-fill {
      height:100%; border-radius:5px;
      background: linear-gradient(90deg, #00c47a, #ffe066, #ff6b6b);
      background-size:200% 100%;
      animation:shimmer 2s infinite;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .bus-count { text-align:center; font-size:0.8rem; color:rgba(255,255,255,0.8); margin-top:4px; font-weight:700; }

    /* Layout principal */
    .game-area { flex:1; display:flex; gap:0; overflow:hidden; }

    /* Zone gauche : bus à trier */
    #busZone {
      flex:1; position:relative; overflow:hidden;
      border-right:2px solid rgba(255,255,255,0.1);
    }
    .zone-label {
      position:absolute; top:8px; left:0; right:0;
      text-align:center; font-size:0.75rem; color:rgba(255,255,255,0.5);
      font-weight:700; text-transform:uppercase; letter-spacing:2px; pointer-events:none;
    }

    /* Zone droite : boîtes de familles */
    #boxZone {
      width:130px; flex-shrink:0;
      display:flex; flex-direction:column;
      overflow:hidden;
      background:rgba(0,0,0,0.3);
    }

    /* Boîte de famille */
    .family-box {
      flex:1;
      min-height:0;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
      transition:box-shadow 0.15s;
      overflow:hidden;
      padding:4px;
    }
    .family-box:last-child { border-bottom:none; }
    .family-box.hover-ok { box-shadow:inset 0 0 0 3px rgba(0,255,150,0.8); }
    .family-box.full { opacity:0.6; }

    .box-label {
      font-size:0.8rem; font-weight:900; color:#fff;
      text-shadow:0 1px 4px rgba(0,0,0,0.8);
      background:rgba(0,0,0,0.4);
      padding:2px 6px; border-radius:6px;
      z-index:1; pointer-events:none;
      text-align:center; line-height:1.2;
    }
    .box-count {
      position:absolute; top:3px; right:4px;
      font-size:0.7rem; font-weight:900; color:#fff;
      background:rgba(0,0,0,0.5); border-radius:10px;
      padding:1px 5px; pointer-events:none; z-index:2;
    }
    /* Mini bus dans boîte quand rangés */
    .box-parked {
      position:absolute; inset:0;
      display:flex; flex-wrap:wrap; align-items:center;
      justify-content:center; gap:2px; padding:4px;
      pointer-events:none;
    }
    .box-parked svg { width:28px !important; height:auto !important; }

    /* Bus draggables */
    .bus-draggable {
      position:absolute; cursor:grab; touch-action:none; z-index:10;
      transition:transform 0.12s;
      filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    }
    .bus-draggable:active, .bus-draggable.dragging {
      cursor:grabbing; z-index:20;
      filter:drop-shadow(0 6px 14px rgba(0,0,0,0.7));
      transform:scale(1.06) !important;
    }
    .bus-draggable.parked { cursor:default; pointer-events:none; opacity:0; transition:opacity 0.3s; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)}
      60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
    }
    .bus-draggable.wrong { animation:shake 0.35s ease; }

    /* Défilé victoire */
    .parade-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.92);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:1000; opacity:0; visibility:hidden; transition:all 0.5s;
    }
    .parade-overlay.show { opacity:1; visibility:visible; }

    .parade-title { font-size:2.2rem; color:#ffe066; font-weight:900; margin-bottom:8px; text-align:center; }
    .parade-sub { font-size:1.1rem; color:#fff; opacity:0.8; margin-bottom:24px; text-align:center; }

    /* Familles défilé */
    .parade-families { width:100%; overflow:hidden; flex-shrink:0; }
    .parade-row {
      display:flex; align-items:center; padding:6px 12px; gap:8px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      animation:slideIn 0.4s ease both;
    }
    @keyframes slideIn { from{transform:translateX(-60px);opacity:0} to{transform:translateX(0);opacity:1} }
    .parade-badge {
      font-size:0.85rem; font-weight:900; color:#fff;
      padding:3px 8px; border-radius:8px; min-width:50px; text-align:center;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
      flex-shrink:0;
    }
    .parade-buses { display:flex; flex-wrap:wrap; gap:4px; }
    .parade-buses svg { width:36px !important; height:auto !important; }

    .parade-btns { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
    .parade-btn {
      padding:13px 26px; border-radius:28px; font-weight:900; font-size:1rem;
      border:none; cursor:pointer; font-family:'Nunito',sans-serif;
    }
    .parade-btn.primary { background:linear-gradient(135deg,#00c47a,#00a86b); color:#fff; }
    .parade-btn.secondary { background:rgba(255,255,255,0.15); color:#fff; }
  </style>
</head>
<body>

  <div class="hdr">
    <a href="index.html" class="back">←</a>

  </div>
  <div class="scorebar">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  </div>
  <div class="game-area">

    <div id="boxZone"></div>

</div>

<div class="parade-overlay" id="paradeOverlay">
  <div class="parade-title">🎉 BRAVO ! Tout rangé !</div>
  <div class="parade-sub">Voilà toutes les familles de bus !</div>
  <div class="parade-families" id="paradeFamilies"></div>
  <div class="parade-btns">
    <button class="parade-btn primary" onclick="location.reload()">🔄 Rejouer</button>

</div>

<script src="js/sounds.js"></script>
<script src="js/tts.js"></script>
<script src="js/victory-sounds.js"></script>
<script src="js/feedback.js"></script>
<script src="js/data.js"></script>
<script src="js/bus-svg.js"></script>
<script src="js/drag-drop.js"></script>
<script>
  // ─── MJ-09 : Trie les bus ! ───
  // Pool : 26 bus Max + 39 métros/RER/tramways = ~65 véhicules
  // 6 familles : bleu / vert / orange-jaune / violet-rose / rouge / brun
  // Victoire : défilé de toutes les familles

  // ── Familles de couleur (6 groupes) ──
  // Couvre bus connus de Max + métros + RER + tramways
  // Les couleurs non listées sont mappées via HSL dans getFamilyForLine()
  const FAMILIES = [
    { id: 'bleu',         label: '🔵 Bleu',         colors: ['#0064B1','#006EB8','#000091','#216EB4','#0055C8','#5291CE','#0064B0','#6EC4E8','#99D4D8','#5B9BD5'] },
    { id: 'vert',         label: '🟢 Vert',         colors: ['#008C59','#75CE89','#6ECA97','#007852','#00814F','#006633','#00A092'] },
    { id: 'orange_jaune', label: '🟡 Orange/Jaune', colors: ['#F58443','#DCAC27','#C2A000','#CEC92A','#9B9839','#FFCD00','#FFCE00','#F4C932','#E3B32A','#FF7E2E','#F28E42','#C9910D','#9F9825','#FFBE00','#FFBE02','#FFCD02','#FFC107'] },
    { id: 'violet_rose',  label: '🟣 Violet/Rose',  colors: ['#652C90','#B43C95','#C9A2CD','#FF82B4','#FA9ABA','#9C27B0','#62259D','#662483','#C5A3CD','#C04191','#E91E63'] },
    { id: 'rouge',        label: '🔴 Rouge',        colors: ['#E3051C','#A50034','#B90845'] },
    { id: 'brun',         label: '🟤 Brun',         colors: ['#8D653A','#704B1C','#8D5E2A'] },
  ];

  // Représentant de chaque famille (1ère couleur) pour le fond des boîtes
  const FAMILY_REPR = {
    bleu:'#0064B1', vert:'#008C59', orange_jaune:'#F58443',
    violet_rose:'#652C90', rouge:'#E3051C', brun:'#8D653A',
  };

  // Métros, RER et tramways d'Île-de-France
  const METRO_RER_TRAM = [
    // ── Métro ──
    { num:'1',    color:'#FFCD00', textColor:'#333', type:'metro' },
    { num:'2',    color:'#0055C8', textColor:'#fff', type:'metro' },
    { num:'3',    color:'#6ECA97', textColor:'#333', type:'metro' },
    { num:'3bis', color:'#99D4D8', textColor:'#333', type:'metro' },
    { num:'4',    color:'#C9910D', textColor:'#333', type:'metro' },
    { num:'5',    color:'#FF7E2E', textColor:'#333', type:'metro' },
    { num:'6',    color:'#6EC4E8', textColor:'#333', type:'metro' },
    { num:'7',    color:'#FA9ABA', textColor:'#333', type:'metro' },
    { num:'7bis', color:'#6ECA97', textColor:'#333', type:'metro' },
    { num:'8',    color:'#C5A3CD', textColor:'#333', type:'metro' },
    { num:'9',    color:'#CEC92A', textColor:'#333', type:'metro' },
    { num:'10',   color:'#C9910D', textColor:'#333', type:'metro' },
    { num:'11',   color:'#704B1C', textColor:'#fff', type:'metro' },
    { num:'12',   color:'#007852', textColor:'#fff', type:'metro' },
    { num:'13',   color:'#6EC4E8', textColor:'#333', type:'metro' },
    { num:'14',   color:'#62259D', textColor:'#fff', type:'metro' },
    { num:'15',   color:'#A50034', textColor:'#fff', type:'metro' },
    { num:'16',   color:'#F4C932', textColor:'#333', type:'metro' },
    { num:'17',   color:'#6EC4E8', textColor:'#333', type:'metro' },
    { num:'18',   color:'#00A092', textColor:'#fff', type:'metro' },
    // ── RER ──
    { num:'A',    color:'#E3051C', textColor:'#fff', type:'rer' },
    { num:'B',    color:'#5291CE', textColor:'#333', type:'rer' },
    { num:'C',    color:'#FFCE00', textColor:'#333', type:'rer' },
    { num:'D',    color:'#00814F', textColor:'#fff', type:'rer' },
    { num:'E',    color:'#C04191', textColor:'#fff', type:'rer' },
    // ── Tramway ──
    { num:'T1',   color:'#0064B0', textColor:'#fff', type:'tramway' },
    { num:'T2',   color:'#C04191', textColor:'#fff', type:'tramway' },
    { num:'T3a',  color:'#F28E42', textColor:'#333', type:'tramway' },
    { num:'T3b',  color:'#00814F', textColor:'#fff', type:'tramway' },
    { num:'T4',   color:'#E3B32A', textColor:'#333', type:'tramway' },
    { num:'T5',   color:'#662483', textColor:'#fff', type:'tramway' },
    { num:'T6',   color:'#E3051C', textColor:'#fff', type:'tramway' },
    { num:'T7',   color:'#8D5E2A', textColor:'#fff', type:'tramway' },
    { num:'T8',   color:'#9F9825', textColor:'#333', type:'tramway' },
    { num:'T9',   color:'#5291CE', textColor:'#333', type:'tramway' },
    { num:'T10',  color:'#9F9825', textColor:'#333', type:'tramway' },
    { num:'T11',  color:'#F28E42', textColor:'#333', type:'tramway' },
    { num:'T12',  color:'#B90845', textColor:'#fff', type:'tramway' },
    { num:'T13',  color:'#8D5E2A', textColor:'#fff', type:'tramway' },
  ];

  // ── Mapping couleur → famille via liste explicite, puis fallback HSL ──
  function hexToHsl(hex) {
    let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
    if (max===min) return [0,0,l*100];
    const d=max-min, s=l>0.5?d/(2-max-min):d/(max+min);
    let h = max===r?(g-b)/d+(g<b?6:0) : max===g?(b-r)/d+2 : (r-g)/d+4;
    return [h*60, s*100, l*100];
  }

  function getFamilyByHsl(hex) {
    const [h, s, l] = hexToHsl(hex);
    if (s < 15) return 'brun';  // très désaturé
    // Brun : hue orange/jaune + luminosité faible (teintes sombres)
    if (h >= 20 && h < 55 && l < 42) return 'brun';
    if (l < 16) return 'brun';  // très sombre quel que soit le hue
    // Rouge bordeaux : hue > 320 ou < 10 avec luminosité < 45
    if ((h >= 320 || h < 10) && l < 48) return 'rouge';
    // Hue ranges principaux
    if (h < 20)  return 'rouge';
    if (h < 55)  return 'orange_jaune';
    if (h < 80)  return 'orange_jaune';
    if (h < 175) return 'vert';
    if (h < 205) return 'vert';    // cyan-teal → vert
    if (h < 265) return 'bleu';
    if (h < 355) return 'violet_rose';
    return 'rouge';
  }

  function getFamilyForLine(line) {
    const byList = FAMILIES.find(f => f.colors.includes(line.color));
    if (byList) return byList;
    // Fallback HSL
    const id = getFamilyByHsl(line.color);
    return FAMILIES.find(f => f.id === id) || null;
  }

  // Pool complet : bus connus de Max + métros + RER + tramways — limité à 30
  const _POOL = [...LIGNES, ...METRO_RER_TRAM];
  const ALL_BUSES = _POOL.sort(() => Math.random() - 0.5).slice(0, 30);

  const BUS_WIDTH = 90;
  const SNAP_DIST = 90;

  let buses = [];
  let draggedBus = null;
  let dragOffset = { x:0, y:0 };
  let rangedCount = 0;
  const totalBuses = ALL_BUSES.length;
  // Suivi : combien dans chaque boîte
  const boxCounts = {};
  FAMILIES.forEach(f => boxCounts[f.id] = 0);

  // ── TTS (via js/tts.js) ──
  function speakLine(line) {
    let text;
    if (line.type === 'rer')     text = 'RER ' + line.num;
    else if (line.type === 'metro')   text = 'Métro ' + line.num;
    else if (line.type === 'tramway') text = 'Tram ' + line.num.substring(1);
    else text = getLineDisplayName(line.num); // bus/noctilien/valouette/TVM
    TTS.speak(text, { volume: 0.9 });
  }

  // ── Audio singleton ──
  let _ac = null;
  function getAC() {
    if (!_ac || _ac.state === 'closed') _ac = new (window.AudioContext || window.webkitAudioContext)();
    if (_ac.state === 'suspended') _ac.resume();
    return _ac;
  }
  function sndOk() {
    try {
      const ac = getAC(), t = ac.currentTime;
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = 660;
      g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.3);
      o.start(t); o.stop(t+0.3);
    } catch(e){}
  }
  function sndWrong() {
    try {
      const ac = getAC(), t = ac.currentTime;
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'square'; o.frequency.value = 180;
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.3);
      o.start(t); o.stop(t+0.3);
    } catch(e){}
  }
  function sndVictory() {
    try {
      const ac = getAC(), t = ac.currentTime;
      [523,659,784,1047].forEach((f,i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0, t+i*0.12); g.gain.linearRampToValueAtTime(0.22, t+i*0.12+0.08);
        g.gain.exponentialRampToValueAtTime(0.01, t+i*0.12+0.6);
        o.start(t+i*0.12); o.stop(t+i*0.12+0.6);
      });
    } catch(e){}
  }

  // ── Construire les boîtes ──
  function buildBoxes() {
    const col = document.getElementById('boxZone');
    col.innerHTML = '';
    FAMILIES.forEach(fam => {
      const box = document.createElement('div');
      box.className = 'family-box';
      box.dataset.family = fam.id;
      const r = parseInt(FAMILY_REPR[fam.id].slice(1,3),16);
      const g = parseInt(FAMILY_REPR[fam.id].slice(3,5),16);
      const b = parseInt(FAMILY_REPR[fam.id].slice(5,7),16);
      box.style.background = `linear-gradient(180deg,rgba(${r},${g},${b},0.55),rgba(${r},${g},${b},0.3))`;
      box.innerHTML = `
        <span class="box-label">${fam.label}</span>
        <span class="box-count" id="cnt-${fam.id}">0</span>
        <div class="box-parked" id="parked-${fam.id}"></div>
      `;
      col.appendChild(box);
    });
  }

  // ── Construire les bus ──
  function buildBuses() {
    const zone = document.getElementById('busZone');
    zone.querySelectorAll('.bus-draggable').forEach(el => el.remove());
    buses = [];

    const shuffled = [...ALL_BUSES];
    const zoneW = zone.offsetWidth;
    const zoneH = zone.offsetHeight;

    const BUS_H = 52;
    const margin = 10;
    const labelH = 24; // zone-label en haut
    const maxX = zoneW - BUS_WIDTH - margin;
    const maxY = zoneH - BUS_H - margin;

    // Placement aléatoire sans chevauchement
    const placed = [];
    function overlaps(x, y) {
      return placed.some(p =>
        Math.abs(p.x - x) < BUS_WIDTH + margin &&
        Math.abs(p.y - y) < BUS_H + margin
      );
    }

    shuffled.forEach((line, i) => {
      let x, y, attempts = 0;
      do {
        x = margin + Math.random() * (maxX - margin);
        y = labelH + margin + Math.random() * (maxY - labelH - margin);
        attempts++;
      } while (overlaps(x, y) && attempts < 100);
      placed.push({ x, y });

      const el = document.createElement('div');
      el.className = 'bus-draggable';
      el.dataset.num = line.num;
      el.dataset.family = getFamilyForLine(line)?.id || '';
      el.innerHTML = busSVG(line.color, line.textColor, line.num, BUS_WIDTH);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      zone.appendChild(el);

      el.addEventListener('mousedown', onDragStart);
      el.addEventListener('touchstart', onDragStart, { passive:false });

      buses.push({ el, num:line.num, family:getFamilyForLine(line)?.id||'', line, x, y, initX:x, initY:y, parked:false });

      // Entrée animée
      el.style.left = (-BUS_WIDTH - 10) + 'px';
      setTimeout(() => {
        el.style.transition = 'left 0.5s cubic-bezier(0.22,1,0.36,1)';
        el.style.left = x + 'px';
        setTimeout(() => { el.style.transition = ''; }, 520);
      }, i * 60);
    });
  }

  // ── Drag & Drop ──
  function onDragStart(e) {
    const bus = buses.find(b => b.el === e.currentTarget);
    if (!bus || bus.parked) return;
    e.preventDefault();
    draggedBus = bus;
    const pt = getPointerXY(e);
    const rect = bus.el.getBoundingClientRect();
    dragOffset.x = pt.x - rect.left;
    dragOffset.y = pt.y - rect.top;
    bus.el.classList.add('dragging');
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchmove', onDragMove, { passive:false });
    document.addEventListener('touchend', onDragEnd);
  }

  function onDragMove(e) {
    if (!draggedBus) return;
    e.preventDefault();
    const pt = getPointerXY(e);
    const zone = document.getElementById('busZone');
    const zRect = zone.getBoundingClientRect();
    const x = pt.x - zRect.left - dragOffset.x;
    const y = pt.y - zRect.top  - dragOffset.y;
    draggedBus.x = x; draggedBus.y = y;
    draggedBus.el.style.left = x + 'px';
    draggedBus.el.style.top  = y + 'px';
    highlightBox(draggedBus);
  }

  function onDragEnd() {
    if (!draggedBus) return;
    draggedBus.el.classList.remove('dragging');
    document.querySelectorAll('.family-box').forEach(b => b.classList.remove('hover-ok'));
    checkDrop(draggedBus);
    draggedBus = null;
    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('touchend', onDragEnd);
  }

function highlightBox(bus) {
    document.querySelectorAll('.family-box').forEach(b => b.classList.remove('hover-ok'));
    const box = findNearestBox(bus);
    if (box && !box.el.classList.contains('full')) box.el.classList.add('hover-ok');
  }

  function findNearestBox(bus) {
    const busRect = bus.el.getBoundingClientRect();
    const bx = busRect.left + busRect.width/2;
    const by = busRect.top  + busRect.height/2;
    let best = null, bestDist = Infinity;
    document.querySelectorAll('.family-box').forEach(boxEl => {
      const r = boxEl.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const d = Math.hypot(bx-cx, by-cy);
      if (d < bestDist) { bestDist = d; best = { el:boxEl, id:boxEl.dataset.family, dist:d }; }
    });
    return best && best.dist < SNAP_DIST ? best : null;
  }

  function checkDrop(bus) {
    const nearest = findNearestBox(bus);
    if (!nearest) { if (typeof Tracker !== 'undefined') Tracker.logAnswer(false); wrongPark(bus); return; }
    if (nearest.id === bus.family) {
      if (typeof Tracker !== 'undefined') Tracker.logAnswer(true);
      parkBus(bus, nearest);
    } else {
      if (typeof Tracker !== 'undefined') Tracker.logAnswer(false);
      wrongPark(bus);
    }
  }

  function parkBus(bus, box) {
    bus.parked = true;
    bus.el.classList.add('parked');
    sndOk();
    setTimeout(() => speakLine(bus.line), 150);

    // Ajouter mini-bus dans la boîte
    const parkedZone = document.getElementById('parked-' + box.id);
    const mini = document.createElement('div');
    mini.innerHTML = busSVG(bus.line.color, bus.line.textColor, bus.line.num, 28);
    parkedZone.appendChild(mini);

    boxCounts[box.id]++;
    document.getElementById('cnt-' + box.id).textContent = boxCounts[box.id];

    rangedCount++;
    updateProgress();

    if (rangedCount >= totalBuses) {
      if (typeof Tracker !== 'undefined') Tracker.endSession(totalBuses, totalBuses);
      setTimeout(() => {
        const a = new Audio('sounds/super-max.mp3');
        a.volume = 0.85;
        a.play().catch(() => {});
        confettiBurst(60); showParade();
      }, 600);
    }
  }

  function wrongPark(bus) {
    sndWrong();
    playErrorSound();
    bus.el.classList.add('wrong');
    setTimeout(() => {
      bus.el.style.transition = 'left 0.3s ease, top 0.3s ease';
      bus.el.style.left = bus.initX + 'px';
      bus.el.style.top  = bus.initY + 'px';
      bus.x = bus.initX; bus.y = bus.initY;
      setTimeout(() => { bus.el.style.transition=''; bus.el.classList.remove('wrong'); }, 320);
    }, 40);
  }

  function updateProgress() {
    const pct = (rangedCount / totalBuses) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('busCount').textContent = `Bus rangés : ${rangedCount} / ${totalBuses}`;
  }

  // ── Parade victoire ──
  function showParade() {
    const container = document.getElementById('paradeFamilies');
    container.innerHTML = '';
    FAMILIES.forEach((fam, fi) => {
      const lignesInFam = ALL_BUSES.filter(l => fam.colors.includes(l.color));
      if (!lignesInFam.length) return;
      const row = document.createElement('div');
      row.className = 'parade-row';
      row.style.animationDelay = (fi * 120) + 'ms';
      const r = parseInt(FAMILY_REPR[fam.id].slice(1,3),16);
      const g = parseInt(FAMILY_REPR[fam.id].slice(3,5),16);
      const b = parseInt(FAMILY_REPR[fam.id].slice(5,7),16);
      const badge = document.createElement('div');
      badge.className = 'parade-badge';
      badge.textContent = fam.label;
      badge.style.background = FAMILY_REPR[fam.id];
      badge.style.color = parseInt(r*0.299+g*0.587+b*0.114) > 128 ? '#333' : '#fff';
      const busesDiv = document.createElement('div');
      busesDiv.className = 'parade-buses';
      lignesInFam.forEach(l => {
        const wrap = document.createElement('div');
        wrap.innerHTML = busSVG(l.color, l.textColor, l.num, 36);
        busesDiv.appendChild(wrap);
      });
      row.appendChild(badge);
      row.appendChild(busesDiv);
      container.appendChild(row);
    });
    document.getElementById('paradeOverlay').classList.add('show');
  }

  // ── Init ──
  function init() {
    buildBoxes();
    buildBuses();
    updateProgress();
    // init total
    document.getElementById('busCount').textContent = `Bus rangés : 0 / ${totalBuses}`;
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
<script src="js/tracker.js"></script>
</body>
</html>
