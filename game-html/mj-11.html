<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>MJ-11 – Quel pays ?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <!-- flag-icons CDN (260 drapeaux SVG) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #0d3b5e, #1a2a3a);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Header */
    .game-header {
      width: 100%;
      max-width: 680px;
      padding: 14px 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .header-text { flex:1; }
    .header-title { color:#fff; font-size:1.3rem; font-weight:900; }
    .header-sub   { color:rgba(255,255,255,0.65); font-size:0.78rem; font-weight:700; }

    /* Score */
    .score-bar {
      width: 100%;
      max-width: 680px;
      padding: 0 16px 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .score-pip {
      width: 28px; height: 14px;
      border-radius: 7px;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }
    .score-pip.ok   { background: #4CAF50; }
    .score-pip.miss { background: #ff6b6b; }
    .score-label {
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      font-weight: 900;
      margin-left: auto;
    }

    /* Main game area */
    .game-area {
      width: 100%;
      max-width: 680px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Bus with flag */
    .bus-wrap {
      position: relative;
      display: inline-block;
    }
    .bus-svg-container svg {
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.4));
    }
    /* Flag inside bus window — calé sur rect x=84 y=14 w=40 h=21 / viewBox 160×80
       Inset 2px pour voir le contour noir.
       La fenêtre est trop large (ratio 40/21 ≈ 1.9) pour un drapeau (ratio ≈ 1.5).
       → fond noir + drapeau centré en object-fit:contain pour pillarbox automatique. */
    .flag-in-bus {
      position: absolute;
      top: calc(17.5% + 2px);
      left: calc(52.5% + 2px);
      width: calc(25% - 4px);
      height: calc(26.25% - 4px);
      border-radius: 1px;
      overflow: hidden;
      pointer-events: none;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flag-in-bus .fi {
      /* object-fit:contain via background-size:contain + bandes noires du fond */
      display: block;
      width: 100% !important;
      height: 100% !important;
      background-size: contain !important;
      background-repeat: no-repeat !important;
      background-position: center !important;
    }

    /* TTS Help button */
    .tts-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 12px 24px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(102,126,234,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      touch-action: manipulation;
    }
    .tts-btn:active { transform: scale(0.95); }

    /* Answer choices */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .choice-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 18px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, border-color 0.2s, background 0.2s;
      touch-action: manipulation;
      min-height: 80px;
    }
    .choice-btn:active { transform: scale(0.96); }
    .choice-btn.correct { background: rgba(76,175,80,0.25); border-color: #4CAF50; }
    .choice-btn.wrong   { background: rgba(255,107,107,0.2); border-color: #ff6b6b; }

    .choice-name {
      color: #fff;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.3;
      text-align: center;
    }

    /* Feedback overlay */
    .feedback {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    .feedback.show { display: flex; }
    .feedback-emoji {
      font-size: 6rem;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity:0; }
      to   { transform: scale(1); opacity:1; }
    }

    /* Confettis drapeaux */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 199;
      display: none;
    }
    #confettiCanvas.show { display: block; }

    /* Victory screen */
    #victoryScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 20px;
    }
    #victoryScreen.show { display: flex; }
    .victory-emoji { font-size: 3.5rem; }
    .victory-title {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 900;
      text-align: center;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      line-height: 1.2;
    }
    .victory-msg {
      color: rgba(255,255,255,0.85);
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      max-width: 340px;
      line-height: 1.4;
    }
    .victory-score {
      color: #FFD700;
      font-size: 1.5rem;
      font-weight: 900;
    }
    .replay-btn {
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 16px 36px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(76,175,80,0.4);
      touch-action: manipulation;
    }

    /* Mode selector */
    .mode-row {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-bottom: -4px;
    }
    .mode-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 8px;
      color: rgba(255,255,255,0.6);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }
    .mode-btn.active {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="game-header">
    <a href="index.html" class="back-btn">←</a>
    <div class="header-text">
      <div class="header-title">🌍 Quel pays ?</div>
      <div class="header-sub">Trouve le drapeau !</div>
    </div>
    <button class="back-btn" onclick="speakCountry()" title="Écouter le nom du pays" style="font-size:1.2rem">🔊</button>
  </div>

  <div class="score-bar" id="scoreBar"></div>

  <div class="game-area">

    <!-- Mode selector -->
    <div class="mode-row">
      <button class="mode-btn active" id="modeKnown" onclick="setMode('known')">⭐ Connus de Max</button>
      <button class="mode-btn" id="modeAll" onclick="setMode('all')">🌍 Tous les pays</button>
    </div>

    <!-- Bus avec drapeau -->
    <div class="bus-wrap">
      <div class="bus-svg-container" id="busSVGContainer"></div>
      <div class="flag-in-bus" id="flagInBus"></div>
    </div>

    <!-- Bouton aide TTS — texte fixe, ne révèle jamais le nom -->
    <button class="tts-btn" onclick="speakCountry()">
      <span>🔊</span>
      <span>Écouter</span>
    </button>

    <!-- Choix de réponses -->
    <div class="choices" id="choices"></div>

  </div>

  <!-- Feedback visuel -->
  <div class="feedback" id="feedback">
    <div class="feedback-emoji" id="feedbackEmoji"></div>
  </div>

  <!-- Confettis drapeaux -->
  <canvas id="confettiCanvas"></canvas>

  <!-- Écran victoire -->
  <div id="victoryScreen">
    <div class="victory-emoji" id="victoryEmoji">🌍</div>
    <div class="victory-title" id="victoryTitle">Bravo Max !</div>
    <div class="victory-msg" id="victoryMsg"></div>
    <div class="victory-score" id="victoryScore"></div>
    <button class="replay-btn" onclick="startGame()">Rejouer !</button>
    <a href="index.html" style="color:rgba(255,255,255,0.6);font-size:0.9rem;font-weight:900;text-decoration:none;margin-top:-8px">← Menu</a>
  </div>

  <script src="js/sounds.js"></script>
  <script src="js/victory-sounds.js"></script>
  <script src="js/bus-svg.js"></script>
  <script src="js/qcm-retry.js"></script>
  <script>
    // ─── Données pays ───────────────────────────────────────────────────────────
    // code ISO 3166-1 alpha-2 (pour flag-icons)
    // known: true = connu de Max (19 pays)
    const PAYS = [
      { code:'fr', nom:'France',          known:true  },
      { code:'gb', nom:'Royaume-Uni',     known:true  },
      { code:'it', nom:'Italie',          known:true  },
      { code:'tn', nom:'Tunisie',         known:true  },
      { code:'br', nom:'Brésil',          known:true  },
      { code:'ch', nom:'Suisse',          known:true  },
      { code:'us', nom:'États-Unis',      known:true  },
      { code:'cn', nom:'Chine',           known:true  },
      { code:'jp', nom:'Japon',           known:true  },
      { code:'ru', nom:'Russie',          known:true  },
      { code:'de', nom:'Allemagne',       known:true  },
      { code:'eg', nom:'Égypte',          known:true  },

      { code:'pt', nom:'Portugal',        known:false },

      { code:'tr', nom:'Turquie',         known:false },
      { code:'mx', nom:'Mexique',         known:false },
      { code:'ca', nom:'Canada',          known:false },
      { code:'au', nom:'Australie',       known:false },
      { code:'in', nom:'Inde',            known:false },
      { code:'za', nom:'Afrique du Sud',  known:false },

      { code:'ke', nom:'Kenya',           known:false },
      { code:'gh', nom:'Ghana',           known:false },
      { code:'sn', nom:'Sénégal',         known:false },
      { code:'ci', nom:'Côte d\'Ivoire',  known:false },
      { code:'cm', nom:'Cameroun',        known:false },
      { code:'dz', nom:'Algérie',         known:false },
      { code:'ly', nom:'Libye',           known:false },
      { code:'sd', nom:'Soudan',          known:false },
      { code:'et', nom:'Éthiopie',        known:false },
      { code:'tz', nom:'Tanzanie',        known:false },
      { code:'ug', nom:'Ouganda',         known:false },
      { code:'ao', nom:'Angola',          known:false },
      { code:'mz', nom:'Mozambique',      known:false },
      { code:'mg', nom:'Madagascar',      known:false },
      { code:'bo', nom:'Bolivie',         known:false },
      { code:'cl', nom:'Chili',           known:false },
      { code:'co', nom:'Colombie',        known:false },
      { code:'pe', nom:'Pérou',           known:false },
      { code:'ve', nom:'Venezuela',       known:false },
      { code:'ec', nom:'Équateur',        known:false },
      { code:'uy', nom:'Uruguay',         known:false },
      { code:'py', nom:'Paraguay',        known:false },
      { code:'kr', nom:'Corée du Sud',    known:false },
      { code:'id', nom:'Indonésie',       known:false },
      { code:'vn', nom:'Viêt Nam',        known:false },
      { code:'ph', nom:'Philippines',     known:false },
      { code:'sg', nom:'Singapour',       known:false },
      { code:'my', nom:'Malaisie',        known:false },
      { code:'mm', nom:'Myanmar',         known:false },
      { code:'bd', nom:'Bangladesh',      known:false },
      { code:'pk', nom:'Pakistan',        known:false },
      { code:'af', nom:'Afghanistan',     known:false },
      { code:'ir', nom:'Iran',            known:false },
      { code:'iq', nom:'Irak',            known:false },
      { code:'sa', nom:'Arabie Saoudite', known:false },
      { code:'ae', nom:'Émirats Arabes',  known:false },
      { code:'il', nom:'Israël',          known:false },
      { code:'jo', nom:'Jordanie',        known:false },
      { code:'lb', nom:'Liban',           known:false },
      { code:'sy', nom:'Syrie',           known:false },
      { code:'ua', nom:'Ukraine',         known:false },
      { code:'ro', nom:'Roumanie',        known:false },
      { code:'hu', nom:'Hongrie',         known:false },
      { code:'cz', nom:'Tchéquie',        known:false },
      { code:'sk', nom:'Slovaquie',       known:false },
      { code:'hr', nom:'Croatie',         known:false },
      { code:'rs', nom:'Serbie',          known:false },
      { code:'bg', nom:'Bulgarie',        known:false },
      { code:'nz', nom:'Nouvelle-Zélande',known:false },
      { code:'pf', nom:'Polynésie fr.',   known:false },
      { code:'mq', nom:'Martinique',      known:false },
      { code:'gp', nom:'Guadeloupe',      known:false },
      { code:'re', nom:'La Réunion',      known:false },
      { code:'nc', nom:'Nvl-Calédonie',   known:false },
      { code:'gf', nom:'Guyane',          known:false },
    ];

    // ─── Salutations dans la langue du pays ─────────────────────────────────────
    // [texte, code BCP-47]. Si la voix n'est pas dispo, SpeechSynthesis utilisera
    // la voix par défaut — ce n'est pas grave, Max entend quand même un mot nouveau.
    const GREETINGS = {
      fr:['Bonjour','fr-FR'], gb:['Hello','en-GB'], it:['Ciao','it-IT'],
      tn:['Salam','ar-TN'],   br:['Olá','pt-BR'],   ch:['Grüezi','de-CH'],
      us:['Hello','en-US'],   cn:['Ni hao','zh-CN'],jp:['Konnichiwa','ja-JP'],
      ru:['Privet','ru-RU'],  de:['Hallo','de-DE'], eg:['Salam','ar-EG'],
      th:['Sawatdi','th-TH'], ma:['Salam','ar-MA'], ar:['Hola','es-AR'],
      nl:['Hallo','nl-NL'],   lu:['Moien','fr-LU'], kh:['Suostei','km-KH'],
      es:['Hola','es-ES'],    pt:['Olá','pt-PT'],   be:['Bonjour','fr-BE'],
      pl:['Cześć','pl-PL'],   se:['Hej','sv-SE'],   no:['Hei','nb-NO'],
      dk:['Hej','da-DK'],     fi:['Hei','fi-FI'],   at:['Hallo','de-AT'],
      gr:['Yassou','el-GR'],  tr:['Merhaba','tr-TR'],mx:['Hola','es-MX'],
      ca:['Hello','en-CA'],   au:['Hello','en-AU'], in:['Namasté','hi-IN'],
      za:['Hello','en-ZA'],   ng:['Hello','en-NG'], ke:['Jambo','sw-KE'],
      gh:['Hello','en-GH'],   sn:['Salam','fr-SN'], ci:['Bonjour','fr-FR'],
      cm:['Bonjour','fr-FR'], dz:['Salam','ar-DZ'], ly:['Salam','ar-LY'],
      sd:['Salam','ar-SD'],   et:['Selam','am-ET'], tz:['Jambo','sw-TZ'],
      ug:['Jambo','sw-UG'],   ao:['Olá','pt-PT'],   mz:['Olá','pt-PT'],
      mg:['Salama','fr-FR'],  bo:['Hola','es-BO'],  cl:['Hola','es-CL'],
      co:['Hola','es-CO'],    pe:['Hola','es-PE'],  ve:['Hola','es-VE'],
      ec:['Hola','es-EC'],    uy:['Hola','es-UY'],  py:['Hola','es-PY'],
      kr:['Annyeong','ko-KR'],id:['Halo','id-ID'],  vn:['Xin chào','vi-VN'],
      ph:['Kumusta','fil-PH'],sg:['Hello','en-SG'], my:['Helo','ms-MY'],
      mm:['Mingalaba','my-MM'],bd:['Nomoshkar','bn-BD'],pk:['Salam','ur-PK'],
      af:['Salam','fa-AF'],   ir:['Salam','fa-IR'], iq:['Salam','ar-IQ'],
      sa:['Salam','ar-SA'],   ae:['Salam','ar-AE'], il:['Shalom','he-IL'],
      jo:['Salam','ar-JO'],   lb:['Salam','ar-LB'], sy:['Salam','ar-SY'],
      ua:['Pryvit','uk-UA'],  ro:['Salut','ro-RO'], hu:['Szia','hu-HU'],
      cz:['Ahoj','cs-CZ'],    sk:['Ahoj','sk-SK'],  hr:['Bok','hr-HR'],
      rs:['Zdravo','sr-RS'],  bg:['Zdravei','bg-BG'],nz:['Kia ora','en-NZ'],
      pf:['Ia orana','fr-FR'],mq:['Bonjour','fr-FR'],gp:['Bonjour','fr-FR'],
      re:['Bonjour','fr-FR'], nc:['Bonjour','fr-FR'],gf:['Bonjour','fr-FR'],
    };

    // ─── État ────────────────────────────────────────────────────────────────────
    const ROUND_COUNT = 10;
    let mode = 'known';
    let pool = [];
    let currentPays = null;
    let round = 0;
    let score = 0;
    let qcm = null;

    // ─── Mode ───────────────────────────────────────────────────────────────────
    function setMode(m) {
      mode = m;
      document.getElementById('modeKnown').classList.toggle('active', m === 'known');
      document.getElementById('modeAll').classList.toggle('active', m === 'all');
      startGame();
    }

    // ─── Démarrer / rejouer ──────────────────────────────────────────────────────
    function startGame() {
      round = 0;
      score = 0;
      document.getElementById('victoryScreen').classList.remove('show');
      pool = shuffle(mode === 'known' ? PAYS.filter(p => p.known) : PAYS);
      nextRound();
    }

    // ─── Tour suivant ────────────────────────────────────────────────────────────
    function nextRound() {
      if (round >= ROUND_COUNT) { showVictory(); return; }
      qcm = QcmRetry.create();
      currentPays = pool[round % pool.length];

      // Score bar
      renderScoreBar();

      // Bus SVG (carrosserie turquoise standard, fenêtre sera masquée par le drapeau)
      const busHTML = busSVG('#cccccc', '#333', '', 300);
      document.getElementById('busSVGContainer').innerHTML = busHTML;

      // Drapeau dans la fenêtre du bus
      document.getElementById('flagInBus').innerHTML =
        `<span class="fi fi-${currentPays.code}" style="width:100%;height:100%;background-size:cover;background-position:center;display:block;border-radius:3px"></span>`;

      // Parler automatiquement (aide)
      setTimeout(speakCountry, 600);

      // Générer 4 choix
      renderChoices();
    }

    // ─── Choix ──────────────────────────────────────────────────────────────────
    function renderChoices() {
      const usedPool = mode === 'known' ? PAYS.filter(p => p.known) : PAYS;
      const distractors = shuffle(usedPool.filter(p => p.code !== currentPays.code)).slice(0, 3);
      const options = shuffle([currentPays, ...distractors]);

      const container = document.getElementById('choices');
      container.innerHTML = options.map(pays => {
        const isCorrect = pays.code === currentPays.code;
        return `
        <button class="choice-btn" data-code="${pays.code}"${isCorrect ? ' data-correct="1"' : ''} onclick="answer('${pays.code}', this)">
          <div class="choice-name">${pays.nom}</div>
        </button>
      `;
      }).join('');
    }

    // ─── Réponse ────────────────────────────────────────────────────────────────
    function answer(code, btn) {
      if (btn.disabled) return;
      const isCorrect = code === currentPays.code;
      const res = QcmRetry.handle(qcm, isCorrect);
      if (res.outcome === 'ignored') return;

      if (res.outcome === 'correct') {
        btn.classList.add('correct');
        document.querySelectorAll('.choice-btn').forEach(b => { b.style.pointerEvents = 'none'; });
        if (res.points === 10) score++;
        sndDing();
        showFeedback('🎉');
        setTimeout(() => speak(currentPays.nom), 300);
        setTimeout(() => speakGreeting(currentPays.code), 1300);
        round++;
        setTimeout(nextRound, 2600);
      } else if (res.outcome === 'reveal') {
        btn.classList.add('wrong'); btn.disabled = true;
        QcmRetry.revealCorrect(document.getElementById('choices'), 'correct');
        document.querySelectorAll('.choice-btn').forEach(b => { b.style.pointerEvents = 'none'; });
        sndBuzz(); playErrorSound();
        showFeedback('💪');
        setTimeout(() => speak(currentPays.nom), 300);
        round++;
        setTimeout(nextRound, 1800);
      } else {
        btn.classList.add('wrong'); btn.disabled = true;
        sndBuzz(); playErrorSound();
        showFeedback('🤔');
        setTimeout(() => speak('Essaie encore !'), 200);
      }
    }

    // ─── Feedback ────────────────────────────────────────────────────────────────
    function showFeedback(emoji) {
      const el = document.getElementById('feedback');
      document.getElementById('feedbackEmoji').textContent = emoji;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1200);
    }

    // ─── Score bar ───────────────────────────────────────────────────────────────
    function renderScoreBar() {
      const bar = document.getElementById('scoreBar');
      let html = '';
      for (let i = 0; i < ROUND_COUNT; i++) {
        const cls = i < round ? (i < score ? 'ok' : 'miss') :
                    i === round ? '' : '';
        html += `<div class="score-pip ${cls}"></div>`;
      }
      html += `<div class="score-label">${score}/${round}</div>`;
      bar.innerHTML = html;
    }

    // ─── Victoire ────────────────────────────────────────────────────────────────
    const VICTORY_DATA = [
      // 10/10
      { min:10, max:10, emoji:'🏆', title:'PARFAIT !!!', msg:'10 sur 10 ! Tu es un champion des drapeaux !', confetti:true, sound:'victory' },
      // 8-9
      { min:8,  max:9,  emoji:'🌟', title:'Super Max !', msg:'Presque parfait ! Tu connais super bien les drapeaux !', confetti:false, sound:'bravo' },
      // 6-7
      { min:6,  max:7,  emoji:'😊', title:'Bien joué !', msg:'C\'est bien ! Continue comme ça, tu progresses !', confetti:false, sound:'ding' },
      // 4-5
      { min:4,  max:5,  emoji:'💪', title:'Pas mal !', msg:'Tu peux faire encore mieux la prochaine fois !', confetti:false, sound:'ding' },
      // 0-3
      { min:0,  max:3,  emoji:'🚌', title:'On réessaie ?', msg:'C\'est difficile ! Essaie encore, tu vas progresser !', confetti:false, sound:'buzz' },
    ];

    function showVictory() {
      if (typeof Tracker !== 'undefined') Tracker.endSession(score, ROUND_COUNT);
      renderScoreBar();
      const data = VICTORY_DATA.find(d => score >= d.min && score <= d.max);
      document.getElementById('victoryEmoji').textContent = data.emoji;
      document.getElementById('victoryTitle').textContent = data.title;
      document.getElementById('victoryMsg').textContent = data.msg;
      document.getElementById('victoryScore').textContent = `${score} / ${ROUND_COUNT}`;
      document.getElementById('victoryScreen').classList.add('show');
      // Son
      if (data.sound === 'victory') sndVictory();
      else if (data.sound === 'bravo') sndBravo();
      else if (data.sound === 'ding') sndDing();
      else sndBuzz();
      // Confettis drapeaux uniquement au sans-faute
      if (data.confetti) launchFlagConfetti();
    }

    // ─── Confettis drapeaux ──────────────────────────────────────────────────────
    // 40 drapeaux émoji tombent en arc depuis le haut
    function launchFlagConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.classList.add('show');
      const ctx = canvas.getContext('2d');

      // Emojis drapeaux des pays connus
      const flags = PAYS.filter(p => p.known).map(p => {
        // Convertit code ISO → emoji drapeau (regional indicator symbols)
        const base = 0x1F1E6 - 'a'.charCodeAt(0);
        return String.fromCodePoint(base + p.code.charCodeAt(0), base + p.code.charCodeAt(1));
      });

      const particles = [];
      const COUNT = 40;
      for (let i = 0; i < COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -40 - Math.random() * 200,
          vy: 2 + Math.random() * 3,
          vx: (Math.random() - 0.5) * 2,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.1,
          flag: flags[Math.floor(Math.random() * flags.length)],
          size: 28 + Math.random() * 18,
          opacity: 1,
        });
      }

      let frame = 0;
      function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.rotV;
          if (frame > 120) p.opacity = Math.max(0, p.opacity - 0.012);
          if (p.y < canvas.height + 60 && p.opacity > 0) alive = true;
          ctx.save();
          ctx.globalAlpha = p.opacity;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.font = `${p.size}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(p.flag, 0, 0);
          ctx.restore();
        }
        frame++;
        if (alive) requestAnimationFrame(tick);
        else { canvas.classList.remove('show'); ctx.clearRect(0,0,canvas.width,canvas.height); }
      }
      requestAnimationFrame(tick);
    }

    // ─── TTS ─────────────────────────────────────────────────────────────────────
    function speakCountry() {
      if (!currentPays) return;
      speak(currentPays.nom);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'fr-FR';
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }

    function speakGreeting(code) {
      if (!('speechSynthesis' in window)) return;
      const g = GREETINGS[code];
      if (!g) return;
      const [text, lang] = g;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.85;
      // Choisir une voix qui matche le lang si dispo
      const voices = window.speechSynthesis.getVoices();
      const match = voices.find(v => v.lang === lang) ||
                    voices.find(v => v.lang.startsWith(lang.split('-')[0]));
      if (match) u.voice = match;
      window.speechSynthesis.speak(u);
    }

    // ─── Utilitaires ──────────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ─── Init ─────────────────────────────────────────────────────────────────────
    startGame();
  </script>
<script src="js/tracker.js"></script>
