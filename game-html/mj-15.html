<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MJ-15 – L'intrus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100dvh; overflow:hidden; font-family:'Nunito',sans-serif; background:#0d1b2a; color:#fff; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:700px; margin:0 auto; position:relative; }

/* ── Header ── */
#hdr {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
}
#hdr a {
  color:#fff; text-decoration:none; font-size:1.3rem;
  background:rgba(255,255,255,0.12); border-radius:10px;
  padding:6px 12px; font-weight:900;
}
#hdr a:active { background:rgba(255,255,255,0.25); }
#htitle { flex:1; font-size:1.05rem; font-weight:900; }
#score-badge {
  background:#ffe066; color:#1a1a1a; font-weight:900;
  border-radius:20px; padding:4px 14px; font-size:0.95rem; flex-shrink:0;
}

/* ── Indicateur de niveau ── */
#level-bar {
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  gap:8px; padding:6px 12px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.lvl-dot {
  width:12px; height:12px; border-radius:50%;
  background:rgba(255,255,255,0.15); transition:background 0.3s;
}
.lvl-dot.done   { background:#00c47a; }
.lvl-dot.active { background:#ffe066; box-shadow:0 0 8px #ffe066; }
#level-label { font-size:0.82rem; font-weight:900; opacity:0.65; }

/* ── Zone principale ── */
#main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:space-evenly; padding:10px 12px 8px; overflow:hidden;
}

/* ── Question ── */
#q-label {
  font-size:1.15rem; font-weight:900; text-align:center;
  background:rgba(255,255,255,0.09); border-radius:18px;
  padding:10px 22px; flex-shrink:0; line-height:1.3;
  border:2px solid rgba(255,255,255,0.1);
}

/* ── Hint ── */
#hint-label {
  font-size:0.8rem; font-weight:700; opacity:0.55;
  text-align:center; flex-shrink:0; padding:0 12px; min-height:18px;
}

/* ── Grille des bus ── */
#buses-wrap {
  flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  width:100%;
}

/* Ligne haute (2 bus) */
#row-top {
  display:flex; justify-content:center; gap:12px; flex-wrap:wrap;
}

/* Ligne basse (3 bus) */
#row-bot {
  display:flex; justify-content:center; gap:12px; flex-wrap:wrap;
}

/* Bouton bus */
.bus-btn {
  background:rgba(255,255,255,0.07);
  border:3px solid rgba(255,255,255,0.18);
  border-radius:18px;
  padding:10px 10px 8px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  transition:transform 0.12s, border-color 0.15s, background 0.15s;
  min-width:100px; min-height:80px;
  position:relative;
}
.bus-btn:active { transform:scale(0.92); }
.bus-btn:hover  { border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.13); }

.bus-label {
  font-size:0.72rem; font-weight:900; opacity:0.7;
  background:rgba(255,255,255,0.1); border-radius:8px; padding:2px 9px;
}

/* Feedback bon = flash vert */
.bus-btn.flash-ok {
  border-color:#00c47a !important;
  background:rgba(0,196,122,0.25) !important;
  animation:pop-ok 0.4s ease;
}
@keyframes pop-ok {
  0%   { transform:scale(1); }
  35%  { transform:scale(1.12); }
  100% { transform:scale(1); }
}

/* Feedback mauvais = bounce rouge */
.bus-btn.flash-err {
  border-color:#ff4455 !important;
  background:rgba(255,68,85,0.2) !important;
  animation:bounce-err 0.4s ease;
}
@keyframes bounce-err {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-8px); }
  60%     { transform:translateX(8px); }
}

/* Bus disparu après bonne réponse */
.bus-btn.gone {
  opacity:0;
  transform:scale(0.5) translateY(-20px);
  transition:opacity 0.35s ease, transform 0.35s ease;
  pointer-events:none;
}

/* ── Écran de fin ── */
#end-screen {
  display:none; position:absolute; inset:0;
  background:rgba(13,27,42,0.96);
  flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:20;
}
#end-screen.visible { display:flex; }
#end-emoji  { font-size:4.5rem; }
#end-msg    { font-size:1.4rem; font-weight:900; text-align:center; padding:0 24px; line-height:1.4; }
#end-score  { font-size:1rem; color:#ffe066; font-weight:900; }
#btn-replay {
  background:linear-gradient(135deg,#00c47a,#00906a); color:#fff;
  border:none; border-radius:20px;
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1.1rem; padding:14px 38px; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,196,122,0.45); transition:transform 0.15s;
}
#btn-replay:active { transform:scale(0.95); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <a href="index.html">←</a>
    <span id="htitle">🔍 L'intrus</span>
    <div id="score-badge">0 / 0</div>
  </div>

  <!-- Indicateur de round -->
  <div id="level-bar">
    <div class="lvl-dot active" id="dot-0"></div>
    <div class="lvl-dot"        id="dot-1"></div>
    <div class="lvl-dot"        id="dot-2"></div>
    <div class="lvl-dot"        id="dot-3"></div>
    <div class="lvl-dot"        id="dot-4"></div>
    <span id="level-label">Round 1 / 5</span>
  </div>

  <!-- Zone principale -->
  <div id="main">
    <div id="q-label">Lequel ne va pas avec les autres ?</div>
    <div id="hint-label"></div>

    <div id="buses-wrap">
      <div id="row-top"></div>
      <div id="row-bot"></div>
    </div>
  </div>

  <!-- Fin de partie -->
  <div id="end-screen">
    <div id="end-emoji">🎉</div>
    <div id="end-msg"></div>
    <div id="end-score"></div>
    <button id="btn-replay" onclick="startGame()">Rejouer !</button>
    <a href="index.html" style="color:#ffe066;font-weight:900;font-size:0.95rem;margin-top:4px;">← Menu</a>
  </div>
</div>

<script src="js/bus-svg.js"></script>
<script src="js/data.js"></script>
<script src="js/victory-sounds.js"></script>
<script src="js/tracker.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
//  MJ-15 — L'intrus
//  5 rounds, 5 bus affichés, 1 intrus à trouver
//  Round 1-2 (A) : couleur différente
//  Round 3-4 (B) : numéro pair vs impair
//  Round 5   (C) : famille de ligne (Valouette / Noctilien / Métro / Standard)
// ═══════════════════════════════════════════════════════════════════════════

const ROUNDS_PER_GAME = 5;

// ── Familles de lignes (niveau C) ──────────────────────────────────────────
const FAMILIES = {
  valouette:  l => ['V2','V3','V4','V5','V6','V7'].includes(l.num),
  noctilien:  l => l.num.startsWith('N'),
  metro:      l => l.num.startsWith('M') && /^\d/.test(l.num.substring(1)),
  standard:   l => !['V2','V3','V4','V5','V6','V7'].includes(l.num)
                   && !l.num.startsWith('N')
                   && !(l.num.startsWith('M') && /^\d/.test(l.num.substring(1)))
                   && !(l.num.startsWith('T') && /^\d/.test(l.num.substring(1))),
};

const FAMILY_NAMES = {
  valouette: 'Valouette',
  noctilien: 'Noctilien',
  metro:     'Métro',
  standard:  'Bus standard',
};

// ── Parité : est-ce qu'un numéro de ligne est "pair" ?
// On ne considère que les lignes dont le num est un entier.
function isPair(num) {
  const n = parseInt(num, 10);
  return !isNaN(n) && n % 2 === 0;
}

function isImpair(num) {
  const n = parseInt(num, 10);
  return !isNaN(n) && n % 2 !== 0;
}

// ── Utilitaires ────────────────────────────────────────────────────────────
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function pick(arr, n) {
  return shuffle(arr).slice(0, n);
}

// ── État du jeu ────────────────────────────────────────────────────────────
let score    = 0;
let round    = 0;
let intrusIdx = -1;   // index (0-4) du bus intrus
let answered = false;

// ── Génération des puzzles ─────────────────────────────────────────────────

function getLevel(r) {
  if (r <= 2) return 'A';
  if (r <= 4) return 'B';
  return 'C';
}

// Niveau A — couleur différente
function generatePuzzleA() {
  // 4 bus de la même couleur distincte, 1 bus d'une couleur clairement différente
  // On utilise selectDistinctColors pour garantir que les 2 couleurs sont bien différentes
  const twoGroups = selectDistinctColors(LIGNES, 2, 100);
  if (twoGroups.length < 2) {
    // Fallback : prendre les 2 premières lignes avec couleurs différentes
    twoGroups.push(...LIGNES.filter(l => l.color !== twoGroups[0].color).slice(0, 1));
  }

  const colorMaj = twoGroups[0];
  const colorMin = twoGroups[1];

  // 4 bus de la couleur majoritaire (avec des numéros différents si possible)
  const poolMaj = LIGNES.filter(l => l.color === colorMaj.color);
  const poolMin = LIGNES.filter(l => l.color === colorMin.color);

  // On veut 4 bus de la même couleur — si la couleur n'a qu'une ligne, on duplique
  const majorBuses = [];
  const poolMajShuffled = shuffle(poolMaj);
  for (let i = 0; i < 4; i++) {
    majorBuses.push({ ...poolMajShuffled[i % poolMajShuffled.length] });
  }

  const intrusBus = { ...shuffle(poolMin)[0] };

  const buses = [...majorBuses, intrusBus];
  const positions = shuffle([0,1,2,3,4]);
  const placed = new Array(5);
  positions.forEach((pos, i) => { placed[pos] = buses[i]; });

  // L'intrus est le dernier bus inséré (index 4 dans buses), retrouvons sa position
  const intrusPos = positions[4];

  return {
    buses: placed,
    intrusIdx: intrusPos,
    hint: 'Regarde les couleurs !',
    level: 'A',
  };
}

// Niveau B — pair vs impair
function generatePuzzleB() {
  const pairLignes   = LIGNES.filter(l => isPair(l.num));
  const impairLignes = LIGNES.filter(l => isImpair(l.num));

  // Besoin d'au moins 4 dans un camp et 1 dans l'autre
  const majority = pairLignes.length >= 4 ? pairLignes : impairLignes;
  const minority = pairLignes.length >= 4 ? impairLignes : pairLignes;

  // Parfois on veut inverser aléatoirement
  const useMinority = Math.random() < 0.5 && minority.length >= 4;
  const majPool = useMinority ? minority : majority;
  const minPool = useMinority ? majority : minority;

  const majorBuses = pick(majPool, 4);
  const intrusBus  = pick(minPool, 1)[0];

  const buses = [...majorBuses, intrusBus];
  const positions = shuffle([0,1,2,3,4]);
  const placed = new Array(5);
  positions.forEach((pos, i) => { placed[pos] = buses[i]; });
  const intrusPos = positions[4];

  return {
    buses: placed,
    intrusIdx: intrusPos,
    hint: 'Pair ou impair ?',
    level: 'B',
  };
}

// Niveau C — famille de ligne
function generatePuzzleC() {
  // Construire les pools par famille
  const famKeys = Object.keys(FAMILIES);
  const famPools = {};
  famKeys.forEach(k => {
    famPools[k] = LIGNES.filter(FAMILIES[k]);
  });

  // Choisir une famille majoritaire (≥4 membres) et une famille intrus (≥1)
  const validMaj = famKeys.filter(k => famPools[k].length >= 4);
  const validMin = famKeys.filter(k => famPools[k].length >= 1);

  if (validMaj.length === 0) {
    // Fallback sur niveau A
    return generatePuzzleA();
  }

  const majFam = shuffle(validMaj)[0];
  const minFam = shuffle(validMin.filter(k => k !== majFam))[0] || validMin[0];

  const majorBuses = pick(famPools[majFam], 4);
  const intrusBus  = pick(famPools[minFam], 1)[0];

  const buses = [...majorBuses, intrusBus];
  const positions = shuffle([0,1,2,3,4]);
  const placed = new Array(5);
  positions.forEach((pos, i) => { placed[pos] = buses[i]; });
  const intrusPos = positions[4];

  const hintMaj = FAMILY_NAMES[majFam] || majFam;
  const hintMin = FAMILY_NAMES[minFam] || minFam;

  return {
    buses: placed,
    intrusIdx: intrusPos,
    hint: `4 bus sont de la famille ${hintMaj}…`,
    level: 'C',
  };
}

function generatePuzzle(roundNum) {
  const level = getLevel(roundNum);
  if (level === 'A') return generatePuzzleA();
  if (level === 'B') return generatePuzzleB();
  return generatePuzzleC();
}

// ── Rendu ──────────────────────────────────────────────────────────────────

let currentPuzzle = null;

function calcBusWidth() {
  // Adapter la taille des bus selon la largeur de l'écran
  // 5 bus : 2 sur la ligne haute, 3 sur la ligne basse
  // On vise ~140-180px de large par bus selon dispo
  const w = Math.min(window.innerWidth, 700);
  const perRow3 = Math.floor((w - 4 * 12) / 3); // 3 bus + 2 gaps de 12
  return Math.min(180, Math.max(110, perRow3));
}

function renderPuzzle(puzzle) {
  currentPuzzle = puzzle;
  answered      = false;
  intrusIdx     = puzzle.intrusIdx;

  document.getElementById('hint-label').textContent = puzzle.hint;

  const busW = calcBusWidth();
  const rowTop = document.getElementById('row-top');
  const rowBot = document.getElementById('row-bot');
  rowTop.innerHTML = '';
  rowBot.innerHTML = '';

  puzzle.buses.forEach((ligne, idx) => {
    const btn = document.createElement('button');
    btn.className    = 'bus-btn';
    btn.dataset.idx  = idx;
    btn.innerHTML    = busSVG(ligne.color, ligne.textColor, ligne.num, busW)
                     + `<span class="bus-label">${getLineDisplayName(ligne.num)}</span>`;
    btn.addEventListener('click', () => onBusTap(idx, btn));

    // Disposition : bus 0-1 en haut, 2-4 en bas
    if (idx < 2) rowTop.appendChild(btn);
    else         rowBot.appendChild(btn);
  });

  speak('Lequel ne va pas avec les autres ?');
}

// ── Interaction ───────────────────────────────────────────────────────────

function onBusTap(idx, btn) {
  if (answered) return;
  answered = true;

  if (idx === intrusIdx) {
    // Bonne réponse
    score++;
    updateScore();
    btn.classList.add('flash-ok');
    if (typeof Tracker !== 'undefined') Tracker.logAnswer(true);
    playSuccessBeep();

    setTimeout(() => {
      btn.classList.add('gone');
      setTimeout(nextRound, 500);
    }, 400);

  } else {
    // Mauvaise réponse
    btn.classList.add('flash-err');
    if (typeof Tracker !== 'undefined') Tracker.logAnswer(false);
    playErrorSound();

    setTimeout(() => {
      btn.classList.remove('flash-err');
      // Montrer le bon bus
      const correctBtn = document.querySelector(`.bus-btn[data-idx="${intrusIdx}"]`);
      if (correctBtn) {
        correctBtn.classList.add('flash-ok');
        correctBtn.style.borderColor = '#ffe066';
      }
      setTimeout(nextRound, 900);
    }, 500);
  }
}

// ── Sons / TTS ─────────────────────────────────────────────────────────────

function playSuccessBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.18);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.2);
    });
  } catch(e) {}
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.lang    = 'fr-FR';
  utt.rate    = 0.9;
  speechSynthesis.speak(utt);
}

// ── Score / Rounds / Dots ──────────────────────────────────────────────────

function updateScore() {
  document.getElementById('score-badge').textContent = `${score} / ${round}`;
}

function updateLevelDots() {
  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const dot = document.getElementById('dot-' + i);
    if (i < round - 1)       dot.className = 'lvl-dot done';
    else if (i === round - 1) dot.className = 'lvl-dot active';
    else                      dot.className = 'lvl-dot';
  }
  document.getElementById('level-label').textContent = `Round ${round} / ${ROUNDS_PER_GAME}`;
}

function nextRound() {
  round++;
  if (round > ROUNDS_PER_GAME) {
    showEnd();
    return;
  }
  updateScore();
  updateLevelDots();
  renderPuzzle(generatePuzzle(round));
}

function showEnd() {
  const pct   = score / ROUNDS_PER_GAME;
  const emoji = pct >= 0.8 ? '🏆' : pct >= 0.5 ? '🎉' : '🚌';
  const msg   = pct >= 0.8 ? 'Incroyable ! Tu as trouvé tous les intrus !'
              : pct >= 0.5 ? 'Bien joué ! Tu es un détective de bus !'
              :               "Continue de t'entraîner, tu vas y arriver !";

  document.getElementById('end-emoji').textContent = emoji;
  document.getElementById('end-msg').textContent   = msg;
  document.getElementById('end-score').textContent =
    `${score} bonne${score > 1 ? 's' : ''} réponse${score > 1 ? 's' : ''} sur ${ROUNDS_PER_GAME}`;

  document.getElementById('end-screen').classList.add('visible');
  playEndSound(score, ROUNDS_PER_GAME);
  speak(msg);
  if (typeof Tracker !== 'undefined') Tracker.endSession(score, ROUNDS_PER_GAME);
}

// ── Démarrage ──────────────────────────────────────────────────────────────

function startGame() {
  score    = 0;
  round    = 1;
  answered = false;
  stopEndSound();
  document.getElementById('end-screen').classList.remove('visible');
  updateScore();
  updateLevelDots();
  renderPuzzle(generatePuzzle(round));
}

startGame();
</script>
</body>
</html>
