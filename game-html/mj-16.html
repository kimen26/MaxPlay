<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MJ-16 – Complète la suite</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
html,body { width:100%; height:100dvh; overflow:hidden; font-family:'Nunito',sans-serif; background:#0d1b2a; color:#fff; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:760px; margin:0 auto; position:relative; }

/* ── Header ── */
#hdr {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
}
#hdr a {
  color:#fff; text-decoration:none; font-size:1.3rem;
  background:rgba(255,255,255,0.12); border-radius:10px;
  padding:6px 12px; font-weight:900;
}
#hdr a:active { background:rgba(255,255,255,0.25); }
#htitle { flex:1; font-size:1.05rem; font-weight:900; }
#score-badge {
  background:#ffe066; color:#1a1a1a; font-weight:900;
  border-radius:20px; padding:4px 14px; font-size:0.95rem; flex-shrink:0;
}

/* ── Indicateur de round ── */
#level-bar {
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  gap:8px; padding:6px 12px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.lvl-dot {
  width:12px; height:12px; border-radius:50%;
  background:rgba(255,255,255,0.15); transition:background 0.3s;
}
.lvl-dot.done   { background:#00c47a; }
.lvl-dot.active { background:#ffe066; box-shadow:0 0 8px #ffe066; }
#level-label { font-size:0.82rem; font-weight:900; opacity:0.65; }

/* ── Zone principale ── */
#main {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:space-evenly; padding:10px 8px 6px; overflow:hidden;
  gap:6px;
}

/* ── Question ── */
#q-label {
  font-size:1.15rem; font-weight:900; text-align:center;
  background:rgba(255,255,255,0.09); border-radius:18px;
  padding:10px 22px; flex-shrink:0; line-height:1.3;
  border:2px solid rgba(255,255,255,0.1);
}

/* ── Hint ── */
#hint-label {
  font-size:0.82rem; font-weight:700; opacity:0.6;
  text-align:center; flex-shrink:0; padding:0 12px; min-height:18px;
  color:#ffe066;
}

/* ── Ligne de la suite (4 cases) ── */
#sequence-row {
  flex-shrink:0; display:flex; align-items:flex-end;
  justify-content:center; gap:8px; width:100%; padding:0 4px;
}

.seq-cell {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.14);
  border-radius:16px;
  padding:8px 6px 6px;
  flex-shrink:0;
  transition:border-color 0.25s, background 0.25s;
  min-height:80px;
  justify-content:flex-end;
}

.seq-cell.mystery {
  border:3px solid #ffe066;
  background:rgba(255,224,102,0.07);
  animation:pulse-mystery 1.4s ease-in-out infinite;
}
@keyframes pulse-mystery {
  0%,100% { box-shadow:0 0 0 0 rgba(255,224,102,0.0); }
  50%      { box-shadow:0 0 0 10px rgba(255,224,102,0.22); }
}

.seq-cell .cell-label {
  font-size:0.68rem; font-weight:900; opacity:0.55;
  background:rgba(255,255,255,0.1); border-radius:8px; padding:2px 8px;
}

.mystery-mark {
  font-size:2.4rem; font-weight:900; color:#ffe066;
  line-height:1; padding-bottom:4px;
}

/* Case mystère remplie (après bonne réponse) */
.seq-cell.mystery.filled {
  animation:none;
  border-color:#00c47a;
  background:rgba(0,196,122,0.15);
}

/* Flash vert case mystère */
@keyframes flash-fill {
  0%   { transform:scale(0.7); opacity:0; }
  60%  { transform:scale(1.1); }
  100% { transform:scale(1);   opacity:1; }
}
.seq-cell.mystery.filled .cell-bus-wrap {
  animation:flash-fill 0.4s ease forwards;
}

/* ── Séparateur flèche ── */
.seq-arrow {
  font-size:1.3rem; opacity:0.35; flex-shrink:0; align-self:center;
  padding-bottom:8px;
}

/* ── Label "Choisis la bonne réponse" ── */
#choices-label {
  font-size:0.88rem; font-weight:900; opacity:0.65;
  text-align:center; flex-shrink:0;
}

/* ── Zone choix ── */
#choices {
  flex-shrink:0; display:flex; gap:10px; justify-content:center;
  width:100%; padding:0 4px; flex-wrap:wrap;
}

.choice-btn {
  background:rgba(255,255,255,0.07);
  border:3px solid rgba(255,255,255,0.18);
  border-radius:18px;
  padding:10px 8px 8px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  transition:transform 0.12s, border-color 0.15s, background 0.15s;
  min-width:88px; min-height:80px; flex-shrink:0;
}
.choice-btn:active { transform:scale(0.92); }
.choice-btn:hover  { border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.13); }

.choice-label {
  font-size:0.68rem; font-weight:900; opacity:0.6;
  background:rgba(255,255,255,0.1); border-radius:8px; padding:2px 8px;
}

/* Feedback correct */
.choice-btn.correct {
  border-color:#00c47a !important;
  background:rgba(0,196,122,0.2) !important;
  animation:pop-ok 0.4s ease;
}
@keyframes pop-ok {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.1); }
  100% { transform:scale(1); }
}

/* Feedback erreur */
.choice-btn.wrong {
  border-color:#ff4455 !important;
  background:rgba(255,68,85,0.15) !important;
  animation:shake-btn 0.35s ease;
}
@keyframes shake-btn {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-8px); }
  60%     { transform:translateX(8px); }
}

/* Révèle la bonne réponse (après erreur) */
.choice-btn.reveal {
  border-color:#ffe066 !important;
  background:rgba(255,224,102,0.15) !important;
}

/* ── Écran de fin ── */
#end-screen {
  display:none; position:absolute; inset:0;
  background:rgba(13,27,42,0.97);
  flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:20;
}
#end-screen.visible { display:flex; }
#end-emoji  { font-size:4.5rem; }
#end-msg    { font-size:1.4rem; font-weight:900; text-align:center; padding:0 24px; line-height:1.4; }
#end-score  { font-size:1rem; color:#ffe066; font-weight:900; }
#btn-replay {
  background:linear-gradient(135deg,#00c47a,#00906a); color:#fff;
  border:none; border-radius:20px;
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1.1rem; padding:14px 38px; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,196,122,0.45); transition:transform 0.15s;
}
#btn-replay:active { transform:scale(0.95); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <a href="index.html">←</a>
    <span id="htitle">📈 Complète la suite</span>
    <div id="score-badge">0 / 0</div>
  </div>

  <!-- Indicateur de round -->
  <div id="level-bar">
    <div class="lvl-dot active" id="dot-0"></div>
    <div class="lvl-dot"        id="dot-1"></div>
    <div class="lvl-dot"        id="dot-2"></div>
    <div class="lvl-dot"        id="dot-3"></div>
    <div class="lvl-dot"        id="dot-4"></div>
    <span id="level-label">Round 1 / 5</span>
  </div>

  <!-- Zone principale -->
  <div id="main">
    <div id="q-label">Qu'est-ce qui vient ensuite ?</div>
    <div id="hint-label"></div>

    <!-- Ligne de la suite -->
    <div id="sequence-row"></div>

    <!-- Choix -->
    <div id="choices-label">Choisis la bonne réponse ↓</div>
    <div id="choices"></div>
  </div>

  <!-- Fin de partie -->
  <div id="end-screen">
    <div id="end-emoji">🎉</div>
    <div id="end-msg"></div>
    <div id="end-score"></div>
    <button id="btn-replay" onclick="startGame()">Rejouer !</button>
    <a href="index.html" style="color:#ffe066;font-weight:900;font-size:0.95rem;margin-top:4px;">← Menu</a>
  </div>
</div>

<script src="js/bus-svg.js"></script>
<script src="js/data.js"></script>
<script src="js/victory-sounds.js"></script>
<script src="js/tts.js"></script>
<script src="js/tracker.js"></script>
<script src="js/comments.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
//  MJ-16 — Complète la suite
//  5 rounds, patterns mixés (3 ou 4 éléments visibles avant la case mystère) :
//    - size-up / size-down (3 starters, même bus) : S M L → XL
//    - num-up / num-down   (3 starters, même couleur) : 5 6 7 → 8
//    - alt-AB              (4 starters) : 🔴🔵🔴🔵 → 🔴
//    - alt-ABC             (4 starters) : 🔴🔵🟢🔴 → 🔵
// ═══════════════════════════════════════════════════════════════════════════

const ROUNDS_PER_GAME = 5;

const SIZE_STEPS = [60, 80, 100, 120];

// ── Utilitaires ─────────────────────────────────────────────────────────────

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function pick(arr, n) {
  return shuffle(arr).slice(0, n);
}

function randBool() {
  return Math.random() < 0.5;
}

// ── Calcul de la taille de bus adaptée à l'écran ────────────────────────────
// Les 4 cases sont en ligne horizontale. On vise une taille raisonnable.
function calcSeqBusWidth() {
  const w = Math.min(window.innerWidth, 760);
  // 4 cellules + 3 flèches (18px each) + padding + gaps
  const available = w - 4 * 8 - 3 * 26 - 4 * 12 - 4 * 16;
  return Math.min(130, Math.max(70, Math.floor(available / 4)));
}

function calcChoiceBusWidth() {
  const w = Math.min(window.innerWidth, 760);
  // 3 boutons, gap 10px, padding
  const available = w - 2 * 10 - 3 * 16 - 4 * 8;
  return Math.min(140, Math.max(80, Math.floor(available / 3)));
}

// ── Génération des puzzles ───────────────────────────────────────────────────

function pickDailyLigne() {
  const dailyPool = LIGNES.filter(l => ['162','172','185','V7','M7'].includes(l.num));
  return shuffle(dailyPool.length ? dailyPool : LIGNES)[0];
}

// Taille croissante : S M L → XL (3 starters)
function generateSizeUp() {
  const ligne = pickDailyLigne();
  const [s0, s1, s2, s3] = SIZE_STEPS;
  const [ws1, ws2] = shuffle(SIZE_STEPS.filter(s => s !== s3)).slice(0, 2);
  return {
    sequence: [s0, s1, s2].map(w => ({ ligne, width: w })),
    answer:   { ligne, width: s3 },
    choices: shuffle([
      { ligne, width: s3,  correct: true  },
      { ligne, width: ws1, correct: false },
      { ligne, width: ws2, correct: false },
    ]),
    hint: 'Les bus grandissent !',
    labelMode: 'num',
  };
}

// Taille décroissante : XL L M → S (3 starters)
function generateSizeDown() {
  const ligne = pickDailyLigne();
  const [s0, s1, s2, s3] = [...SIZE_STEPS].reverse();
  const [ws1, ws2] = shuffle(SIZE_STEPS.filter(s => s !== s3)).slice(0, 2);
  return {
    sequence: [s0, s1, s2].map(w => ({ ligne, width: w })),
    answer:   { ligne, width: s3 },
    choices: shuffle([
      { ligne, width: s3,  correct: true  },
      { ligne, width: ws1, correct: false },
      { ligne, width: ws2, correct: false },
    ]),
    hint: 'Les bus rapetissent !',
    labelMode: 'num',
  };
}

// Num croissant : 5 6 7 → 8 (3 starters, même couleur)
function generateNumUp() {
  const base    = pickDailyLigne();
  const start   = 2 + Math.floor(Math.random() * 7); // 2..8
  const make    = n => ({ num: String(n), color: base.color, textColor: base.textColor });
  const ligneA = make(start), ligneB = make(start+1), ligneC = make(start+2), ligneD = make(start+3);
  const wrong1 = make(start+5);
  const wrong2 = make(start-1 >= 1 ? start-1 : start+4);
  const w = 90;
  return {
    sequence: [ligneA, ligneB, ligneC].map(l => ({ ligne: l, width: w })),
    answer:   { ligne: ligneD, width: w },
    choices: shuffle([
      { ligne: ligneD, width: w, correct: true  },
      { ligne: wrong1, width: w, correct: false },
      { ligne: wrong2, width: w, correct: false },
    ]),
    hint: 'Les numéros montent !',
    labelMode: 'num',
  };
}

// Num décroissant : 8 7 6 → 5 (3 starters)
function generateNumDown() {
  const base  = pickDailyLigne();
  const start = 5 + Math.floor(Math.random() * 6); // 5..10
  const make  = n => ({ num: String(n), color: base.color, textColor: base.textColor });
  const ligneA = make(start), ligneB = make(start-1), ligneC = make(start-2), ligneD = make(start-3);
  const wrong1 = make(start-5 >= 1 ? start-5 : start+2);
  const wrong2 = make(start+1);
  const w = 90;
  return {
    sequence: [ligneA, ligneB, ligneC].map(l => ({ ligne: l, width: w })),
    answer:   { ligne: ligneD, width: w },
    choices: shuffle([
      { ligne: ligneD, width: w, correct: true  },
      { ligne: wrong1, width: w, correct: false },
      { ligne: wrong2, width: w, correct: false },
    ]),
    hint: 'Les numéros descendent !',
    labelMode: 'num',
  };
}

// Alternance 2 couleurs : A B A B → A (4 starters)
function generateAltAB() {
  const pool = selectDistinctColors(LIGNES, 4, 80);
  if (pool.length < 3) return generateSizeUp();
  const [a, b, c] = pool;
  const w = 80;
  return {
    sequence: [a, b, a, b].map(l => ({ ligne: l, width: w })),
    answer:   { ligne: a, width: w },
    choices: shuffle([
      { ligne: a, width: w, correct: true  },
      { ligne: b, width: w, correct: false },
      { ligne: c, width: w, correct: false },
    ]),
    hint: 'Ça se répète deux par deux !',
    labelMode: 'num',
  };
}

// Alternance 3 couleurs : A B C A → B (4 starters)
function generateAltABC() {
  const pool = selectDistinctColors(LIGNES, 5, 80);
  if (pool.length < 4) return generateAltAB();
  const [a, b, c, d] = pool;
  const w = 80;
  return {
    sequence: [a, b, c, a].map(l => ({ ligne: l, width: w })),
    answer:   { ligne: b, width: w },
    choices: shuffle([
      { ligne: b, width: w, correct: true  },
      { ligne: c, width: w, correct: false },
      { ligne: d, width: w, correct: false },
    ]),
    hint: 'Ça tourne par trois !',
    labelMode: 'num',
  };
}

const PATTERN_GENERATORS = [
  generateSizeUp,
  generateSizeDown,
  generateNumUp,
  generateNumDown,
  generateAltAB,
  generateAltABC,
];

function generatePuzzle(_roundNum) {
  const fn = PATTERN_GENERATORS[Math.floor(Math.random() * PATTERN_GENERATORS.length)];
  return fn();
}


// ── État du jeu ──────────────────────────────────────────────────────────────

let score    = 0;
let round    = 0;
let answered = false;
let currentPuzzle = null;

// ── Rendu ────────────────────────────────────────────────────────────────────

function renderPuzzle(puzzle) {
  currentPuzzle = puzzle;
  answered      = false;

  const seqBusW    = calcSeqBusWidth();
  const choiceBusW = calcChoiceBusWidth();

  // Appliquer la taille calculée si width===0 (niveaux A)
  const resolvedSeq = puzzle.sequence.map(item => ({
    ...item,
    width: item.width > 0 ? item.width : seqBusW,
  }));
  const resolvedAnswer = {
    ...puzzle.answer,
    width: puzzle.answer.width > 0 ? puzzle.answer.width : seqBusW,
  };
  const resolvedChoices = puzzle.choices.map(c => ({
    ...c,
    width: c.width > 0 ? c.width : choiceBusW,
  }));

  document.getElementById('hint-label').textContent = puzzle.hint;

  // Ligne de la suite
  const seqRow = document.getElementById('sequence-row');
  seqRow.innerHTML = '';

  resolvedSeq.forEach((item, i) => {
    if (i > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'seq-arrow';
      arrow.textContent = '›';
      seqRow.appendChild(arrow);
    }

    const cell = document.createElement('div');
    cell.className = 'seq-cell';
    cell.innerHTML = `<div class="cell-bus-wrap">${busSVG(item.ligne.color, item.ligne.textColor, item.ligne.num, item.width)}</div>`;
    seqRow.appendChild(cell);
  });

  // Flèche avant case mystère
  const arrowLast = document.createElement('div');
  arrowLast.className = 'seq-arrow';
  arrowLast.textContent = '›';
  seqRow.appendChild(arrowLast);

  // Case mystère (4e case)
  const mysteryCell = document.createElement('div');
  mysteryCell.className = 'seq-cell mystery';
  mysteryCell.id = 'mystery-cell';
  mysteryCell.innerHTML = `<span class="mystery-mark">?</span>`;
  seqRow.appendChild(mysteryCell);

  // Boutons de choix
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  resolvedChoices.forEach((item) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.correct = item.correct ? '1' : '0';

    btn.innerHTML = busSVG(item.ligne.color, item.ligne.textColor, item.ligne.num, item.width);

    btn.addEventListener('click', () => onChoiceTap(btn, item, resolvedAnswer));
    choicesEl.appendChild(btn);
  });

  speak('Qu\'est-ce qui vient ensuite ?');
}

// ── Interaction ───────────────────────────────────────────────────────────────

function onChoiceTap(btn, item, answer) {
  if (answered) return;
  answered = true;

  const isCorrect = item.correct;

  if (isCorrect) {
    // Bonne réponse
    score++;
    updateScore();
    btn.classList.add('correct');
    if (typeof Tracker !== 'undefined') Tracker.logAnswer(true);
    playSuccessBeep();

    // Remplir la case mystère
    setTimeout(() => {
      fillMysteryCell(answer);
      setTimeout(nextRound, 700);
    }, 350);

  } else {
    // Mauvaise réponse
    btn.classList.add('wrong');
    if (typeof Tracker !== 'undefined') Tracker.logAnswer(false);
    playErrorSound();

    setTimeout(() => {
      btn.classList.remove('wrong');
      // Révèle la bonne réponse
      const allBtns = document.querySelectorAll('.choice-btn');
      allBtns.forEach(b => {
        if (b.dataset.correct === '1') b.classList.add('reveal');
      });
      // Remplir quand même la case mystère
      fillMysteryCell(answer);
      setTimeout(nextRound, 1100);
    }, 450);
  }
}

function fillMysteryCell(answer) {
  const cell = document.getElementById('mystery-cell');
  if (!cell) return;
  cell.classList.add('filled');
  cell.innerHTML = `<div class="cell-bus-wrap">${busSVG(answer.ligne.color, answer.ligne.textColor, answer.ligne.num, answer.width)}</div>
                    <span class="cell-label">4</span>`;
}

// ── Sons / TTS ──────────────────────────────────────────────────────────────

function playSuccessBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.18);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.2);
    });
  } catch(e) {}
}

function speak(text) { TTS.speak(text); }

// ── Score / Rounds / Dots ────────────────────────────────────────────────────

function updateScore() {
  document.getElementById('score-badge').textContent = `${score} / ${round}`;
}

function updateLevelDots() {
  for (let i = 0; i < ROUNDS_PER_GAME; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    if (i < round - 1)       dot.className = 'lvl-dot done';
    else if (i === round - 1) dot.className = 'lvl-dot active';
    else                      dot.className = 'lvl-dot';
  }
  document.getElementById('level-label').textContent = `Round ${round} / ${ROUNDS_PER_GAME}`;
}

function nextRound() {
  round++;
  if (round > ROUNDS_PER_GAME) {
    showEnd();
    return;
  }
  updateScore();
  updateLevelDots();
  renderPuzzle(generatePuzzle(round));
}

function showEnd() {
  const pct   = score / ROUNDS_PER_GAME;
  const emoji = pct >= 0.8 ? '🏆' : pct >= 0.5 ? '🎉' : '🚌';
  const msg   = pct >= 0.8 ? 'Bravo ! Tu es un champion des suites !'
              : pct >= 0.5 ? 'Bien joué ! Tu t\'améliores !'
              :               'Continue de t\'entraîner, tu vas y arriver !';

  document.getElementById('end-emoji').textContent  = emoji;
  document.getElementById('end-msg').textContent    = msg;
  document.getElementById('end-score').textContent  =
    `${score} bonne${score > 1 ? 's' : ''} réponse${score > 1 ? 's' : ''} sur ${ROUNDS_PER_GAME}`;

  document.getElementById('end-screen').classList.add('visible');
  playEndSound(score, ROUNDS_PER_GAME);
  speak(msg);
  if (typeof Tracker !== 'undefined') Tracker.endSession(score, ROUNDS_PER_GAME);
}

// ── Démarrage ────────────────────────────────────────────────────────────────

function startGame() {
  score    = 0;
  round    = 1;
  answered = false;
  stopEndSound();
  document.getElementById('end-screen').classList.remove('visible');
  updateScore();
  updateLevelDots();
  renderPuzzle(generatePuzzle(round));
}

startGame();
</script>
</body>
</html>
