<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MJ-17 – Le village des bus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { width:100%; height:100dvh; overflow:hidden; font-family:'Nunito',sans-serif; background:#0d1b2a; color:#fff; touch-action:none; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:820px; margin:0 auto; position:relative; }

/* Header */
#hdr {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
}
#hdr a {
  color:#fff; text-decoration:none; font-size:1.3rem;
  background:rgba(255,255,255,0.12); border-radius:10px;
  padding:6px 12px; font-weight:900;
}
#htitle { flex:1; font-size:1rem; font-weight:900; }
#score-badge {
  background:#ffe066; color:#1a1a1a; font-weight:900;
  border-radius:20px; padding:4px 14px; font-size:0.95rem;
}

/* Main */
#main {
  flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden;
  background:linear-gradient(180deg, #1e3a5f 0%, #2a5f7a 45%, #4a7a52 45%, #3a5a3a 100%);
}

/* Instruction */
#q-label {
  text-align:center; font-size:1.05rem; font-weight:900;
  padding:10px 14px; background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
  flex-shrink:0; line-height:1.3;
}

/* Stations (rangée du haut) */
#stations {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px; padding:12px 10px; flex-shrink:0;
}
.station {
  background:rgba(255,255,255,0.1);
  border:3px dashed rgba(255,255,255,0.3);
  border-radius:18px; padding:10px 6px;
  display:flex; flex-direction:column; align-items:center;
  gap:4px; transition:all 0.2s; position:relative;
  min-height:120px; justify-content:center;
}
.station .icon { font-size:2.6rem; line-height:1; }
.station .label {
  font-size:0.78rem; font-weight:900; text-align:center;
  color:#fff; line-height:1.1;
}
.station.hover {
  background:rgba(255,230,102,0.3);
  border-color:#ffe066;
  transform:scale(1.05);
}
.station.wrong {
  animation:shake 0.4s ease-in-out;
  background:rgba(233,69,96,0.35);
  border-color:#e94560;
}
.station.correct {
  animation:pulseGreen 0.6s ease-out;
  background:rgba(0,196,122,0.35);
  border-color:#00c47a;
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-8px); }
  75% { transform:translateX(8px); }
}
@keyframes pulseGreen {
  0% { transform:scale(1); }
  50% { transform:scale(1.15); }
  100% { transform:scale(1); }
}

/* Zone bus */
#bus-zone {
  flex:1; position:relative; display:flex;
  align-items:center; justify-content:center;
  padding:10px;
}

/* Bus actor — draggable */
.bus-actor {
  position:relative; cursor:grab;
  transition:transform 0.25s, left 0.25s, top 0.25s;
  touch-action:none;
}
.bus-actor.dragging { cursor:grabbing; transition:none; z-index:20; }
.bus-actor svg { display:block; }

/* Bubble du bus (indication de panne) */
.bus-bubble {
  position:absolute; bottom:calc(100% + 6px); left:50%;
  transform:translateX(-50%);
  background:#fff; color:#333;
  font-weight:900; font-size:0.9rem;
  padding:6px 12px; border-radius:14px;
  box-shadow:0 3px 8px rgba(0,0,0,0.3);
  white-space:nowrap;
}
.bus-bubble::after {
  content:''; position:absolute; top:100%; left:50%;
  transform:translateX(-50%);
  border:6px solid transparent; border-top-color:#fff;
}

/* ── Overlays de pannes ── */
/* Jauge essence */
.fuel-gauge {
  position:absolute; top:-18px; right:-4px;
  width:42px; height:14px;
  background:#222; border:2px solid #fff;
  border-radius:3px; overflow:hidden;
  animation:fuelBlink 0.7s ease-in-out infinite;
}
.fuel-gauge::before {
  content:''; display:block; height:100%; width:15%;
  background:#e94560;
}
.fuel-gauge::after {
  content:'E'; position:absolute; right:-12px; top:-2px;
  color:#e94560; font-size:0.75rem; font-weight:900;
}
@keyframes fuelBlink {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

/* Taches sale */
.stain {
  position:absolute; border-radius:50%;
  background:radial-gradient(circle, #6b4423 30%, rgba(107,68,35,0.4) 80%);
  pointer-events:none;
}
.stain.s1 { width:22px; height:18px; top:30%; left:18%; }
.stain.s2 { width:16px; height:14px; top:50%; left:38%; transform:rotate(20deg); }
.stain.s3 { width:20px; height:16px; top:35%; left:58%; }
.fly {
  position:absolute; font-size:1rem; top:5%; left:40%;
  animation:flyMove 1.6s ease-in-out infinite;
}
@keyframes flyMove {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(10px,-6px); }
  66% { transform:translate(-6px,4px); }
}

/* Bus penché (pneus à plat) : géré en JS via classe sur wrapper */
.tilt { transform:rotate(-3deg) translateY(4px); transition:transform 0.3s; }

/* Confettis */
.confetti {
  position:absolute; width:10px; height:10px;
  pointer-events:none; animation:confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform:translate(0,0) rotate(0); opacity:1; }
  100% { transform:translate(var(--dx),var(--dy)) rotate(360deg); opacity:0; }
}

/* Sparkle lavage */
.sparkle {
  position:absolute; font-size:1.5rem; pointer-events:none;
  animation:sparkleFloat 0.9s ease-out forwards;
}
@keyframes sparkleFloat {
  0% { transform:translate(0,0) scale(0.5); opacity:0; }
  30% { opacity:1; }
  100% { transform:translate(var(--dx),-40px) scale(1.3); opacity:0; }
}

/* Bus qui repart */
.bus-leave { animation:busLeave 1s ease-in forwards; }
@keyframes busLeave {
  0% { transform:translateX(0); opacity:1; }
  100% { transform:translateX(100vw); opacity:0; }
}

/* Bus qui arrive */
.bus-enter { animation:busEnter 0.7s ease-out; }
@keyframes busEnter {
  0% { transform:translateX(-100vw); }
  100% { transform:translateX(0); }
}

/* Overlay "bravo" */
#wow {
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.3); z-index:30;
  pointer-events:none;
}
#wow.show { display:flex; animation:wowPop 1s ease-out; }
#wow .msg {
  background:#fff; color:#00c47a;
  padding:18px 36px; border-radius:24px;
  font-size:2rem; font-weight:900;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
@keyframes wowPop {
  0% { opacity:0; transform:scale(0.5); }
  50% { transform:scale(1.1); }
  100% { opacity:1; transform:scale(1); }
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <a href="index.html">←</a>
    <div id="htitle">🏘️ Le village des bus</div>
    <div id="score-badge">⭐ <span id="score">0</span></div>
  </div>

  <div id="main">
    <div id="q-label">Amène le bus à la bonne station !</div>

    <div id="stations">
      <div class="station" data-station="essence">
        <div class="icon">⛽</div>
        <div class="label">Station<br>essence</div>
      </div>
      <div class="station" data-station="lavage">
        <div class="icon">🫧</div>
        <div class="label">Lavage</div>
      </div>
      <div class="station" data-station="numero">
        <div class="icon">🔢</div>
        <div class="label">Atelier<br>numéro</div>
      </div>
      <div class="station" data-station="pneus">
        <div class="icon">🔧</div>
        <div class="label">Garage<br>pneus</div>
      </div>
    </div>

    <div id="bus-zone"></div>

    <div id="wow"><div class="msg">✨ Bravo !</div></div>
  </div>
</div>

<script src="js/bus-svg.js"></script>
<script>
// ─── Lignes RATP Villejuif (sous-ensemble connu de Max) ───
const LIGNES = [
  { num:'162', color:'#f28cad', textColor:'#fff' },
  { num:'172', color:'#d4a24f', textColor:'#fff' },
  { num:'180', color:'#87b7c8', textColor:'#fff' },
  { num:'185', color:'#6d4e8a', textColor:'#fff' },
  { num:'186', color:'#e2001a', textColor:'#fff' },
  { num:'323', color:'#00a878', textColor:'#fff' },
  { num:'323', color:'#2a6ab3', textColor:'#fff' },
  { num:'131', color:'#ffcc00', textColor:'#333' },
];

const PANNES = ['essence', 'lavage', 'numero', 'pneus'];

const PANNE_BUBBLES = {
  essence: 'Plus d\'essence !',
  lavage:  'Je suis sale...',
  numero:  'J\'ai perdu mon numéro !',
  pneus:   'Pneus à plat !',
};

let score = 0;
let currentPanne = null;
let currentBus = null;
let busEl = null;
let dragging = false;
let dragOffset = { x:0, y:0 };
let busStartPos = { left:0, top:0 };
let queue = []; // pannes restantes du round pour éviter répétition immédiate

const $ = (s) => document.querySelector(s);
const busZone = $('#bus-zone');
const stations = document.querySelectorAll('.station');
const scoreEl = $('#score');
const wowEl = $('#wow');

// ─── TTS ───
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 1; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

// ─── Next panne (évite répétition immédiate) ───
function nextPanne() {
  if (queue.length === 0) queue = [...PANNES].sort(() => Math.random() - 0.5);
  return queue.shift();
}

// ─── Bus factory ───
function makeBus(panne) {
  const ligne = LIGNES[Math.floor(Math.random() * LIGNES.length)];
  const wrapper = document.createElement('div');
  wrapper.className = 'bus-actor bus-enter';
  wrapper.dataset.panne = panne;

  // Bulle
  const bubble = document.createElement('div');
  bubble.className = 'bus-bubble';
  bubble.textContent = PANNE_BUBBLES[panne];
  wrapper.appendChild(bubble);

  // SVG : pour "numero" on passe un num vide + fond gris
  let svgHtml;
  if (panne === 'numero') {
    svgHtml = busSVG('#888', '#888', '?', 180);
  } else {
    svgHtml = busSVG(ligne.color, ligne.textColor, ligne.num, 180);
  }
  const svgWrap = document.createElement('div');
  svgWrap.innerHTML = svgHtml;
  wrapper.appendChild(svgWrap);

  // Overlays selon panne
  if (panne === 'essence') {
    const g = document.createElement('div');
    g.className = 'fuel-gauge';
    wrapper.appendChild(g);
  } else if (panne === 'lavage') {
    ['s1','s2','s3'].forEach(c => {
      const st = document.createElement('div');
      st.className = 'stain ' + c;
      wrapper.appendChild(st);
    });
    const fly = document.createElement('div');
    fly.className = 'fly';
    fly.textContent = '🪰';
    wrapper.appendChild(fly);
  } else if (panne === 'pneus') {
    wrapper.classList.add('tilt');
    // Remplacer les roues (cx=45, cx=115, r=10) par ellipses aplaties
    const svg = wrapper.querySelector('svg');
    const circles = svg.querySelectorAll('circle[r="10"]');
    circles.forEach(c => {
      const cx = c.getAttribute('cx');
      const cy = parseFloat(c.getAttribute('cy')) + 3; // descendre un peu
      const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
      ell.setAttribute('cx', cx);
      ell.setAttribute('cy', cy);
      ell.setAttribute('rx', '11');
      ell.setAttribute('ry', '4');
      ell.setAttribute('fill', '#333');
      ell.setAttribute('stroke', '#111');
      ell.setAttribute('stroke-width', '2');
      c.parentNode.replaceChild(ell, c);
    });
    // Masquer les cercles intérieurs r=6 et r=2
    svg.querySelectorAll('circle[r="6"],circle[r="2"]').forEach(c => c.remove());
  }

  return wrapper;
}

function positionBusCenter(el) {
  const zone = busZone.getBoundingClientRect();
  const w = 180;
  el.style.position = 'absolute';
  el.style.left = ((zone.width - w) / 2) + 'px';
  el.style.top = ((zone.height - 100) / 2) + 'px';
  busStartPos = {
    left: (zone.width - w) / 2,
    top: (zone.height - 100) / 2,
  };
}

function spawnBus() {
  currentPanne = nextPanne();
  currentBus = makeBus(currentPanne);
  busZone.appendChild(currentBus);
  busEl = currentBus;
  positionBusCenter(currentBus);
  attachDrag(currentBus);
  setTimeout(() => speak(PANNE_BUBBLES[currentPanne]), 300);
}

// ─── Drag & drop ───
function attachDrag(el) {
  const onDown = (e) => {
    e.preventDefault();
    const pt = getPoint(e);
    const rect = el.getBoundingClientRect();
    dragOffset.x = pt.x - rect.left;
    dragOffset.y = pt.y - rect.top;
    dragging = true;
    el.classList.add('dragging');
  };
  const onMove = (e) => {
    if (!dragging) return;
    e.preventDefault();
    const pt = getPoint(e);
    const zone = busZone.getBoundingClientRect();
    el.style.left = (pt.x - zone.left - dragOffset.x) + 'px';
    el.style.top = (pt.y - zone.top - dragOffset.y) + 'px';
    highlightHoveredStation(pt);
  };
  const onUp = (e) => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    const pt = getPoint(e);
    const st = findStationAt(pt);
    clearStationHover();
    if (st) {
      handleDrop(st);
    } else {
      // Retour à la position initiale
      el.style.left = busStartPos.left + 'px';
      el.style.top = busStartPos.top + 'px';
    }
  };
  el.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
}

function getPoint(e) {
  if (e.touches && e.touches[0]) return { x:e.touches[0].clientX, y:e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches[0]) return { x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY };
  return { x:e.clientX, y:e.clientY };
}

function findStationAt(pt) {
  for (const st of stations) {
    const r = st.getBoundingClientRect();
    if (pt.x >= r.left && pt.x <= r.right && pt.y >= r.top && pt.y <= r.bottom) {
      return st;
    }
  }
  return null;
}

function highlightHoveredStation(pt) {
  const hovered = findStationAt(pt);
  stations.forEach(s => {
    if (s === hovered) s.classList.add('hover');
    else s.classList.remove('hover');
  });
}
function clearStationHover() { stations.forEach(s => s.classList.remove('hover')); }

// ─── Drop handling ───
function handleDrop(station) {
  const target = station.dataset.station;
  if (target === currentPanne) {
    correctDrop(station);
  } else {
    wrongDrop(station);
  }
}

function wrongDrop(station) {
  station.classList.add('wrong');
  setTimeout(() => station.classList.remove('wrong'), 400);
  // Retour position centre
  busEl.style.left = busStartPos.left + 'px';
  busEl.style.top = busStartPos.top + 'px';
  speak('Non, pas ici...');
}

function correctDrop(station) {
  station.classList.add('correct');
  setTimeout(() => station.classList.remove('correct'), 600);

  // Snap le bus sur la station
  const sr = station.getBoundingClientRect();
  const zr = busZone.getBoundingClientRect();
  const bw = 180;
  busEl.style.left = (sr.left - zr.left + sr.width/2 - bw/2) + 'px';
  busEl.style.top = (sr.top - zr.top + sr.height - 40) + 'px';

  // Anim de réparation (1s), puis le bus repart "réparé"
  setTimeout(() => repairAnim(station), 100);
  setTimeout(() => finishRound(), 1400);
}

function repairAnim(station) {
  const panne = currentPanne;
  if (panne === 'lavage') {
    // Sparkles + retirer taches
    busEl.querySelectorAll('.stain,.fly').forEach(e => e.remove());
    for (let i = 0; i < 6; i++) {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.textContent = '✨';
      sp.style.left = (40 + i*18) + 'px';
      sp.style.top = '20px';
      sp.style.setProperty('--dx', ((Math.random()-0.5)*40) + 'px');
      busEl.appendChild(sp);
      setTimeout(() => sp.remove(), 1000);
    }
  } else if (panne === 'essence') {
    const g = busEl.querySelector('.fuel-gauge');
    if (g) {
      g.style.animation = 'none';
      g.querySelector(':scope') || null;
      // Remplir la jauge en vert
      g.innerHTML = '';
      const bar = document.createElement('div');
      bar.style.cssText = 'height:100%;width:0;background:#00c47a;transition:width 0.8s;';
      g.appendChild(bar);
      requestAnimationFrame(() => bar.style.width = '100%');
    }
  } else if (panne === 'numero') {
    // Recolorer la fenêtre destination avec la bonne ligne (aléatoire)
    const ligne = LIGNES[Math.floor(Math.random() * LIGNES.length)];
    const svg = busEl.querySelector('svg');
    const destRect = svg.querySelector('rect[x="84"]');
    if (destRect) destRect.setAttribute('fill', ligne.color);
    const numText = svg.querySelector('text');
    if (numText) {
      numText.textContent = ligne.num;
      numText.setAttribute('fill', ligne.textColor);
    }
  } else if (panne === 'pneus') {
    busEl.classList.remove('tilt');
    // Remplacer les ellipses par des cercles
    const svg = busEl.querySelector('svg');
    const ellipses = svg.querySelectorAll('ellipse');
    ellipses.forEach(ell => {
      const cx = ell.getAttribute('cx');
      const cy = parseFloat(ell.getAttribute('cy')) - 3;
      const cGrp = `
        <circle cx="${cx}" cy="${cy}" r="10" fill="#333" stroke="#111" stroke-width="2"/>
        <circle cx="${cx}" cy="${cy}" r="6" fill="#666"/>
        <circle cx="${cx}" cy="${cy}" r="2" fill="#111"/>
      `;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML = cGrp;
      // insertAdjacentHTML polyfill pour SVG
      const tmp = document.createElementNS('http://www.w3.org/2000/svg','svg');
      tmp.innerHTML = cGrp;
      while (tmp.firstChild) ell.parentNode.insertBefore(tmp.firstChild, ell);
      ell.remove();
    });
  }
}

function finishRound() {
  score++;
  scoreEl.textContent = score;
  speak('Bravo !');
  // Confettis + wow
  fireConfetti();
  wowEl.classList.add('show');
  setTimeout(() => wowEl.classList.remove('show'), 900);

  // Bus qui repart
  if (busEl) {
    busEl.classList.add('bus-leave');
    busEl.style.pointerEvents = 'none';
    // Retirer la bulle
    const b = busEl.querySelector('.bus-bubble');
    if (b) b.style.display = 'none';
  }
  setTimeout(() => {
    if (busEl) busEl.remove();
    spawnBus();
  }, 1100);
}

function fireConfetti() {
  const colors = ['#ffe066','#e94560','#00c47a','#4a90e2','#f28cad'];
  const zone = busZone;
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i % colors.length];
    c.style.left = (zone.clientWidth/2) + 'px';
    c.style.top = (zone.clientHeight/2) + 'px';
    c.style.setProperty('--dx', ((Math.random()-0.5)*300) + 'px');
    c.style.setProperty('--dy', (Math.random()*-250 - 50) + 'px');
    zone.appendChild(c);
    setTimeout(() => c.remove(), 1300);
  }
}

// ─── Start ───
window.addEventListener('load', () => {
  setTimeout(spawnBus, 300);
});
</script>
</body>
</html>
