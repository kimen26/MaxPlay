<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MJ-17 – Le village des bus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { width:100%; height:100dvh; overflow:hidden; font-family:'Nunito',sans-serif; background:#0d1b2a; color:#fff; touch-action:none; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:820px; margin:0 auto; position:relative; }

/* Header */
#hdr {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:rgba(0,0,0,0.35);
  border-bottom:2px solid rgba(255,255,255,0.08);
}
#hdr a {
  color:#fff; text-decoration:none; font-size:1.3rem;
  background:rgba(255,255,255,0.12); border-radius:10px;
  padding:6px 12px; font-weight:900;
}
#htitle { flex:1; font-size:1rem; font-weight:900; }
#score-badge {
  background:#ffe066; color:#1a1a1a; font-weight:900;
  border-radius:20px; padding:4px 14px; font-size:0.95rem;
}

/* Main */
#main {
  flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden;
  background:linear-gradient(180deg, #1e3a5f 0%, #2a5f7a 45%, #4a7a52 45%, #3a5a3a 100%);
}

/* Stations (rangée du haut) */
#stations {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:8px; padding:12px 10px; flex-shrink:0;
}
.station {
  background:rgba(255,255,255,0.1);
  border:3px dashed rgba(255,255,255,0.3);
  border-radius:18px; padding:10px 6px;
  display:flex; flex-direction:column; align-items:center;
  gap:4px; transition:all 0.2s; position:relative;
  min-height:110px; justify-content:center;
}
.station .icon { font-size:2.4rem; line-height:1; }
.station .label {
  font-size:0.78rem; font-weight:900; text-align:center;
  color:#fff; line-height:1.1;
}
.station.hover {
  background:rgba(255,230,102,0.3);
  border-color:#ffe066;
  transform:scale(1.05);
}
.station.wrong {
  animation:shake 0.4s ease-in-out;
  background:rgba(233,69,96,0.35);
  border-color:#e94560;
}
.station.correct {
  animation:pulseGreen 0.6s ease-out;
  background:rgba(0,196,122,0.35);
  border-color:#00c47a;
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(-8px); }
  75% { transform:translateX(8px); }
}
@keyframes pulseGreen {
  0% { transform:scale(1); }
  50% { transform:scale(1.15); }
  100% { transform:scale(1); }
}

/* Zone bus */
#bus-zone {
  flex:1; position:relative; overflow:hidden;
}

/* Bus actor — stationary (cible de drop) */
.bus-actor {
  position:absolute;
  transition:left 0.3s, top 0.3s;
}
.bus-actor.hover-drop { transform:scale(1.05); filter:brightness(1.15); }
.bus-actor svg { display:block; }

/* Outil flottant (clone d'icône station) */
.tool-ghost {
  position:fixed; pointer-events:none; z-index:50;
  font-size:3rem; transform:translate(-50%,-50%);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  transition:none;
}
.station.active {
  background:rgba(255,230,102,0.25);
  border-color:#ffe066;
  transform:scale(1.04);
}

/* Barre de patience */
.patience {
  position:absolute; left:8px; right:8px; bottom:-12px;
  height:6px; background:rgba(0,0,0,0.45);
  border-radius:3px; overflow:hidden;
}
.patience > div {
  height:100%; width:100%; background:#00c47a;
  transition:width 0.2s linear, background-color 0.3s;
}
.patience.low > div { background:#ffaa00; }
.patience.critical > div { background:#e94560; }

.bus-actor.wrong-shake { animation:shake 0.4s ease-in-out; }
.bus-leave-sad {
  animation:busLeaveSad 0.9s ease-in forwards;
}
@keyframes busLeaveSad {
  0% { transform:translateX(0) translateY(0); opacity:1; }
  30% { transform:translateX(-6px) translateY(2px); }
  100% { transform:translateX(100vw) translateY(30px); opacity:0; }
}

.sad-emote {
  position:absolute; top:-28px; left:50%; transform:translateX(-50%);
  font-size:1.6rem; animation:emoteFloat 0.9s ease-out forwards;
  pointer-events:none;
}
@keyframes emoteFloat {
  0% { opacity:0; transform:translate(-50%,0) scale(0.6); }
  30% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-30px) scale(1.2); }
}

/* ── Overlays de pannes ── */
.fuel-gauge {
  position:absolute; top:-18px; right:-4px;
  width:42px; height:14px;
  background:#222; border:2px solid #fff;
  border-radius:3px; overflow:hidden;
  animation:fuelBlink 0.7s ease-in-out infinite;
}
.fuel-gauge::before {
  content:''; display:block; height:100%; width:15%;
  background:#e94560;
}
.fuel-gauge::after {
  content:'E'; position:absolute; right:-12px; top:-2px;
  color:#e94560; font-size:0.75rem; font-weight:900;
}
@keyframes fuelBlink {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.stain {
  position:absolute; border-radius:50%;
  background:radial-gradient(circle, #6b4423 30%, rgba(107,68,35,0.4) 80%);
  pointer-events:none;
}
.stain.s1 { width:20px; height:16px; top:30%; left:18%; }
.stain.s2 { width:14px; height:12px; top:50%; left:38%; transform:rotate(20deg); }
.stain.s3 { width:18px; height:14px; top:35%; left:58%; }
.fly {
  position:absolute; font-size:0.9rem; top:5%; left:40%;
  animation:flyMove 1.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes flyMove {
  0%,100% { transform:translate(0,0); }
  33% { transform:translate(10px,-6px); }
  66% { transform:translate(-6px,4px); }
}

/* Bus penché (pneus à plat) */
.tilt { transform:rotate(-3deg) translateY(4px); transition:transform 0.3s; }

/* Indicateur panne couleur */
.color-warn {
  position:absolute; top:-22px; left:50%; transform:translateX(-50%);
  font-size:1.3rem; animation:colorWarnPulse 1s ease-in-out infinite;
  pointer-events:none;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6));
}
@keyframes colorWarnPulse {
  0%,100% { transform:translateX(-50%) scale(1); }
  50% { transform:translateX(-50%) scale(1.2); }
}

/* Confettis */
.confetti {
  position:absolute; width:10px; height:10px;
  pointer-events:none; animation:confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform:translate(0,0) rotate(0); opacity:1; }
  100% { transform:translate(var(--dx),var(--dy)) rotate(360deg); opacity:0; }
}

.sparkle {
  position:absolute; font-size:1.4rem; pointer-events:none;
  animation:sparkleFloat 0.9s ease-out forwards;
}
@keyframes sparkleFloat {
  0% { transform:translate(0,0) scale(0.5); opacity:0; }
  30% { opacity:1; }
  100% { transform:translate(var(--dx),-40px) scale(1.3); opacity:0; }
}

.bus-leave { animation:busLeave 0.9s ease-in forwards; }
@keyframes busLeave {
  0% { transform:translateX(0); opacity:1; }
  100% { transform:translateX(100vw); opacity:0; }
}

.bus-enter { animation:busEnter 0.6s ease-out; }
@keyframes busEnter {
  0% { transform:translateX(-100vw); opacity:0; }
  100% { transform:translateX(0); opacity:1; }
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <a href="index.html">←</a>
    <div id="htitle">🏘️ Le village des bus</div>
    <div id="score-badge">⭐ <span id="score">0</span></div>
  </div>

  <div id="main">
    <div id="stations">
      <div class="station" data-station="essence">
        <div class="icon">⛽</div>
        <div class="label">Station<br>essence</div>
      </div>
      <div class="station" data-station="lavage">
        <div class="icon">🫧</div>
        <div class="label">Lavage</div>
      </div>
      <div class="station" data-station="numero">
        <div class="icon">💻</div>
        <div class="label">Ordinateur</div>
      </div>
      <div class="station" data-station="pneus">
        <div class="icon">🔧</div>
        <div class="label">Garage<br>pneus</div>
      </div>
    </div>

    <div id="bus-zone"></div>
  </div>
</div>

<script src="js/bus-svg.js"></script>
<script src="js/sounds.js"></script>
<script src="js/feedback.js"></script>
<script src="js/drag-drop.js"></script>
<script src="js/tracker.js"></script>
<script src="js/comments.js"></script>
<script>
// ─── Lignes RATP Villejuif (sous-ensemble connu de Max) ───
const LIGNES = [
  { num:'162', color:'#f28cad', textColor:'#fff' },
  { num:'172', color:'#d4a24f', textColor:'#fff' },
  { num:'180', color:'#87b7c8', textColor:'#fff' },
  { num:'185', color:'#6d4e8a', textColor:'#fff' },
  { num:'186', color:'#e2001a', textColor:'#fff' },
  { num:'323', color:'#00a878', textColor:'#fff' },
  { num:'131', color:'#ffcc00', textColor:'#333' },
];

const PANNES = ['essence', 'lavage', 'numero', 'pneus', 'couleur'];
const TOOL_ICONS = { essence:'⛽', lavage:'🫧', numero:'💻', pneus:'🔧' };
// L'ordinateur 💻 répare deux types de pannes : numéro masqué ET mauvaise couleur
const TOOL_FIXES = {
  essence: ['essence'],
  lavage:  ['lavage'],
  numero:  ['numero', 'couleur'],
  pneus:   ['pneus'],
};
const TOTAL_BUS = 8;
const BUS_W = 150;
const PATIENCE_MS = 22000;
const DROP_BUFFER = 120; // pixels autour du bus pour accepter le drop (large : tout autour est OK)
const DOUBLE_PANNE_PCT = 0.35; // 35% des bus ont 2 pannes

let score = 0;
let busDone = 0;
const scoreEl = document.getElementById('score');
const busZone = document.getElementById('bus-zone');
const stations = document.querySelectorAll('.station');

// Position centrale pour le bus unique
function centerPos() {
  const zone = busZone.getBoundingClientRect();
  return {
    left: (zone.width - BUS_W) / 2,
    top:  (zone.height - 100) / 2,
  };
}

// ─── Bus factory ───
function makeBus(pannes) {
  const ligne = LIGNES[Math.floor(Math.random() * LIGNES.length)];
  const wrapper = document.createElement('div');
  wrapper.className = 'bus-actor bus-enter';
  wrapper._pannes = [...pannes];
  wrapper._ligne = ligne;
  wrapper.dataset.panne = pannes.join(','); // pour debug/css

  // SVG : carrosserie turquoise + couleur IDFM sur destination
  // Pour "numero", numéro remplacé par "?" muet
  // Pour "couleur", la fenêtre destination prend une couleur d'une autre ligne (fausse)
  const hasNumero = pannes.includes('numero');
  const hasCouleur = pannes.includes('couleur');
  let displayColor = ligne.color;
  if (hasCouleur) {
    const others = LIGNES.filter(l => l.color !== ligne.color);
    const fake = others[Math.floor(Math.random() * others.length)];
    displayColor = fake.color;
    wrapper._fakeColor = fake.color;
  }
  const svgHtml = hasNumero
    ? busSVG(displayColor, 'rgba(255,255,255,0.25)', '?', BUS_W)
    : busSVG(displayColor, ligne.textColor, ligne.num, BUS_W);
  const svgWrap = document.createElement('div');
  svgWrap.innerHTML = svgHtml;
  wrapper.appendChild(svgWrap);

  if (hasCouleur) {
    const warn = document.createElement('div');
    warn.className = 'color-warn';
    warn.textContent = '⚠️';
    wrapper.appendChild(warn);
  }

  // Overlays visuels (tous affichés simultanément si plusieurs pannes)
  if (pannes.includes('essence')) {
    const g = document.createElement('div');
    g.className = 'fuel-gauge';
    wrapper.appendChild(g);
  }
  if (pannes.includes('lavage')) {
    ['s1','s2','s3'].forEach(c => {
      const st = document.createElement('div');
      st.className = 'stain ' + c;
      wrapper.appendChild(st);
    });
    const fly = document.createElement('div');
    fly.className = 'fly';
    fly.textContent = '🪰';
    wrapper.appendChild(fly);
  }
  if (pannes.includes('pneus')) {
    wrapper.classList.add('tilt');
    const svg = wrapper.querySelector('svg');
    const circles = svg.querySelectorAll('circle[r="10"]');
    circles.forEach(c => {
      const cx = c.getAttribute('cx');
      const cy = parseFloat(c.getAttribute('cy')) + 3;
      const ell = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
      ell.setAttribute('cx', cx);
      ell.setAttribute('cy', cy);
      ell.setAttribute('rx', '11');
      ell.setAttribute('ry', '4');
      ell.setAttribute('fill', '#333');
      ell.setAttribute('stroke', '#111');
      ell.setAttribute('stroke-width', '2');
      c.parentNode.replaceChild(ell, c);
    });
    svg.querySelectorAll('circle[r="6"],circle[r="2"]').forEach(c => c.remove());
  }

  return wrapper;
}

function placeBusCenter(el) {
  const p = centerPos();
  el.style.left = p.left + 'px';
  el.style.top  = p.top + 'px';
}

function nextPannes() {
  // 1 panne par défaut, 35% de chance d'en avoir 2 différentes
  const first = PANNES[Math.floor(Math.random() * PANNES.length)];
  if (Math.random() < DOUBLE_PANNE_PCT) {
    const others = PANNES.filter(p => p !== first);
    const second = others[Math.floor(Math.random() * others.length)];
    return [first, second];
  }
  return [first];
}

function spawnBus() {
  if (busDone >= TOTAL_BUS) { showEnd(); return; }
  const pannes = nextPannes();
  const bus = makeBus(pannes);
  busZone.appendChild(bus);
  placeBusCenter(bus);
  startPatience(bus);
  return bus;
}

// ─── Patience (bus part tout seul si on est trop lent) ───
function startPatience(bus) {
  const bar = document.createElement('div');
  bar.className = 'patience';
  const fill = document.createElement('div');
  bar.appendChild(fill);
  bus.appendChild(bar);
  bus._patienceStart = performance.now();
  bus._patienceFill = fill;
  bus._patienceBar = bar;
  bus._patienceTick = setInterval(() => tickPatience(bus), 200);
}
function tickPatience(bus) {
  if (!bus.isConnected || bus._done) { stopPatience(bus); return; }
  const elapsed = performance.now() - bus._patienceStart;
  const remain = Math.max(0, 1 - elapsed / PATIENCE_MS);
  bus._patienceFill.style.width = (remain * 100) + '%';
  bus._patienceBar.classList.toggle('low', remain < 0.5);
  bus._patienceBar.classList.toggle('critical', remain < 0.2);
  if (remain <= 0) leaveUnserved(bus);
}
function stopPatience(bus) {
  if (bus._patienceTick) { clearInterval(bus._patienceTick); bus._patienceTick = null; }
}

// ─── Drag & drop : depuis stations vers bus ───
stations.forEach(st => attachStationDrag(st));

function attachStationDrag(station) {
  let ghost = null;
  const type = station.dataset.station;

  const onDown = (e) => {
    e.preventDefault();
    const pt = getPointerXY(e);
    ghost = document.createElement('div');
    ghost.className = 'tool-ghost';
    ghost.textContent = TOOL_ICONS[type];
    ghost.style.left = pt.x + 'px';
    ghost.style.top  = pt.y + 'px';
    document.body.appendChild(ghost);
    station.classList.add('active');
  };
  const onMove = (e) => {
    if (!ghost) return;
    e.preventDefault();
    const pt = getPointerXY(e);
    ghost.style.left = pt.x + 'px';
    ghost.style.top  = pt.y + 'px';
    highlightHoveredBus(pt, type);
  };
  const onUp = (e) => {
    if (!ghost) return;
    const pt = getPointerXY(e);
    const bus = findBusAt(pt);
    clearBusHover();
    ghost.remove();
    ghost = null;
    station.classList.remove('active');
    if (bus && !bus._done) handleDrop(bus, type, station);
  };

  station.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
}

function findBusAt(pt) {
  const all = busZone.querySelectorAll('.bus-actor');
  for (const b of all) {
    if (b._done) continue;
    const r = b.getBoundingClientRect();
    if (pt.x >= r.left - DROP_BUFFER && pt.x <= r.right + DROP_BUFFER &&
        pt.y >= r.top - DROP_BUFFER && pt.y <= r.bottom + DROP_BUFFER) return b;
  }
  return null;
}
function highlightHoveredBus(pt, type) {
  const hovered = findBusAt(pt);
  busZone.querySelectorAll('.bus-actor').forEach(b => {
    if (b === hovered) b.classList.add('hover-drop');
    else b.classList.remove('hover-drop');
  });
}
function clearBusHover() {
  busZone.querySelectorAll('.bus-actor').forEach(b => b.classList.remove('hover-drop'));
}

// ─── Drop handling ───
function handleDrop(bus, toolType, station) {
  const fixables = TOOL_FIXES[toolType] || [toolType];
  const matched = (bus._pannes || []).find(p => fixables.includes(p));
  if (matched) {
    correctDrop(bus, station, matched);
  } else {
    wrongDrop(bus, station);
  }
}

function wrongDrop(bus, station) {
  station.classList.add('wrong');
  setTimeout(() => station.classList.remove('wrong'), 400);
  bus.classList.add('wrong-shake');
  setTimeout(() => bus.classList.remove('wrong-shake'), 400);
  if (typeof sndBuzz === 'function') sndBuzz();
  if (typeof Tracker !== 'undefined') Tracker.logAnswer(false);
}

function correctDrop(bus, station, panne) {
  station.classList.add('correct');
  setTimeout(() => station.classList.remove('correct'), 600);
  if (typeof sndDing === 'function') sndDing();
  if (typeof Tracker !== 'undefined') Tracker.logAnswer(true);

  // Retire la panne réparée
  bus._pannes = bus._pannes.filter(p => p !== panne);
  setTimeout(() => repairAnim(bus, panne), 100);

  if (bus._pannes.length === 0) {
    // Toutes les pannes sont réparées
    bus._done = true;
    stopPatience(bus);
    if (bus._patienceBar) bus._patienceBar.remove();
    setTimeout(() => finishBus(bus), 1400);
  } else {
    // Patience bonus pour la 2ème panne
    bus._patienceStart = performance.now();
  }
}

function leaveUnserved(bus) {
  if (bus._done) return;
  bus._done = true;
  stopPatience(bus);
  if (bus._patienceBar) bus._patienceBar.remove();
  const sad = document.createElement('div');
  sad.className = 'sad-emote';
  sad.textContent = '😢';
  bus.appendChild(sad);
  if (typeof sndBuzz === 'function') sndBuzz();
  bus.classList.add('bus-leave-sad');
  busDone++;
  setTimeout(() => { bus.remove(); spawnBus(); }, 900);
}

function repairAnim(bus, panne) {
  if (panne === 'lavage') {
    bus.querySelectorAll('.stain,.fly').forEach(e => e.remove());
    for (let i = 0; i < 6; i++) {
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      sp.textContent = '✨';
      sp.style.left = (30 + i*18) + 'px';
      sp.style.top = '20px';
      sp.style.setProperty('--dx', ((Math.random()-0.5)*40) + 'px');
      bus.appendChild(sp);
      setTimeout(() => sp.remove(), 1000);
    }
  } else if (panne === 'essence') {
    const g = bus.querySelector('.fuel-gauge');
    if (g) {
      g.style.animation = 'none';
      g.innerHTML = '';
      const bar = document.createElement('div');
      bar.style.cssText = 'height:100%;width:0;background:#00c47a;transition:width 0.8s;';
      g.appendChild(bar);
      requestAnimationFrame(() => bar.style.width = '100%');
    }
  } else if (panne === 'numero') {
    // Restaurer le numéro avec la vraie couleur de la ligne d'origine
    const ligne = bus._ligne;
    const svg = bus.querySelector('svg');
    const numText = svg.querySelector('text');
    if (numText) {
      numText.textContent = ligne.num;
      numText.setAttribute('fill', ligne.textColor);
    }
  } else if (panne === 'couleur') {
    // Corriger la couleur de la fenêtre destination vers la vraie couleur
    const ligne = bus._ligne;
    const svg = bus.querySelector('svg');
    const destRect = svg.querySelector('rect[x="84"]');
    if (destRect) {
      destRect.style.transition = 'fill 0.6s ease';
      destRect.setAttribute('fill', ligne.color);
    }
    const warn = bus.querySelector('.color-warn');
    if (warn) warn.remove();
  } else if (panne === 'pneus') {
    bus.classList.remove('tilt');
    const svg = bus.querySelector('svg');
    const ellipses = svg.querySelectorAll('ellipse');
    ellipses.forEach(ell => {
      const cx = ell.getAttribute('cx');
      const cy = parseFloat(ell.getAttribute('cy')) - 3;
      const tmp = document.createElementNS('http://www.w3.org/2000/svg','svg');
      tmp.innerHTML = `
        <circle cx="${cx}" cy="${cy}" r="10" fill="#333" stroke="#111" stroke-width="2"/>
        <circle cx="${cx}" cy="${cy}" r="6" fill="#666"/>
        <circle cx="${cx}" cy="${cy}" r="2" fill="#111"/>
      `;
      while (tmp.firstChild) ell.parentNode.insertBefore(tmp.firstChild, ell);
      ell.remove();
    });
  }
}

function finishBus(bus) {
  score++;
  scoreEl.textContent = score;
  fireConfetti(bus);

  bus.classList.add('bus-leave');
  bus.style.pointerEvents = 'none';
  busDone++;

  setTimeout(() => {
    bus.remove();
    spawnBus();
  }, 900);
}

function showEnd() {
  if (typeof Tracker !== 'undefined' && Tracker.endSession) Tracker.endSession();
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(13,27,42,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;padding:20px;';
  ov.innerHTML = `
    <div style="font-size:4rem;">🎉</div>
    <div style="font-size:1.6rem;font-weight:900;text-align:center;">Bravo !</div>
    <div style="font-size:1.2rem;font-weight:700;">Score : ${score} / ${TOTAL_BUS}</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;">
      <button id="replay" style="background:#ffe066;color:#1a1a1a;border:none;border-radius:14px;padding:12px 22px;font-size:1.1rem;font-weight:900;font-family:inherit;cursor:pointer;">🔁 Rejouer</button>
      <button id="menu" style="background:rgba(255,255,255,0.15);color:#fff;border:2px solid rgba(255,255,255,0.3);border-radius:14px;padding:12px 22px;font-size:1.1rem;font-weight:900;font-family:inherit;cursor:pointer;">🏠 Menu</button>
    </div>
  `;
  document.body.appendChild(ov);
  ov.querySelector('#replay').addEventListener('click', () => location.reload());
  ov.querySelector('#menu').addEventListener('click', () => location.href = 'index.html');
}

function fireConfetti(bus) {
  const colors = ['#ffe066','#e94560','#00c47a','#4a90e2','#f28cad','#ff9800','#9c27b0'];
  const r = bus.getBoundingClientRect();
  const zr = busZone.getBoundingClientRect();
  const cx = r.left - zr.left + r.width/2;
  const cy = r.top - zr.top + r.height/2;
  for (let i = 0; i < 48; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[i % colors.length];
    const size = 8 + Math.random() * 8;
    c.style.width = size + 'px';
    c.style.height = size + 'px';
    c.style.left = cx + 'px';
    c.style.top  = cy + 'px';
    c.style.setProperty('--dx', ((Math.random()-0.5)*360) + 'px');
    c.style.setProperty('--dy', (Math.random()*-260 - 60) + 'px');
    busZone.appendChild(c);
    setTimeout(() => c.remove(), 1400);
  }
  const emojis = ['✨','⭐','🎊','💫','🎉'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[i % emojis.length];
    s.style.left = (cx - 10) + 'px';
    s.style.top  = (cy - 10) + 'px';
    s.style.setProperty('--dx', ((Math.random()-0.5)*220) + 'px');
    busZone.appendChild(s);
    setTimeout(() => s.remove(), 1100);
  }
}

// ─── Start ───
window.addEventListener('load', () => {
  spawnBus();
});
</script>
