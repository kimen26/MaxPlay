<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>MJ-17 – L'ombre du bus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100dvh; overflow:hidden;
  font-family:'Nunito',sans-serif; background:#0d1b2a;
  display:flex; flex-direction:column;
  user-select:none;
}

/* ── Header ── */
#hdr {
  flex-shrink:0; height:52px;
  background:#07111d; border-bottom:2px solid #1a3048;
  display:flex; align-items:center; padding:0 14px; gap:10px; z-index:10;
}
#hdr .back-btn {
  background:#1a3048; border:none; border-radius:12px;
  color:#fff; font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1rem; padding:8px 16px; cursor:pointer; min-width:80px;
  touch-action:manipulation;
}
#hdr .back-btn:active { opacity:0.7; }
#hdr .title {
  font-weight:900; font-size:1.05rem; color:#e0f0ff;
  flex:1; text-align:center;
}
#score-badge {
  font-weight:900; font-size:1rem; color:#1a1a1a;
  background:#ffe066; border-radius:12px; padding:5px 16px;
  min-width:60px; text-align:center;
}

/* ── Contenu principal ── */
#main {
  flex:1; overflow:hidden;
  display:flex; flex-direction:column; align-items:center;
  justify-content:space-between;
  padding:12px 12px 10px;
  gap:10px;
}

/* ── Indicateur de niveau ── */
#level-hint {
  font-size:0.9rem; font-weight:700; color:#7fb8e0;
  background:rgba(255,255,255,0.06); border-radius:10px;
  padding:4px 16px; text-align:center;
  flex-shrink:0;
  transition: opacity 0.3s;
}

/* ── Zone silhouette ── */
#shadow-zone {
  flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
#shadow-label {
  font-size:1rem; font-weight:900; color:#cce4ff;
  text-align:center;
}
#shadow-frame {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px 24px;
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,0.08);
  min-height:110px;
  position:relative;
  overflow:hidden;
}
#shadow-bus {
  display:flex; align-items:center; justify-content:center;
  transition: filter 0.4s, clip-path 0.4s;
}
#shadow-bus svg {
  display:block;
}
#shadow-bus.silhouette svg {
  filter: brightness(0) saturate(0);
}
#shadow-bus.silhouette-blur svg {
  filter: brightness(0) saturate(0) blur(2px);
}
#shadow-bus.silhouette-partial {
  clip-path: inset(0 40% 0 0);
}
#shadow-bus.silhouette-partial svg {
  filter: brightness(0) saturate(0);
}
/* Reveal animation */
#shadow-bus.revealed svg {
  filter: none;
  clip-path: none;
  transition: filter 0.5s ease-out;
}

/* ── Dots progression ── */
#dots {
  display:flex; gap:8px; flex-shrink:0;
}
.dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,0.15);
  transition: background 0.3s;
}
.dot.done  { background:#4ecb71; }
.dot.wrong { background:#ff5252; }
.dot.curr  { background:#ffe066; animation: pulse-dot 1s infinite alternate; }
@keyframes pulse-dot { from { transform:scale(1); } to { transform:scale(1.3); } }

/* ── Grille de choix ── */
#choices-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  width:100%;
  max-width:520px;
  flex-shrink:0;
}
.choice-btn {
  background:rgba(255,255,255,0.07);
  border:3px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:12px 8px 10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px;
  cursor:pointer; touch-action:manipulation;
  min-height:90px;
  transition: transform 0.12s, border-color 0.2s, background 0.2s;
  position:relative;
  overflow:hidden;
}
.choice-btn:active { transform:scale(0.95); }
.choice-btn .bus-wrap {
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.choice-btn .bus-wrap svg { display:block; }

/* Feedback états */
.choice-btn.correct {
  border-color:#4ecb71;
  background:rgba(78,203,113,0.18);
  animation: pop-correct 0.35s ease-out;
}
.choice-btn.wrong-tap {
  border-color:#ff5252;
  background:rgba(255,82,82,0.18);
  animation: shake 0.4s ease-out;
}
.choice-btn.reveal-correct {
  border-color:#4ecb71;
  background:rgba(78,203,113,0.12);
}
.choice-btn.disabled {
  pointer-events:none; cursor:default;
}

@keyframes pop-correct {
  0%   { transform:scale(1); }
  50%  { transform:scale(1.1); }
  100% { transform:scale(1); }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-8px); }
  40%     { transform:translateX(8px); }
  60%     { transform:translateX(-6px); }
  80%     { transform:translateX(6px); }
}

/* ── Écran résultat final ── */
#end-screen {
  display:none;
  position:absolute; inset:0; z-index:100;
  background:rgba(7,17,29,0.97);
  flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:30px 24px;
  text-align:center;
}
#end-screen.visible { display:flex; }
#end-emoji { font-size:4rem; }
#end-title { font-size:2rem; font-weight:900; color:#fff; }
#end-score-text { font-size:1.3rem; font-weight:700; color:#ffe066; }
#end-stars { font-size:2.5rem; letter-spacing:4px; }
.end-btn {
  background:#ffe066; border:none; border-radius:18px;
  color:#1a1a1a; font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1.1rem; padding:16px 40px; cursor:pointer;
  touch-action:manipulation; min-width:160px;
}
.end-btn:active { transform:scale(0.95); }
.end-btn.secondary {
  background:rgba(255,255,255,0.1); color:#cce4ff;
}

/* ── Overlay fond page pour end-screen ── */
body { position:relative; }
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <button class="back-btn" onclick="window.location.href='index.html'">← Retour</button>
  <div class="title">🌑 L'ombre du bus</div>
  <div id="score-badge">0 / 5</div>
</div>

<!-- Contenu -->
<div id="main">

  <!-- Indication niveau -->
  <div id="level-hint">Regarde la forme !</div>

  <!-- Silhouette -->
  <div id="shadow-zone">
    <div id="shadow-label">Quel bus fait cette ombre ?</div>
    <div id="shadow-frame">
      <div id="shadow-bus" class="silhouette"></div>
    </div>
  </div>

  <!-- Progression -->
  <div id="dots">
    <div class="dot curr" id="dot-0"></div>
    <div class="dot"      id="dot-1"></div>
    <div class="dot"      id="dot-2"></div>
    <div class="dot"      id="dot-3"></div>
    <div class="dot"      id="dot-4"></div>
  </div>

  <!-- Choix 2×2 -->
  <div id="choices-grid"></div>

</div>

<!-- Écran fin -->
<div id="end-screen">
  <div id="end-emoji">🎉</div>
  <div id="end-title">Bravo Max !</div>
  <div id="end-score-text">Tu as trouvé 5 ombres sur 5 !</div>
  <div id="end-stars"></div>
  <button class="end-btn" onclick="restartGame()">Rejouer !</button>
  <button class="end-btn secondary" onclick="window.location.href='index.html'">Menu</button>
</div>

<script src="js/bus-svg.js"></script>
<script src="js/data.js"></script>
<script src="js/victory-sounds.js"></script>
<script src="js/tracker.js"></script>
<script>
// ─── Config ───────────────────────────────────────────────────────────────
const TOTAL_ROUNDS = 5;

// Niveau par round index (0-based)
// 0,1 → A (normal), 2,3 → B (blur), 4 → C (partial)
function getLevelForRound(roundIdx) {
  if (roundIdx <= 1) return 'A';
  if (roundIdx <= 3) return 'B';
  return 'C';
}

const LEVEL_HINTS = {
  A: 'Regarde la forme !',
  B: 'Même flou, regarde bien !',
  C: 'Avec seulement une moitié !',
};

// Largeur bus silhouette et boutons
const SHADOW_WIDTH = 220;
const CHOICE_WIDTH = 120;

// ─── État ────────────────────────────────────────────────────────────────
let puzzles   = [];   // { correct: ligne, distractors: [ligne], choices: [ligne] }
let roundIdx  = 0;
let score     = 0;
let answered  = false;

// ─── Génération des puzzles ──────────────────────────────────────────────
function buildPuzzles() {
  // Mélange LIGNES et prend 5 bus corrects distincts
  const pool      = [...LIGNES].sort(() => Math.random() - 0.5);
  const corrects  = pool.slice(0, TOTAL_ROUNDS);

  return corrects.map(correct => {
    // Distracteurs : couleurs distinctes du correct + longueurs de num variées
    const rest = LIGNES.filter(l => l.num !== correct.num);
    const byLength = rest.filter(l => l.num.length !== correct.num.length);

    // Préférer des bus avec longueur de texte différente PUIS couleur distincte
    let distPool = byLength.length >= 3 ? byLength : rest;

    // On veut des couleurs distinctes pour faciliter la discrimination visuelle
    const distShuffled = [...distPool].sort(() => Math.random() - 0.5);
    const distractors = selectDistinctColors(
      distShuffled.filter(l => l.num !== correct.num),
      3,
      60
    );

    // Mélange des 4 choix
    const choices = [correct, ...distractors].sort(() => Math.random() - 0.5);
    return { correct, distractors, choices };
  });
}

// ─── TTS ────────────────────────────────────────────────────────────────
function speak(text, rate = 0.85) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'fr-FR';
  utt.rate  = rate;
  utt.pitch = 1.1;
  window.speechSynthesis.speak(utt);
}

// ─── Rendu silhouette ────────────────────────────────────────────────────
function renderShadow(ligne, level) {
  const shadowBus = document.getElementById('shadow-bus');

  // Injecter le SVG couleur
  shadowBus.innerHTML = busSVG(ligne.color, ligne.textColor, ligne.num, SHADOW_WIDTH);

  // Appliquer la classe de niveau
  shadowBus.className = '';
  if (level === 'A') {
    shadowBus.classList.add('silhouette');
  } else if (level === 'B') {
    shadowBus.classList.add('silhouette-blur');
  } else {
    // C : partial
    shadowBus.classList.add('silhouette-partial');
  }
}

// ─── Rendu choix ─────────────────────────────────────────────────────────
function renderChoices(choices, correctNum) {
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';

  choices.forEach(ligne => {
    const btn = document.createElement('button');
    btn.className    = 'choice-btn';
    btn.dataset.num  = ligne.num;

    const wrap = document.createElement('div');
    wrap.className   = 'bus-wrap';
    wrap.innerHTML   = busSVG(ligne.color, ligne.textColor, ligne.num, CHOICE_WIDTH);
    btn.appendChild(wrap);

    btn.addEventListener('click', () => handleChoice(ligne.num, correctNum, btn));
    grid.appendChild(btn);
  });
}

// ─── Gestion réponse ─────────────────────────────────────────────────────
function handleChoice(chosenNum, correctNum, btn) {
  if (answered) return;
  answered = true;

  const isCorrect = chosenNum === correctNum;
  const puzzle    = puzzles[roundIdx];

  // Désactiver tous les boutons
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    Tracker.logAnswer(true);

    // Révéler la vraie couleur dans la silhouette
    const shadowBus = document.getElementById('shadow-bus');
    shadowBus.className = 'revealed';

    speak(getLineDisplayName(correctNum) + ' ! Bravo !');
    // Son succès léger (ding)
    const ding = new AudioContext();
    const osc  = ding.createOscillator();
    const gain = ding.createGain();
    osc.connect(gain); gain.connect(ding.destination);
    osc.frequency.setValueAtTime(880, ding.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, ding.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ding.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ding.currentTime + 0.4);
    osc.start(); osc.stop(ding.currentTime + 0.4);

  } else {
    btn.classList.add('wrong-tap');
    Tracker.logAnswer(false);
    playErrorSound();

    // Montrer la bonne réponse en vert
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.num === correctNum) b.classList.add('reveal-correct');
    });

    // Révéler la vraie couleur dans la silhouette aussi
    const shadowBus = document.getElementById('shadow-bus');
    shadowBus.className = 'revealed';

    speak('C\'était le ' + getLineDisplayName(correctNum) + ' !');
  }

  // Mettre à jour le dot
  updateDot(roundIdx, isCorrect);
  updateScoreBadge();

  // Passer au round suivant après délai
  setTimeout(() => advanceRound(), 1600);
}

// ─── Dots progression ────────────────────────────────────────────────────
function updateDot(idx, correct) {
  const dot = document.getElementById('dot-' + idx);
  if (!dot) return;
  dot.classList.remove('curr', 'done', 'wrong');
  dot.classList.add(correct ? 'done' : 'wrong');
}

function setCurrentDot(idx) {
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.getElementById('dot-' + i);
    if (!d) continue;
    if (i < idx) { /* already set */ }
    else if (i === idx) { d.classList.remove('done','wrong'); d.classList.add('curr'); }
    else { d.classList.remove('curr','done','wrong'); }
  }
}

// ─── Score badge ─────────────────────────────────────────────────────────
function updateScoreBadge() {
  document.getElementById('score-badge').textContent = score + ' / ' + TOTAL_ROUNDS;
}

// ─── Avancer ─────────────────────────────────────────────────────────────
function advanceRound() {
  roundIdx++;
  if (roundIdx >= TOTAL_ROUNDS) {
    showEndScreen();
    return;
  }
  answered = false;
  loadRound(roundIdx);
}

// ─── Charger un round ────────────────────────────────────────────────────
function loadRound(idx) {
  const puzzle = puzzles[idx];
  const level  = getLevelForRound(idx);

  // Hint niveau
  document.getElementById('level-hint').textContent = LEVEL_HINTS[level];

  // Silhouette
  renderShadow(puzzle.correct, level);

  // Choix
  renderChoices(puzzle.choices, puzzle.correct.num);

  // Dot courant
  setCurrentDot(idx);

  // TTS question
  speak('Quel bus fait cette ombre ?', 0.82);
}

// ─── Écran de fin ─────────────────────────────────────────────────────────
function showEndScreen() {
  Tracker.endSession(score, TOTAL_ROUNDS);
  playEndSound(score, TOTAL_ROUNDS);

  const endScreen = document.getElementById('end-screen');

  // Étoiles
  const stars = score >= 5 ? '⭐⭐⭐'
              : score >= 3 ? '⭐⭐'
              : score >= 1 ? '⭐'
              : '';

  // Titre & emoji
  let emoji, title, text;
  if (score === TOTAL_ROUNDS) {
    emoji = '🎉'; title = 'Parfait Max !';
    text  = 'Tu as trouvé toutes les ombres !';
  } else if (score >= 3) {
    emoji = '😄'; title = 'Bien joué !';
    text  = 'Tu as trouvé ' + score + ' ombres sur ' + TOTAL_ROUNDS + ' !';
  } else if (score >= 1) {
    emoji = '🙂'; title = 'Pas mal !';
    text  = score + ' ombre' + (score > 1 ? 's' : '') + ' trouvée' + (score > 1 ? 's' : '') + ' sur ' + TOTAL_ROUNDS + ' !';
  } else {
    emoji = '💪'; title = 'On recommence !';
    text  = 'Tu vas y arriver !';
  }

  document.getElementById('end-emoji').textContent       = emoji;
  document.getElementById('end-title').textContent       = title;
  document.getElementById('end-score-text').textContent  = text;
  document.getElementById('end-stars').textContent       = stars;

  endScreen.classList.add('visible');

  speak(title + ' ' + text, 0.85);
}

// ─── Rejouer ─────────────────────────────────────────────────────────────
function restartGame() {
  stopEndSound();
  document.getElementById('end-screen').classList.remove('visible');

  score    = 0;
  roundIdx = 0;
  answered = false;

  // Reset dots
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) { d.className = 'dot' + (i === 0 ? ' curr' : ''); }
  }

  updateScoreBadge();

  // Nouveaux puzzles
  puzzles = buildPuzzles();
  Tracker.startSession('mj-17');
  loadRound(0);
}

// ─── Init ────────────────────────────────────────────────────────────────
(function init() {
  puzzles = buildPuzzles();
  loadRound(0);
})();
</script>
</body>
</html>
