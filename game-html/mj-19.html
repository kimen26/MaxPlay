<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MJ-19 – Trouve le bus !</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
    body {
      font-family:'Nunito',sans-serif;
      background:linear-gradient(160deg,#0a2a1a 0%,#143a26 50%,#061a10 100%);
      height:100dvh; overflow:hidden; touch-action:manipulation;
    }
    #app { display:flex; flex-direction:column; height:100dvh; max-width:1000px; margin:0 auto; }
    .hdr {
      display:flex; align-items:center; padding:10px 16px;
      background:linear-gradient(90deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));
      border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .back { color:#fff; text-decoration:none; font-size:1.5rem; margin-right:12px; padding:4px 8px; border-radius:8px; }
    .back:active { background:rgba(255,255,255,0.2); }
    .htitle { color:#fff; font-size:1.2rem; font-weight:900; flex:1; }
    .score { color:#ffe066; font-weight:900; }
    .quest {
      text-align:center; padding:12px 16px;
      color:#fff; font-size:1.2rem; font-weight:900;
      background:rgba(0,0,0,0.25);
    }
    .quest b { color:#ffe066; font-size:1.4rem; }
    .arena {
      flex:1; position:relative; overflow:hidden;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 40px, transparent 40px 80px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 40px, transparent 40px 80px);
    }
    .bus-mover {
      position:absolute; cursor:pointer;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
      will-change:transform;
      padding:16px; box-sizing:content-box;
    }
    .bus-mover:active { filter:drop-shadow(0 8px 16px rgba(0,0,0,0.8)); }
    .bus-mover.captured {
      animation:captureBoom 0.6s ease forwards;
      pointer-events:none;
      transform-origin:center;
    }
    @keyframes captureBoom {
      0%   { transform:translate(var(--cx),var(--cy)) scale(1) rotate(0); opacity:1; }
      40%  { transform:translate(var(--cx),var(--cy)) scale(1.8) rotate(8deg); opacity:1; }
      100% { transform:translate(var(--cx),var(--cy)) scale(0.1) rotate(-20deg); opacity:0; }
    }
    .particle {
      position:absolute; pointer-events:none; z-index:10;
      font-size:1.6rem; will-change:transform,opacity;
      animation:particleFly 0.9s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { transform:translate(0,0) scale(0.5); opacity:1; }
      100% { transform:translate(var(--dx),var(--dy)) scale(1.3); opacity:0; }
    }
    .bus-mover.wrong { animation:wrongShake 0.4s ease; }
    @keyframes wrongShake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-12px); }
      75% { transform:translateX(12px); }
    }
    .flash-ok, .flash-ko {
      position:fixed; inset:0; pointer-events:none; z-index:50;
      opacity:0; transition:opacity 0.3s;
    }
    .flash-ok { background:radial-gradient(circle, rgba(0,196,122,0.4), transparent 70%); }
    .flash-ko { background:radial-gradient(circle, rgba(226,0,26,0.4), transparent 70%); }
    .flash-ok.show, .flash-ko.show { opacity:1; }
  </style>
</head>
<body>
  <div id="app">
    <div class="hdr">
      <a href="index.html" class="back">←</a>
      <span class="htitle">🎯 Trouve le bus !</span>
      <span class="score" id="score">0/7</span>
    </div>
    <div class="quest" id="quest">Trouve le bus <b>162</b> !</div>
    <div class="arena" id="arena"></div>
  </div>
  <div class="flash-ok" id="flashOk"></div>
  <div class="flash-ko" id="flashKo"></div>

  <script src="js/sounds.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/data.js"></script>
  <script src="js/bus-svg.js"></script>
  <script>
    // MJ-19 V1 — Hidden in plain sight
    // N bus se déplacent, Max doit taper celui demandé. 5 rounds.

    const ROUNDS = 7;
    const BUS_COUNT = 12;
    const BUS_WIDTH = 80;
    const SPEED_MIN = 28;  // px/sec
    const SPEED_MAX = 75;

    let round = 0;
    let score = 0;
    let movers = [];     // { el, num, line, x, y, vx, vy, w, h }
    let targetNum = null;
    let rafId = null;
    let lastT = 0;
    let locked = false;

    function rand(a,b) { return a + Math.random()*(b-a); }
    function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

    function startRound() {
      locked = false;
      const arena = document.getElementById('arena');
      arena.innerHTML = '';
      movers = [];

      // Pool : lignes à couleurs distinctes pour rendre visuel plus clair
      const pool = selectDistinctColors(LIGNES, BUS_COUNT, 40);
      // Cible parmi les bus présents
      const target = pick(pool);
      targetNum = target.num;
      document.getElementById('quest').innerHTML = `Trouve le bus <b>${targetNum}</b> !`;
      try { speechSynthesis && speechSynthesis.cancel(); } catch(e){}
      try {
        const u = new SpeechSynthesisUtterance(`Trouve le bus ${targetNum}`);
        u.lang='fr-FR'; u.rate=0.95;
        speechSynthesis.speak(u);
      } catch(e) {}

      const aRect = arena.getBoundingClientRect();
      const W = aRect.width, H = aRect.height;

      pool.forEach((line, i) => {
        const el = document.createElement('div');
        el.className = 'bus-mover';
        el.style.width = BUS_WIDTH + 'px';
        el.innerHTML = busSVG(line.color, line.textColor, line.num, BUS_WIDTH);
        arena.appendChild(el);
        const bw = el.offsetWidth  || (BUS_WIDTH + 32);
        const bh = el.offsetHeight || 78;
        const x = rand(10, Math.max(10, W - bw - 10));
        const y = rand(10, Math.max(10, H - bh - 10));
        // 60% de bus quasi-horizontaux (gauche↔droite), 40% libres
        const sp = rand(SPEED_MIN, SPEED_MAX);
        let vx, vy;
        if (Math.random() < 0.6) {
          vx = (Math.random() < 0.5 ? -1 : 1) * sp;
          vy = rand(-sp*0.15, sp*0.15);
        } else {
          const ang = rand(0, Math.PI*2);
          vx = Math.cos(ang)*sp;
          vy = Math.sin(ang)*sp;
        }
        const mv = {
          el, num: line.num, line,
          x, y, vx, vy,
          w: bw, h: bh
        };
        el.style.transform = `translate(${x}px,${y}px)`;
        el.addEventListener('click', () => onTap(mv));
        movers.push(mv);
      });

      lastT = performance.now();
      if (rafId) cancelAnimationFrame(rafId);
      loop();
    }

    function loop(t) {
      t = t || performance.now();
      const dt = Math.min(0.05, (t - lastT) / 1000);
      lastT = t;
      const arena = document.getElementById('arena');
      const W = arena.clientWidth, H = arena.clientHeight;

      movers.forEach(m => {
        if (m.el.classList.contains('captured')) return;
        m.x += m.vx * dt;
        m.y += m.vy * dt;
        if (m.x < 0) { m.x = 0; m.vx = Math.abs(m.vx); }
        if (m.x > W - m.w) { m.x = W - m.w; m.vx = -Math.abs(m.vx); }
        if (m.y < 0) { m.y = 0; m.vy = Math.abs(m.vy); }
        if (m.y > H - m.h) { m.y = H - m.h; m.vy = -Math.abs(m.vy); }
        m.el.style.transform = `translate(${m.x}px,${m.y}px)`;
      });
      rafId = requestAnimationFrame(loop);
    }

    function flash(ok) {
      const el = document.getElementById(ok ? 'flashOk' : 'flashKo');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 300);
    }

    function explodeAt(mv) {
      const arena = document.getElementById('arena');
      const cx = mv.x + mv.w/2;
      const cy = mv.y + mv.h/2;
      const emojis = ['✨','⭐','💫','🎉','🌟'];
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[i % emojis.length];
        p.style.left = cx + 'px';
        p.style.top  = cy + 'px';
        const ang = (i / 14) * Math.PI * 2;
        const dist = 80 + Math.random() * 60;
        p.style.setProperty('--dx', Math.cos(ang)*dist + 'px');
        p.style.setProperty('--dy', Math.sin(ang)*dist + 'px');
        arena.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    function onTap(mv) {
      if (locked) return;
      if (mv.num === targetNum) {
        locked = true;
        // Fige la position via CSS vars pour que l'animation la conserve
        mv.el.style.setProperty('--cx', mv.x + 'px');
        mv.el.style.setProperty('--cy', mv.y + 'px');
        explodeAt(mv);
        mv.el.classList.add('captured');
        flash(true);
        try { sndDing && sndDing(); } catch(e) {}
        try { confettiBurst(25); } catch(e) {}
        if (typeof Tracker !== 'undefined') Tracker.logAnswer(true);
        score++;
        round++;
        document.getElementById('score').textContent = `${score}/${ROUNDS}`;
        setTimeout(() => {
          if (round >= ROUNDS) endGame();
          else startRound();
        }, 800);
      } else {
        mv.el.classList.add('wrong');
        flash(false);
        try { sndBuzz && sndBuzz(); } catch(e) {}
        if (typeof Tracker !== 'undefined') Tracker.logAnswer(false);
        setTimeout(() => mv.el.classList.remove('wrong'), 450);
      }
    }

    function endGame() {
      if (rafId) cancelAnimationFrame(rafId);
      if (typeof Tracker !== 'undefined') Tracker.endSession(score, ROUNDS);
      const arena = document.getElementById('arena');
      arena.innerHTML = `
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px;">
          <div style="font-size:5rem;">🎉</div>
          <h2 style="color:#ffe066;font-size:2.2rem;margin:10px 0;">Bravo !</h2>
          <p style="font-size:1.3rem;margin-bottom:24px;">Tu as trouvé ${score} bus sur ${ROUNDS} !</p>
          <div>
            <button onclick="location.reload()" style="padding:14px 28px;border-radius:30px;border:none;background:linear-gradient(135deg,#00c47a,#00a86b);color:#fff;font-weight:900;font-family:inherit;margin:0 8px;cursor:pointer;">🔄 Rejouer</button>
            <a href="index.html" style="padding:14px 28px;border-radius:30px;background:rgba(255,255,255,0.15);color:#fff;font-weight:900;text-decoration:none;margin:0 8px;">📋 Menu</a>
          </div>
        </div>`;
      try { confettiBurst(60); } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Tracker !== 'undefined') Tracker.startSession('mj-19');
      startRound();
    });
  </script>
  <script src="js/tracker.js"></script>
  <script src="js/comments.js"></script>
</body>
</html>
